<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D Escape - Movement Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #eee; }
        canvas { display: block; }

        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; color: white; text-shadow: 1px 1px 2px black;
        }

        #inventory {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 10px; pointer-events: auto;
        }
        .slot {
            width: 60px; height: 60px; border: 3px solid #555; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; border-radius: 10px;
        }
        .slot.selected { border-color: #00d4ff; box-shadow: 0 0 15px #00d4ff; background: rgba(0,212,255,0.2); }

        #msg-box { position: absolute; bottom: 30px; width: 100%; text-align: center; }
        #text {
            display: inline-block; background: rgba(0,0,0,0.7);
            padding: 10px 30px; border-radius: 30px; font-size: 18px; border: 2px solid #00d4ff;
        }

        #guide {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; font-size: 13px;
        }

        #numpad {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: #222;
            padding: 20px; border: 4px solid #00d4ff; border-radius: 15px;
            pointer-events: auto; text-align: center;
        }
        input { font-size: 30px; width: 120px; text-align: center; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #00d4ff; border: none; font-weight: bold; border-radius: 5px; color: white; }
    </style>
</head>
<body>

<div id="ui">
    <div id="inventory">
        <div id="slot-0" class="slot"></div>
        <div id="slot-1" class="slot"></div>
        <div id="slot-2" class="slot"></div>
    </div>

    <div id="guide">
        <b>【移動】</b><br>
        矢印キー [↑][↓][←][→]<br>
        または [W][A][S][D]<br><br>
        <b>【視点】</b><br>
        マウスを動かす<br>
        (クリックで開始)<br><br>
        <b>【使う・調べる】</b><br>
        中央の○を合わせてクリック<br>
        [Space] でアイテム選択
    </div>

    <div id="msg-box">
        <div id="text">画面をクリックして探索を開始！</div>
    </div>

    <div id="numpad">
        <h2 style="color:#00d4ff">数字を入力</h2>
        <input type="number" id="code-in" placeholder="000"><br>
        <button onclick="checkSafe()">解除</button>
        <button onclick="closeNumpad()">閉じる</button>
    </div>
</div>

<div style="position:absolute; top:50%; left:50%; width:8px; height:8px; border:2px solid #00d4ff; border-radius:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:10;"></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- ゲームデータ ---
    const state = { inv: [], sel: -1, solved: false };
    const items = {
        note: { name: "メモ", icon: "📜" },
        handle: { name: "ハンドル", icon: "⚙️" },
        key: { name: "金の鍵", icon: "🔑" }
    };

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xcccccc); 

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 明るい照明
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x888888, 1.8); 
    scene.add(hemiLight);
    const pointLight = new THREE.PointLight(0xffffff, 30);
    camera.add(pointLight);
    scene.add(camera);

    // 部屋
    const roomSize = 14;
    const room = new THREE.Mesh(
        new THREE.BoxGeometry(roomSize, 8, roomSize),
        new THREE.MeshStandardMaterial({ color: 0xeeeeee, side: THREE.BackSide })
    );
    room.position.y = 4;
    scene.add(room);

    // オブジェクト
    function makeObj(w, h, d, x, z, col, name) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({color: col}));
        m.position.set(x, h/2, z);
        m.name = name;
        scene.add(m);
        return m;
    }

    makeObj(1, 5, 4, -6.5, 0, 0x5d4037, "shelf"); // 本棚
    makeObj(3, 1.5, 2, 5.5, 4, 0x333333, "desk");  // 机
    makeObj(0.7, 0.7, 0.7, 5.5, 4, 0x000000, "box"); // 金庫
    makeObj(2.5, 5, 0.2, 0, -6.9, 0x2980b9, "door"); // ドア

    camera.position.set(0, 3, 5);

    // --- 操作ロジック ---
    const keys = {};
    let yaw = 0, pitch = 0;

    window.addEventListener('keydown', e => { 
        keys[e.code] = true;
        if(e.code === 'Space') {
            if(state.inv.length > 0) {
                state.sel = (state.sel + 1) % state.inv.length;
                updateUI();
                notify(items[state.inv[state.sel]].name + " を選択中");
            }
        }
    });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    renderer.domElement.addEventListener('click', () => {
        if(document.getElementById('numpad').style.display !== 'block') {
            renderer.domElement.requestPointerLock();
        }
    });

    document.addEventListener('mousemove', e => {
        if (document.pointerLockElement === renderer.domElement) {
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
        }
    });

    function moveLoop() {
        if (document.pointerLockElement === renderer.domElement) {
            const moveVec = new THREE.Vector3();
            // 修正：正面(forward)は yaw の方向
            const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
            // 修正：右(right)は正面と上の外積
            const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0, 1, 0));

            // 移動方向の判定
            if (keys['ArrowUp'] || keys['KeyW']) moveVec.add(forward);
            if (keys['ArrowDown'] || keys['KeyS']) moveVec.sub(forward);
            if (keys['ArrowLeft'] || keys['KeyA']) moveVec.sub(right); // 左は右の反対
            if (keys['ArrowRight'] || keys['KeyD']) moveVec.add(right);

            if (moveVec.length() > 0) {
                moveVec.normalize().multiplyScalar(0.12);
                const nextX = camera.position.x + moveVec.x;
                const nextZ = camera.position.z + moveVec.z;
                
                const bound = (roomSize / 2) - 1;
                if (Math.abs(nextX) < bound) camera.position.x = nextX;
                if (Math.abs(nextZ) < bound) camera.position.z = nextZ;
            }
        }
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        renderer.render(scene, camera);
        requestAnimationFrame(moveLoop);
    }
    moveLoop();

    // --- インタラクト ---
    window.addEventListener('mousedown', () => {
        if (document.pointerLockElement !== renderer.domElement) return;
        const ray = new THREE.Raycaster();
        ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = ray.intersectObjects(scene.children);

        if(hits.length > 0 && hits[0].distance < 5) {
            const target = hits[0].object.name;
            const held = state.inv[state.sel];

            if(target === "shelf") {
                if(!state.inv.includes("note")) {
                    state.inv.push("note");
                    notify("メモを入手！『暗号は 512』");
                }
            } else if(target === "desk") {
                if(!state.solved) {
                    document.exitPointerLock();
                    document.getElementById('numpad').style.display = 'block';
                }
            } else if(target === "box") {
                if(held === "handle") {
                    state.inv.splice(state.sel, 1);
                    state.inv.push("key");
                    state.sel = state.inv.length - 1;
                    notify("ハンドルを使い、「金の鍵」を入手！");
                } else {
                    notify("何かを差し込む穴がある。");
                }
            } else if(target === "door") {
                if(held === "key") {
                    notify("脱出成功！！");
                    setTimeout(()=>location.reload(), 3000);
                } else {
                    notify("鍵がかかっている。");
                }
            }
            updateUI();
        }
    });

    window.checkSafe = () => {
        if(document.getElementById('code-in').value === "512") {
            state.solved = true;
            state.inv.push("handle");
            closeNumpad();
            notify("金庫が開いた！「ハンドル」を入手。");
            updateUI();
        } else {
            alert("番号が違う！");
        }
    };

    window.closeNumpad = () => {
        document.getElementById('numpad').style.display = 'none';
        renderer.domElement.requestPointerLock();
    };

    function notify(t) { document.getElementById('text').innerText = t; }
    function updateUI() {
        for(let i=0; i<3; i++) {
            const s = document.getElementById(`slot-${i}`);
            s.innerHTML = state.inv[i] ? items[state.inv[i]].icon : "";
            s.classList.toggle('selected', i === state.sel);
        }
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
