<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Pastel Escape - Mission: The Study</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #fff0f5; font-family: 'Hiragino Kaku Gothic Pro', sans-serif; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #ffeef2; display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 500;
        }
        #start-btn { padding: 25px 80px; font-size: 28px; background: #ff85a2; border: none; color: white; cursor: pointer; border-radius: 60px; font-weight: bold; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #inventory { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .slot { width: 75px; height: 75px; border: 4px solid #f8bbd0; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; font-size: 40px; border-radius: 18px; }
        .slot.selected { border-color: #ff85a2; box-shadow: 0 0 20px #ff85a2; background: #fff; }
        #controls-guide { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.9); padding: 20px; border-radius: 15px; border: 3px solid #ff85a2; color: #ff4081; font-size: 14px; line-height: 1.6; font-weight: bold; }
        #msg-box { position: absolute; bottom: 40px; width: 100%; text-align: center; }
        #text { display: inline-block; background: white; color: #ff4081; padding: 15px 45px; border-radius: 50px; border: 3px solid #f8bbd0; font-size: 18px; font-weight: bold; }
        /* 金庫入力用パネル */
        #safe-panel { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; border: 5px solid #ff85a2; pointer-events: auto; text-align: center; z-index: 1000; }
        #safe-panel input { font-size: 30px; width: 150px; text-align: center; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color: #ff4081;">🌸 書斎からの脱出 🌸</h1>
    <button id="start-btn">スタート！</button>
</div>

<div id="ui">
    <div id="inventory">
        <div id="slot-0" class="slot"></div>
        <div id="slot-1" class="slot"></div>
    </div>
    <div id="controls-guide">
        【操作ガイド】<br>
        🏃 移動：矢印キー（↑ ↓ ← →）<br>
        🔄 選択：Spaceキー<br>
        📝 見る：Enterキー<br>
        🔑 使う：Shiftキー<br>
        🖱️ 調べる：左クリック
    </div>
    <div id="msg-box"><div id="text">隣の部屋の「書斎」に隠された秘密を解き明かしてください。</div></div>
    
    <div id="safe-panel">
        <h2 style="color:#ff4081; margin-top:0;">金庫の暗証番号</h2>
        <input type="text" id="pass-input" maxlength="4" placeholder="0000"><br>
        <button id="unlock-btn" style="padding:10px 20px; cursor:pointer; background:#ff85a2; color:white; border:none; border-radius:5px;">解錠する</button>
        <button id="close-panel" style="padding:10px 20px; cursor:pointer; background:#ccc; border:none; border-radius:5px;">閉じる</button>
    </div>
</div>

<script>
    const state = { inv: [], sel: -1, door1Open: false, chairMoved: false, safeUnlocked: false, exitOpen: false };
    const itemsData = {
        key1: { icon: "🗝️", name: "真鍮の鍵", desc: "隣の部屋へ続く重厚な扉を開けるための鍵。" },
        key2: { icon: "🔑", name: "黄金の鍵", desc: "この部屋から外に出るための最後の鍵！" }
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xfff0f5);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.0));
    const light = new THREE.PointLight(0xffffff, 1.5); light.position.set(5, 5, 5); scene.add(light);

    // 部屋作成
    function createRoom(x, color) {
        const g = new THREE.Group(); g.position.x = x;
        const box = new THREE.Mesh(new THREE.BoxGeometry(14, 8, 14), new THREE.MeshStandardMaterial({color:color, side:THREE.BackSide}));
        box.position.y = 4; g.add(box);
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(14, 14), new THREE.MeshStandardMaterial({color:0xffffff}));
        floor.rotation.x = -Math.PI/2; g.add(floor);
        scene.add(g); return g;
    }
    const r1 = createRoom(0, 0xffcad4);
    const r2 = createRoom(20, 0xbde0fe); // ミントグリーンの書斎

    // --- 家具 ---
    // 部屋1の棚
    const shelf1 = new THREE.Group();
    const wood = new THREE.MeshStandardMaterial({color:0xe6be8a});
    const s1 = new THREE.Mesh(new THREE.BoxGeometry(3,5,0.5), wood); s1.position.y=2.5; shelf1.add(s1);
    const vase = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4,0.7), new THREE.MeshStandardMaterial({color:0x98ff98}));
    vase.position.set(0, 5.3, 0); vase.name = "vase"; shelf1.add(vase);
    shelf1.position.set(-5, 0, -5); scene.add(shelf1);

    // 部屋1のドア
    const door1 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 6, 3), new THREE.MeshStandardMaterial({color:0xffffff}));
    door1.position.set(7, 3, 0); door1.name = "door1"; scene.add(door1);

    // --- 書斎の家具 ---
    // 本棚
    const bookShelf = new THREE.Group();
    const bs = new THREE.Mesh(new THREE.BoxGeometry(5, 7, 1), wood); bs.position.y = 3.5;
    bookShelf.add(bs); bookShelf.position.set(20, 0, -6.4); bookShelf.name = "bookshelf";
    scene.add(bookShelf);

    // デスクと金庫
    const desk = new THREE.Mesh(new THREE.BoxGeometry(4, 1.5, 2.5), wood);
    desk.position.set(24, 0.75, 0); scene.add(desk);
    const safe = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({color:0x555, metalness:0.8}));
    safe.position.set(24, 1.9, 0); safe.name = "safe"; scene.add(safe);

    // 椅子
    const chair = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshStandardMaterial({color:0xff85a2}));
    chair.position.set(21, 0.6, 0); chair.name = "chair"; scene.add(chair);

    // ウサギ
    const rabbit = new THREE.Group();
    const rMat = new THREE.MeshStandardMaterial({color:0xff85a2});
    const rb = new THREE.Mesh(new THREE.SphereGeometry(0.5,12,12), rMat); rb.position.y=0.5;
    const rh = new THREE.Mesh(new THREE.SphereGeometry(0.4,12,12), rMat); rh.position.y=1.3;
    rabbit.add(rb, rh); rabbit.position.set(15, 0, 5); rabbit.name = "rabbit";
    scene.add(rabbit);

    // 出口ドア
    const exitDoor = new THREE.Mesh(new THREE.BoxGeometry(0.2, 6, 3), new THREE.MeshStandardMaterial({color:0xffd700}));
    exitDoor.position.set(27, 3, 0); exitDoor.name = "exitDoor"; scene.add(exitDoor);

    // --- 操作 ---
    camera.position.set(0, 3, 6);
    const keys = {};
    let yaw = 0, pitch = 0;

    document.getElementById('start-btn').addEventListener('click', () => {
        renderer.domElement.requestPointerLock();
        document.getElementById('overlay').style.display = 'none';
    });

    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        if (e.code === 'Space' && state.inv.length > 0) {
            state.sel = (state.sel + 1) % state.inv.length;
            updateUI(); notify(`${itemsData[state.inv[state.sel]].name} を選択中`);
        }
        if (e.code === 'Enter' && state.sel !== -1) {
            notify(`【確認】${itemsData[state.inv[state.sel]].desc}`);
        }
        if (e.shiftKey) handleAction(true);
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    document.addEventListener('mousemove', e => {
        if (document.pointerLockElement) {
            yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002;
            pitch = Math.max(-1.4, Math.min(1.4, pitch));
        }
    });

    function handleAction(isShift) {
        if (!document.pointerLockElement) return;
        const ray = new THREE.Raycaster(); ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = ray.intersectObjects(scene.children, true);
        if (hits.length > 0 && hits[0].distance < 5) {
            let obj = hits[0].object; while(obj.parent && !obj.name) obj = obj.parent;
            
            if (obj.name === "vase") {
                if (!state.inv.includes("key1")) { state.inv.push("key1"); state.sel=0; updateUI(); notify("カギを拾った！"); }
            } else if (obj.name === "door1") {
                if (isShift && state.inv[state.sel] === "key1") { state.door1Open = true; obj.position.y += 7; notify("書斎への扉が開いた！"); }
                else if (!isShift) notify("カギがかかっている。");
            } else if (obj.name === "chair") {
                state.chairMoved = !state.chairMoved;
                obj.position.z += state.chairMoved ? 2 : -2;
                notify(state.chairMoved ? "椅子を動かした。床に数字『8』が書かれている！" : "椅子を戻した。");
            } else if (obj.name === "bookshelf") {
                notify("本棚の隙間に数字『3』が刻まれている。");
            } else if (obj.name === "rabbit") {
                notify("ウサギ：金庫の番号？僕の耳の数(2)を最後に付け足してみて！");
            } else if (obj.name === "safe") {
                document.exitPointerLock();
                document.getElementById('safe-panel').style.display = 'block';
            } else if (obj.name === "exitDoor") {
                if (isShift && state.inv[state.sel] === "key2") { state.exitOpen = true; obj.position.y += 7; notify("脱出成功！おめでとう！"); }
                else if (!isShift) notify("出口の鍵がかかっている。");
            }
        }
    }

    window.addEventListener('mousedown', () => handleAction(false));

    // 金庫入力
    document.getElementById('unlock-btn').onclick = () => {
        const val = document.getElementById('pass-input').value;
        if (val === "382") { // 本棚の3、椅子の8、ウサギの2
            state.inv.push("key2"); updateUI();
            notify("金庫が開いた！『黄金の鍵』を入手！");
            document.getElementById('safe-panel').style.display = 'none';
            renderer.domElement.requestPointerLock();
        } else { alert("番号が違うようだ..."); }
    };
    document.getElementById('close-panel').onclick = () => {
        document.getElementById('safe-panel').style.display = 'none';
        renderer.domElement.requestPointerLock();
    };

    function animate() {
        if (document.pointerLockElement) {
            const dir = new THREE.Vector3();
            if (keys['ArrowUp']) dir.z -= 1; if (keys['ArrowDown']) dir.z += 1;
            if (keys['ArrowLeft']) dir.x -= 1; if (keys['ArrowRight']) dir.x += 1;
            if (dir.length() > 0) {
                dir.normalize().applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                camera.position.addScaledVector(dir, 0.15);
            }
            camera.position.y = 3;
            if (camera.position.x < -6) camera.position.x = -6;
            if (!state.door1Open && camera.position.x > 6.5) camera.position.x = 6.5;
            if (camera.position.x > 26) camera.position.x = 26;
        }
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }
    animate();

    function notify(t) { document.getElementById('text').innerText = t; }
    function updateUI() {
        for(let i=0; i<2; i++) {
            const s = document.getElementById(`slot-${i}`);
            s.innerHTML = state.inv[i] ? itemsData[state.inv[i]].icon : "";
            s.classList.toggle('selected', i === state.sel);
        }
    }
</script>
</body>
</html>
