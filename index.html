<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room - 修正版</title>
    <style>
        /* 基本スタイル：真っ暗にならないよう背景を調整 */
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* 真っ黒すぎないグレー */
            color: #ffffff;
            font-family: 'Segoe UI', Meiryo, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-box {
            width: 90%;
            max-width: 500px;
            background-color: #2c3e50;
            border: 4px solid #ecf0f1;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            text-align: center;
        }

        /* 画面切り替え用 */
        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.5s; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        h1 { color: #f1c40f; margin-top: 0; }

        .msg-area {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            min-height: 60px;
            line-height: 1.5;
        }

        .inv-slot {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 2px dashed #bdc3c7;
            margin: 5px;
            line-height: 50px;
            font-size: 24px;
            background: #34495e;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px;
            cursor: pointer;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
        }

        button:hover { background: #2980b9; }

        input {
            width: 80%;
            padding: 10px;
            font-size: 20px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: none;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="game-box">
    <div id="sc-start" class="screen active">
        <h1>THE STUDY</h1>
        <p>静かな書斎に閉じ込められた...</p>
        <button onclick="go('room')">探索を開始する</button>
    </div>

    <div id="sc-main" class="screen">
        <div id="text-log" class="msg-area"></div>
        
        <div>
            <div id="item1" class="inv-slot">?</div>
            <div id="item2" class="inv-slot">?</div>
        </div>

        <div id="btns" class="btn-grid"></div>
    </div>

    <div id="sc-input" class="screen">
        <h2 id="input-title">暗号入力</h2>
        <input type="number" id="code-in" placeholder="000">
        <div class="btn-grid">
            <button onclick="checkCode()">決定</button>
            <button onclick="go('room')">戻る</button>
        </div>
    </div>

    <div id="sc-clear" class="screen">
        <h1 style="color:#2ecc71">脱出成功！</h1>
        <p>あなたは無事に部屋を後にした。</p>
        <button onclick="location.reload()">もう一度プレイ</button>
    </div>
</div>

<script>
    const data = {
        room: {
            msg: "本棚と、古い机、頑丈そうなドアがある。",
            btns: [
                { t: "本棚を見る", f: () => getNote() },
                { t: "机を調べる", f: () => goInput() },
                { t: "ドアを開ける", f: () => tryExit() }
            ]
        }
    };

    let hasNote = false;
    let hasKey = false;

    // 画面切り替え関数
    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // シーン移動
    function go(place) {
        show('sc-main');
        const log = document.getElementById('text-log');
        const btnArea = document.getElementById('btns');
        
        log.innerText = data[place].msg;
        btnArea.innerHTML = '';
        
        data[place].btns.forEach(b => {
            const btn = document.createElement('button');
            btn.innerText = b.t;
            btn.onclick = b.f;
            btnArea.appendChild(btn);
        });
    }

    function getNote() {
        hasNote = true;
        document.getElementById('item1').innerText = '📜';
        alert("本に紙が挟まっていた！\n『本=8, 机=4, 椅子=1』と書かれている。");
    }

    function goInput() {
        show('sc-input');
    }

    function checkCode() {
        const val = document.getElementById('code-in').value;
        if(val === "841") {
            alert("金庫が開いた！「金の鍵」を手に入れた！");
            hasKey = true;
            document.getElementById('item2').innerText = '🔑';
            go('room');
        } else {
            alert("番号が違うようだ...");
        }
    }

    function tryExit() {
        if(hasKey) {
            show('sc-clear');
        } else {
            alert("鍵がかかっていて開かない。");
        }
    }
</script>
</body>
</html>
