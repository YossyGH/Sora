<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room - 謎の書斎</title>
    <style>
        :root {
            --bg-color: #2c3e50;
            --panel-color: #34495e;
            --text-color: #ecf0f1;
            --accent-color: #e74c3c;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            width: 90%;
            max-width: 600px;
            background-color: var(--panel-color);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .screen { display: none; }
        .active { display: block; }

        h1 { color: var(--accent-color); }
        
        .description {
            margin: 20px 0;
            line-height: 1.6;
            min-height: 80px;
        }

        .inventory {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 5px;
        }

        .item {
            width: 50px;
            height: 50px;
            border: 2px solid #7f8c8d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #95a5a6;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 5px;
            background-color: #3498db;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #7f8c8d; cursor: not-allowed; }

        input {
            padding: 10px;
            width: 80%;
            margin-bottom: 10px;
            border-radius: 5px;
            border: none;
            text-align: center;
            font-size: 18px;
        }

        .hint { font-size: 0.8em; color: #bdc3c7; margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen" class="screen active">
        <h1>THE STUDY ROOM</h1>
        <p>気がつくと、あなたは鍵のかかった書斎にいた...</p>
        <button onclick="startGame()">探索を始める</button>
    </div>

    <div id="main-screen" class="screen">
        <div id="display-text" class="description"></div>
        
        <div class="inventory">
            <div id="slot1" class="item">?</div>
            <div id="slot2" class="item">?</div>
        </div>

        <div id="action-buttons" class="controls">
            </div>
    </div>

    <div id="puzzle-screen" class="screen">
        <h3 id="puzzle-title">金庫のダイヤル</h3>
        <p id="puzzle-hint"></p>
        <input type="text" id="puzzle-input" placeholder="答えを入力">
        <div class="controls">
            <button onclick="checkPuzzle()">入力する</button>
            <button onclick="showMain()">戻る</button>
        </div>
    </div>

    <div id="end-screen" class="screen">
        <h1>ESCAPE SUCCESS!</h1>
        <p>おめでとう！あなたは無事に書斎から脱出した。</p>
        <button onclick="location.reload()">もう一度遊ぶ</button>
    </div>
</div>

<script>
    // ゲームの状態管理
    const state = {
        hasKey: false,
        hasNote: false,
        safeOpened: false,
        currentLocation: 'center'
    };

    const displayText = document.getElementById('display-text');
    const actionButtons = document.getElementById('action-buttons');

    // シナリオデータ
    const locations = {
        center: {
            text: "部屋の中央だ。正面に「頑丈なドア」、右に「本棚」、左に「机」がある。",
            options: [
                { text: "ドアを調べる", target: "door" },
                { text: "本棚を見る", target: "bookshelf" },
                { text: "机を調べる", target: "desk" }
            ]
        },
        door: {
            text: "鉄製の重厚なドアだ。鍵がかかっている。",
            options: [
                { text: "鍵を使う", action: "tryExit" },
                { text: "戻る", target: "center" }
            ]
        },
        bookshelf: {
            text: "古い本が並んでいる。一冊だけ背表紙が色あせた本がある。",
            options: [
                { text: "本を手に取る", action: "getNote" },
                { text: "戻る", target: "center" }
            ]
        },
        desk: {
            text: "机の上に小さな金庫が置いてある。4桁の数字が必要なようだ。",
            options: [
                { text: "金庫を調べる", action: "openSafePuzzle" },
                { text: "戻る", target: "center" }
            ]
        }
    };

    function startGame() {
        changeScreen('main-screen');
        renderLocation('center');
    }

    function renderLocation(locKey) {
        state.currentLocation = locKey;
        const loc = locations[locKey];
        displayText.innerText = loc.text;
        
        actionButtons.innerHTML = '';
        loc.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt.text;
            btn.onclick = () => {
                if (opt.target) renderLocation(opt.target);
                if (opt.action) handleAction(opt.action);
            };
            actionButtons.appendChild(btn);
        });
    }

    function handleAction(action) {
        if (action === 'getNote') {
            if (!state.hasNote) {
                state.hasNote = true;
                document.getElementById('slot1').innerText = '📝';
                alert("メモを手に入れた！\n『本棚の数：8、机の脚：4、椅子の数：1... 答えは 841』と書いてある。");
                renderLocation('bookshelf');
            } else {
                alert("もう調べるものはない。");
            }
        } 
        else if (action === 'openSafePuzzle') {
            if (state.safeOpened) {
                alert("金庫はすでに開いている。中には「銀の鍵」があった。");
            } else {
                showPuzzle("金庫のロック", "メモの数字は何だっただろうか？");
            }
        }
        else if (action === 'tryExit') {
            if (state.hasKey) {
                changeScreen('end-screen');
            } else {
                alert("鍵を持っていない！");
            }
        }
    }

    function showPuzzle(title, hint) {
        document.getElementById('puzzle-title').innerText = title;
        document.getElementById('puzzle-hint').innerText = hint;
        changeScreen('puzzle-screen');
    }

    function checkPuzzle() {
        const val = document.getElementById('puzzle-input').value;
        if (val === "841") {
            alert("カチリ！金庫が開いた。中から「銀の鍵」を手に入れた！");
            state.safeOpened = true;
            state.hasKey = true;
            document.getElementById('slot2').innerText = '🔑';
            showMain();
        } else {
            alert("番号が違うようだ...");
        }
    }

    function showMain() {
        changeScreen('main-screen');
        renderLocation(state.currentLocation);
    }

    function changeScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }
</script>

</body>
</html>
