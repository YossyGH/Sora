<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D Escape - Realistic Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; }
        #inventory { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .slot { width: 60px; height: 60px; border: 2px solid #555; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; font-size: 30px; border-radius: 8px; }
        .slot.selected { border-color: #00bcd4; box-shadow: 0 0 10px #00bcd4; }
        #msg-box { position: absolute; bottom: 30px; width: 100%; text-align: center; }
        #text { display: inline-block; background: rgba(0,0,0,0.8); padding: 10px 30px; border-radius: 20px; border-left: 5px solid #00bcd4; }
        #guide { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 10px; font-size: 12px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="ui">
    <div id="inventory">
        <div id="slot-0" class="slot"></div>
        <div id="slot-1" class="slot"></div>
    </div>
    <div id="guide">移動: WASD / 視点: マウス / 調べる: クリック / 使う: Shift</div>
    <div id="msg-box"><div id="text">画面をクリックして開始</div></div>
</div>

<div style="position:absolute; top:50%; left:50%; width:6px; height:6px; background:#00bcd4; border-radius:50%; transform:translate(-50%,-50%); pointer-events:none; opacity:0.7;"></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- 設定と状態 ---
    const state = { inv: [], sel: -1, currentRoom: 1, room1Solved: false };
    const items = {
        key: { name: "鉄の鍵", icon: "🗝️" },
        handle: { name: "ハンドル", icon: "⚙️" }
    };

    // --- シーン構築 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // 照明 (リアルな影のため)
    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);
    const light = new THREE.PointLight(0xffffff, 50, 20);
    light.position.set(0, 5, 0);
    light.castShadow = true;
    scene.add(light);

    // --- リアルな「棚」の作成 ---
    function createShelf(x, z, parent) {
        const group = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ color: 0x4a2c1a, roughness: 0.7 });
        
        // 背板
        const back = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 0.1), mat);
        back.position.set(0, 2, 0);
        group.add(back);

        // 棚板 (3枚)
        for(let i=0; i<=2; i++) {
            const plate = new THREE.Mesh(new THREE.BoxGeometry(2, 0.1, 0.8), mat);
            plate.position.set(0, i * 1.5 + 0.5, 0.4);
            plate.receiveShadow = true;
            group.add(plate);
        }

        // 側板
        const sideL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 4, 0.8), mat);
        sideL.position.set(-1, 2, 0.4);
        group.add(sideL);
        const sideR = new THREE.Mesh(new THREE.BoxGeometry(0.1, 4, 0.8), mat);
        sideR.position.set(1, 2, 0.4);
        group.add(sideR);

        group.position.set(x, 0, z);
        parent.add(group);
        return group;
    }

    // 部屋の作成
    const room = new THREE.Mesh(
        new THREE.BoxGeometry(15, 8, 15),
        new THREE.MeshStandardMaterial({ color: 0x555555, side: THREE.BackSide })
    );
    room.position.y = 4;
    scene.add(room);

    // 家具配置
    const shelf = createShelf(-6, -3, scene);
    shelf.name = "shelf";

    const door = new THREE.Mesh(new THREE.BoxGeometry(2, 5, 0.2), new THREE.MeshStandardMaterial({color: 0x332211}));
    door.position.set(0, 2.5, -7.4);
    door.name = "door";
    scene.add(door);

    camera.position.set(0, 3, 5);

    // --- 操作ロジック ---
    const keys = {};
    let yaw = 0, pitch = 0;

    window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'Space') cycleItem(); });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    renderer.domElement.addEventListener('click', () => {
        renderer.domElement.requestPointerLock();
    });

    document.addEventListener('mousemove', e => {
        if (document.pointerLockElement === renderer.domElement) {
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
        }
    });

    // メインループ
    function animate() {
        if (document.pointerLockElement === renderer.domElement) {
            const f = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw)).multiplyScalar(0.1);
            const r = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw)).multiplyScalar(0.1);
            if (keys['KeyW']) camera.position.add(f);
            if (keys['KeyS']) camera.position.sub(f);
            if (keys['KeyA']) camera.position.sub(r);
            if (keys['KeyD']) camera.position.add(r);
        }
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }
    animate();

    // クリック判定
    window.addEventListener('mousedown', () => {
        if (document.pointerLockElement !== renderer.domElement) return;
        const ray = new THREE.Raycaster();
        ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const hit = ray.intersectObjects(scene.children, true);

        if (hit.length > 0 && hit[0].distance < 5) {
            const obj = hit[0].object;
            // 親を遡って名前を確認
            let target = obj;
            while(target.parent && !target.name) target = target.parent;

            if (target.name === "shelf") {
                if(!state.inv.includes("key")) {
                    state.inv.push("key");
                    notify("棚の間から「鉄の鍵」を見つけた！");
                    updateUI();
                }
            } else if (target.name === "door") {
                if(state.inv[state.sel] === "key") {
                    notify("鍵が開いた！脱出成功！");
                    target.position.y += 5; // ドアが上がる
                } else {
                    notify("鍵がかかっているようだ。");
                }
            }
        }
    });

    function notify(t) { document.getElementById('text').innerText = t; }
    function updateUI() {
        for(let i=0; i<2; i++) {
            const s = document.getElementById(`slot-${i}`);
            s.innerHTML = state.inv[i] ? items[state.inv[i]].icon : "";
            s.classList.toggle('selected', i === state.sel);
        }
    }
    function cycleItem() {
        if(state.inv.length > 0) {
            state.sel = (state.sel + 1) % state.inv.length;
            updateUI();
        }
    }
</script>
</body>
</html>
