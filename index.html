<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>THE THREE ROOMS - ULTIMATE FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; color: white; }
        
        /* 操作ガイド */
        #guide { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); color: #fff; padding: 15px; border-radius: 8px; font-size: 13px; z-index: 500; border-left: 5px solid #e74c3c; pointer-events: none; }
        .k { background: #444; padding: 2px 5px; border-radius: 3px; color: #ffeb3b; font-weight: bold; }

        /* インベントリ */
        #inv { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 500; }
        .slot { width: 90px; height: 90px; background: rgba(10,10,10,0.9); border: 2px solid #444; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: 0.3s; }
        .slot.active { border-color: #e74c3c; box-shadow: 0 0 15px rgba(231,76,60,0.8); background: rgba(231,76,60,0.2); }
        .slot-name { font-size: 10px; margin-top: 5px; color: #aaa; }

        /* メッセージボックス */
        #msg-box { position: absolute; bottom: 50px; width: 100%; text-align: center; pointer-events: none; z-index: 1000; }
        #msg-text { display: inline-block; background: rgba(0,0,0,0.95); color: #fff; padding: 20px 40px; border: 3px solid #e74c3c; font-size: 20px; border-radius: 10px; min-width: 400px; box-shadow: 0 0 20px rgba(0,0,0,1); }

        /* 金庫UI */
        #safe-ui { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2c3e50; padding: 30px; border-radius: 15px; z-index: 5000; border: 4px solid #fff; }
        #safe-disp { font-size: 40px; width: 200px; text-align: center; margin-bottom: 20px; background: #000; color: #2ecc71; border: none; font-family: monospace; }
        .numpad { display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; }
        .numpad button { height: 60px; cursor: pointer; background: #34495e; color: white; border: 1px solid #7f8c8d; font-size: 24px; }

        /* ルーム3専用の巨大テロップ：アニメーション付き */
        #telop { 
            position: fixed; top: 35%; width: 100%; text-align: center; 
            color: #ffeb3b; font-size: 48px; font-weight: bold; 
            z-index: 9999; text-shadow: 0 0 20px #000; 
            pointer-events: none; visibility: hidden;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.8); visibility: visible; }
            20% { opacity: 1; transform: scale(1.1); }
            80% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.2); visibility: hidden; }
        }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="font-size: 48px;">THE THREE ROOMS</h1>
    <p>論理を解き、脱出せよ</p>
    <button style="padding:20px 60px; cursor:pointer; font-size:24px; font-weight:bold; background:#27ae60; color:white; border:none; border-radius:50px;" onclick="startGame()">探索開始</button>
</div>

<div id="guide">
    <div style="color:#e74c3c; font-weight:bold; margin-bottom:8px;">【 操作方法 】</div>
    <span class="k">↑ ↓ ← →</span> 移動<br>
    <span class="k">マウス</span> 視点操作<br>
    <span class="k">SPACE</span> 調べる / 使う<br>
    <span class="k">TAB</span> アイテム切り替え
</div>

<div id="inv">
    <div id="s0" class="slot active"><div class="icon" style="font-size:40px"></div><div class="slot-name">Slot 1</div></div>
    <div id="s1" class="slot"><div class="icon" style="font-size:40px"></div><div class="slot-name">Slot 2</div></div>
    <div id="s2" class="slot"><div class="icon" style="font-size:40px"></div><div class="slot-name">Slot 3</div></div>
</div>

<div id="telop">ヒント：『黄色は赤の直後ではない』</div>
<div id="msg-box"><div id="msg-text">扉の向こうに自由がある。</div></div>

<div id="safe-ui">
    <input type="text" id="safe-disp" readonly>
    <div class="numpad" id="btns"></div>
    <button onclick="checkSafe()" style="width:100%; margin-top:20px; padding:20px; background:#27ae60; color:white; border:none; cursor:pointer; font-weight:bold; font-size:20px;">解除コードを入力</button>
</div>

<script>
let scene, camera, renderer, yaw = 0, pitch = 0, keys = {};
const player = { inv: [null, null, null], sel: 0, isUI: false, r3Ready: true };
const world = { d1: false, d2: false, chairState: 0, puzzle: [] };

const ITEM_DATA = {
    key1: { icon: "🗝️", name: "真鍮の鍵" },
    card: { icon: "💳", name: "認証カード" },
    key2: { icon: "🔑", name: "黄金の鍵" }
};

function startGame() {
    document.getElementById('overlay').style.display = 'none';
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    [0, 22, 44].forEach(x => {
        let p = new THREE.PointLight(0xffffff, 1.2, 40); p.position.set(x, 7, 0); scene.add(p);
    });

    createRoom(0, 0x2c1e14); createRoom(22, 0x0f260f); createRoom(44, 0x0f0f26);

    // 壺
    const v = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1.2), new THREE.MeshStandardMaterial({color: 0x00bcd4}));
    v.position.set(-6, 0.6, -6); v.name = "vase"; scene.add(v);

    // 扉1
    const d1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 4), new THREE.MeshStandardMaterial({color: 0x3e2723}));
    d1.position.set(8, 3, 0); d1.name = "door1"; scene.add(d1);

    // 椅子
    const ch = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 1.8), new THREE.MeshStandardMaterial({color: 0x880e4f}));
    ch.position.set(24, 0.3, 5); ch.name = "chair"; scene.add(ch);

    // 金庫
    const s = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshStandardMaterial({color: 0x111}));
    s.position.set(29, 0.75, -6); s.name = "safe"; scene.add(s);
    
    // 扉2
    const d2 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 4), new THREE.MeshStandardMaterial({color: 0x000}));
    d2.position.set(30, 3, 0); d2.name = "door2"; scene.add(d2);

    // パズルの柱
    createP(40, -5, 0xff3333, "red"); createP(46, -5, 0x3333ff, "blue");
    createP(40, 5, 0xffff33, "yellow"); createP(46, 5, 0x33ff33, "green");

    // ゴール
    const ex = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 4), new THREE.MeshStandardMaterial({color: 0xffd700}));
    ex.position.set(52, 3, 0); ex.name = "exit"; scene.add(ex);

    const b = document.getElementById('btns');
    for(let i=1; i<=9; i++) {
        let btn = document.createElement('button'); btn.innerText = i;
        btn.onclick = () => document.getElementById('safe-disp').value += i;
        b.appendChild(btn);
    }

    camera.position.set(0, 3, 8);
    renderer.domElement.requestPointerLock();
    animate();
}

function createRoom(x, col) {
    const box = new THREE.Mesh(new THREE.BoxGeometry(16, 9, 16), new THREE.MeshStandardMaterial({color: col, side: 1}));
    box.position.set(x, 4.5, 0); scene.add(box);
}

function createP(x, z, col, id) {
    const g = new THREE.Group();
    const o = new THREE.Mesh(new THREE.OctahedronGeometry(0.8), new THREE.MeshStandardMaterial({color: col, emissive: col, emissiveIntensity: 0.6}));
    o.position.y = 4; o.name = "n_" + id; o.userData = { originalColor: col };
    g.add(o); g.position.set(x, 1.75, z); scene.add(g);
}

function addToInv(id) {
    if (player.inv.includes(id)) return;
    const emptySlot = player.inv.indexOf(null);
    if (emptySlot !== -1) {
        player.inv[emptySlot] = id;
        if(id === "key2") player.sel = 2; 
        updateUI();
    }
}

function interact() {
    const r = new THREE.Raycaster(); r.setFromCamera(new THREE.Vector2(0,0), camera);
    const h = r.intersectObjects(scene.children, true);
    if(h.length > 0 && h[0].distance < 6) {
        const o = h[0].object; 
        const item = player.inv[player.sel];
        
        if(o.name === "vase") { 
            addToInv("key1");
            showMsg("壺の底から【真鍮の鍵】と【古い銀貨1枚】を見つけた！"); 
        }
        else if(o.name === "door1") { 
            if(item === "key1") { o.position.y += 8; world.d1 = true; showMsg("扉が開いた。Room 2へ。"); } 
            else showMsg("扉は閉まっている。古い鍵が必要だ。"); 
        }
        else if(o.name === "chair") { 
            if(world.chairState === 0) {
                o.position.x -= 4; // 大きく動かす
                world.chairState = 1;
                showMsg("椅子を動かした！座面裏に数式を発見：『PASS = (椅子の数1 + コイン数1) × 441』");
            } else {
                showMsg("数式が刻まれている：『PASS = (椅子の数1 + コイン数1) × 441』");
            }
        }
        else if(o.name === "safe") { 
            if(world.chairState === 1) { 
                player.isUI = true; document.getElementById('safe-ui').style.display='block'; document.exitPointerLock(); 
            } else showMsg("金庫だ。番号の手がかりが必要だ。");
        }
        else if(o.name === "door2") { 
            if(item === "card") { o.position.y += 8; world.d2 = true; showMsg("認証完了。Room 3へ進め。"); } 
            else showMsg("カードキーが必要だ。"); 
        }
        else if(o.name.startsWith("n_")) {
            const id = o.name.split("_")[1]; world.puzzle.push(id); 
            o.material.emissive.set(0xffffff); o.material.emissiveIntensity = 15;
            if(world.puzzle.length === 4) {
                if(world.puzzle.join(",") === "red,blue,yellow,green") { 
                    addToInv("key2"); showMsg("パズル正解！【黄金の鍵】を手に入れた！"); 
                } else { 
                    world.puzzle = []; showMsg("順序が違う。リセットされた。"); 
                    scene.traverse(obj => { if(obj.name?.startsWith("n_")) { obj.material.emissive.set(obj.userData.originalColor); obj.material.emissiveIntensity = 0.6; } });
                }
            }
        }
        else if(o.name === "exit") { 
            if(item === "key2") { alert("脱出成功！おめでとう！"); location.reload(); } 
            else showMsg("最後の扉だ。黄金の鍵が必要だ。");
        }
    }
}

function showMsg(txt) {
    const el = document.getElementById('msg-text');
    el.innerHTML = txt; // 強制上書き
}

function checkSafe() {
    if(document.getElementById('safe-disp').value === "882") {
        addToInv("card"); showMsg("金庫が開いた！【認証カード】を入手。"); 
        player.isUI = false; document.getElementById('safe-ui').style.display='none';
        renderer.domElement.requestPointerLock();
    } else { 
        document.getElementById('safe-disp').value = ""; 
        showMsg("番号が正しくない。");
    }
}

function updateUI() {
    for(let i=0; i<3; i++){
        const s = document.getElementById('s'+i); 
        const k = player.inv[i];
        s.querySelector('.icon').innerText = k ? ITEM_DATA[k].icon : "";
        s.querySelector('.slot-name').innerText = k ? ITEM_DATA[k].name : "Slot " + (i+1);
        s.className = (i === player.sel) ? "slot active" : "slot";
    }
}

function animate() {
    if(!player.isUI) {
        const move = new THREE.Vector3();
        const fwd = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        const rgt = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        if(keys['ArrowUp']) move.add(fwd); if(keys['ArrowDown']) move.add(fwd.negate());
        if(keys['ArrowLeft']) move.add(rgt.negate()); if(keys['ArrowRight']) move.add(rgt);
        if(move.length() > 0) camera.position.addScaledVector(move.normalize(), 0.2);

        // Room 3 突入テロップ：CSSアニメーションで強制発火
        if(player.r3Ready && camera.position.x > 36) {
            player.r3Ready = false;
            const t = document.getElementById('telop');
            t.style.animation = "fadeInOut 6s forwards";
            showMsg("第三の部屋。空中にヒントが浮かび上がった。");
        }

        camera.position.x = Math.max(-7, Math.min(51, camera.position.x));
        camera.position.z = Math.max(-7, Math.min(7, camera.position.z));
        if(!world.d1 && camera.position.x > 7.4) camera.position.x = 7.4;
        if(!world.d2 && camera.position.x > 29.4) camera.position.x = 29.4;
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
    }
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(e.code === 'Space' && !player.isUI) interact();
    if(e.code === 'Tab') { 
        e.preventDefault(); 
        player.sel = (player.sel + 1) % 3; 
        updateUI(); 
    }
});
window.addEventListener('keyup', e => keys[e.code] = false);
document.addEventListener('mousemove', e => { 
    if (document.pointerLockElement) { 
        yaw -= e.movementX * 0.002; 
        pitch = Math.max(-1.4, Math.min(1.4, pitch - e.movementY * 0.002)); 
    } 
});
</script>
</body>
</html>
