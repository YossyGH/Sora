<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>THE THREE ROOMS - ULTIMATE LOGIC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Meiryo', sans-serif; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #2c3e50, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; color: white; }
        .btn-start { background: #27ae60; color: white; border: none; padding: 20px 60px; font-size: 24px; font-weight: bold; border-radius: 50px; cursor: pointer; margin-top: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        
        /* UI: 右上ガイド */
        #guide { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); color: #fff; padding: 15px; border-radius: 8px; border-left: 5px solid #2ecc71; font-size: 13px; line-height: 1.6; z-index: 500; }
        .k { background: #444; padding: 2px 5px; border-radius: 3px; color: #2ecc71; font-weight: bold; }

        /* UI: インベントリ */
        #inv { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 500; }
        .slot { width: 90px; height: 90px; background: rgba(10,10,10,0.9); border: 2px solid #444; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: 0.3s; }
        .slot.active { border-color: #2ecc71; box-shadow: 0 0 15px #2ecc71; background: rgba(46,204,113,0.1); }
        .slot-icon { font-size: 35px; }
        .slot-label { font-size: 10px; color: #888; margin-top: 5px; }

        /* UI: メッセージ */
        #msg-box { position: absolute; bottom: 40px; width: 100%; text-align: center; pointer-events: none; }
        #msg-text { display: inline-block; background: rgba(0,0,0,0.9); color: white; padding: 15px 40px; border-radius: 5px; border-bottom: 3px solid #2ecc71; font-size: 18px; min-width: 400px; }

        /* UI: アイテム詳細(SHIFT) */
        #inspect { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .ins-card { background: #111; padding: 50px; border: 1px solid #333; border-radius: 20px; max-width: 500px; }

        /* UI: 金庫 */
        #safe-ui { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2c3e50; padding: 30px; border-radius: 15px; z-index: 1500; border: 4px solid #bdc3c7; }
        #safe-disp { font-size: 40px; width: 100%; background: #000; color: #2ecc71; text-align: center; margin-bottom: 15px; border: none; }
        .numpad { display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; }
        .numpad button { height: 60px; font-size: 20px; cursor: pointer; background: #34495e; color: white; border: 1px solid #7f8c8d; }

        /* UI: テロップ */
        #telop { position: fixed; top: 30%; width: 100%; text-align: center; color: #e74c3c; font-size: 45px; font-weight: bold; opacity: 0; transition: 1.5s; pointer-events: none; z-index: 1000; text-shadow: 0 0 20px rgba(231,76,60,0.7); }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="font-size: 50px;">THE THREE ROOMS</h1>
    <p>論理と観察が、唯一の鍵となる。</p>
    <button class="btn-start" onclick="startGame()">脱出を開始する</button>
</div>

<div id="guide">
    <span class="k">W A S D</span> 移動 / <span class="k">Q E</span> 旋回<br>
    <span class="k">SPACE</span> 調べる・使う<br>
    <span class="k">TAB</span> アイテム選択切替<br>
    <span class="k">SHIFT</span> <b>手元で詳細を確認(重要)</b>
</div>

<div id="inv">
    <div id="s0" class="slot active"><div class="slot-icon"></div><div class="slot-label">Slot 1</div></div>
    <div id="s1" class="slot"><div class="slot-icon"></div><div class="slot-label">Slot 2</div></div>
</div>

<div id="telop">ROOM 3: 断絶された論理</div>

<div id="msg-box"><div id="msg-text">この場所から脱出しなければならない。</div></div>

<div id="inspect">
    <div class="ins-card">
        <div id="ins-icon" style="font-size: 100px; margin-bottom: 20px;"></div>
        <h2 id="ins-title" style="color: #2ecc71;">アイテム名</h2>
        <p id="ins-desc" style="line-height: 1.8; color: #ccc; font-size: 18px;"></p>
        <p style="margin-top: 30px; font-size: 14px; color: #555;">[ SHIFT ] キーで閉じる</p>
    </div>
</div>

<div id="safe-ui">
    <input type="text" id="safe-disp" readonly>
    <div class="numpad" id="numpad-btns"></div>
    <button onclick="checkSafe()" style="width:100%; margin-top:15px; padding:10px; background:#27ae60; color:white; border:none; font-weight:bold; cursor:pointer;">決定</button>
    <button onclick="closeSafe()" style="width:100%; margin-top:5px; background:none; border:none; color:#bdc3c7; cursor:pointer;">閉じる</button>
</div>

<script>
let scene, camera, renderer, yaw = 0, pitch = 0, keys = {};
const player = { inv: [], sel: 0, isUI: false, inIns: false, r3: false };
const world = { d1: false, d2: false, chair: false, puzzle: [] };

const ITEM_DATA = {
    key1: { icon: "🗝️", name: "真鍮の鍵", desc: "Room1の扉を開ける鍵。裏側に針で引っ掻いたような跡がある...『赤は青より前だが、直前ではない』" },
    card: { icon: "💳", name: "認証カード", desc: "Room2を突破した証。端の方に極小の文字で印字されている...『青は2番目である』" },
    key2: { icon: "🔑", name: "黄金の鍵", desc: "脱出の扉を開く最後の鍵。" }
};

function startGame() {
    document.getElementById('overlay').style.display = 'none';
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 強力な照明設定
    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    [0, 22, 44].forEach(x => {
        let p = new THREE.PointLight(0xffffff, 1.2, 30);
        p.position.set(x, 7, 0); scene.add(p);
    });

    createRoom(0, 0x3d2b1f);
    createRoom(22, 0x1a331a);
    createRoom(44, 0x1a1a33);

    // Room 1
    const vase = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 1), new THREE.MeshStandardMaterial({color: 0x00bcd4}));
    vase.position.set(-6, 1.5, -6); vase.name = "vase"; scene.add(vase);
    const door1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), new THREE.MeshStandardMaterial({color: 0x3e2723}));
    door1.position.set(8, 3, 0); door1.name = "door1"; scene.add(door1);

    // Room 2
    const chair = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.5, 1.5), new THREE.MeshStandardMaterial({color: 0x880e4f}));
    chair.position.set(24, 0.25, 5); chair.name = "chair"; scene.add(chair);
    const safe = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshStandardMaterial({color: 0x111, metalness: 0.8}));
    safe.position.set(29, 0.6, -6); safe.name = "safe"; scene.add(safe);
    const door2 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), new THREE.MeshStandardMaterial({color: 0x000}));
    door2.position.set(30, 3, 0); door2.name = "door2"; scene.add(door2);
    
    // Room 2 ヒント壁
    scene.add(createText("緑 ≠ 1, 3", 14.1, 1.5, 6, Math.PI/2)); 

    // Room 3 Pillars (4色)
    createP(40, -5, 0xff3333, "red");    // 赤
    createP(46, -5, 0x3333ff, "blue");   // 青
    createP(40, 5, 0xffff33, "yellow");  // 黄
    createP(46, 5, 0x33ff33, "green");   // 緑
    const exit = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), new THREE.MeshStandardMaterial({color: 0xffd700}));
    exit.position.set(52, 3, 0); exit.name = "exit"; scene.add(exit);

    // Numpad setup
    const btns = document.getElementById('numpad-btns');
    for(let i=1; i<=9; i++) {
        let b = document.createElement('button'); b.innerText = i;
        b.onclick = () => document.getElementById('safe-disp').value += i;
        btns.appendChild(b);
    }

    camera.position.set(0, 3, 8);
    renderer.domElement.requestPointerLock();
    renderer.domElement.onclick = () => { if(!player.isUI && !player.inIns) renderer.domElement.requestPointerLock(); };
    updateUI();
    animate();
}

function createRoom(x, col) {
    const box = new THREE.Mesh(new THREE.BoxGeometry(16, 9, 16), new THREE.MeshStandardMaterial({color: col, side: 1}));
    box.position.set(x, 4.5, 0); scene.add(box);
    const f = new THREE.Mesh(new THREE.PlaneGeometry(16, 16), new THREE.MeshStandardMaterial({color: 0x222}));
    f.rotation.x = -Math.PI/2; f.position.x = x; scene.add(f);
}

function createText(t, x, y, z, ry) {
    const cv = document.createElement('canvas'); const cx = cv.getContext('2d');
    cv.width = 256; cv.height = 64; cx.fillStyle = "white"; cx.font = "bold 35px Arial"; cx.fillText(t, 10, 45);
    const m = new THREE.Mesh(new THREE.PlaneGeometry(3, 0.75), new THREE.MeshBasicMaterial({map: new THREE.CanvasTexture(cv), transparent: true}));
    m.position.set(x,y,z); m.rotation.y = ry; return m;
}

function createP(x, z, col, id) {
    const g = new THREE.Group();
    g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 3.5), new THREE.MeshStandardMaterial({color: 0})));
    const o = new THREE.Mesh(new THREE.OctahedronGeometry(0.7), new THREE.MeshStandardMaterial({color: col, emissive: col, emissiveIntensity: 0.6}));
    o.position.y = 4; o.name = "n_" + id; g.add(o);
    g.position.set(x, 1.75, z); scene.add(g);
}

function interact() {
    const r = new THREE.Raycaster(); r.setFromCamera(new THREE.Vector2(0,0), camera);
    const h = r.intersectObjects(scene.children, true);
    if(h.length > 0 && h[0].distance < 6) {
        const o = h[0].object; const item = player.inv[player.sel];
        if(o.name === "vase") { if(!player.inv.includes("key1")) { player.inv.push("key1"); updateUI(); notify("真鍮の鍵を入手。SHIFTキーで詳細を確認せよ。"); } }
        else if(o.name === "door1") { if(item === "key1") { o.position.y += 8; world.d1 = true; notify("Room 1 開放。"); } else notify("鍵が必要だ。"); }
        else if(o.name === "chair") { if(!world.chair) { o.position.x -= 3; world.chair = true; notify("椅子を動かした。裏に『X=42, PASS=X*21』とある。"); } }
        else if(o.name === "safe") { if(world.chair) { player.isUI = true; document.getElementById('safe-ui').style.display='block'; document.exitPointerLock(); } else notify("番号の手がかりがない。"); }
        else if(o.name === "door2") { if(item === "card") { o.position.y += 8; world.d2 = true; notify("Room 2 開放。"); } else notify("カード認証が必要だ。"); }
        else if(o.name.startsWith("n_")) {
            const id = o.name.split("_")[1]; world.puzzle.push(id); o.material.emissiveIntensity = 10;
            if(world.puzzle.length === 4) {
                if(world.puzzle.join(",") === "red,blue,yellow,green") { player.inv.push("key2"); updateUI(); notify("パズル解錠！黄金の鍵を入手。"); }
                else { world.puzzle = []; notify("不正解。配列がリセットされた。"); scene.traverse(obj => { if(obj.name?.startsWith("n_")) obj.material.emissiveIntensity = 0.6; }); }
            }
        }
        else if(o.name === "exit") { if(item === "key2") { notify("脱出成功！おめでとう！"); setTimeout(()=>location.reload(), 3000); } else notify("黄金の鍵が必要だ。"); }
    }
}

function toggleInspect() {
    const k = player.inv[player.sel]; if(!k) return;
    player.inIns = !player.inIns;
    const d = document.getElementById('inspect');
    if(player.inIns) {
        d.style.display = 'flex'; document.getElementById('ins-icon').innerText = ITEM_DATA[k].icon;
        document.getElementById('ins-title').innerText = ITEM_DATA[k].name; document.getElementById('ins-desc').innerText = ITEM_DATA[k].desc;
    } else d.style.display = 'none';
}

function checkSafe() {
    if(document.getElementById('safe-disp').value === "882") {
        player.inv.push("card"); updateUI(); notify("金庫が開いた。認証カードを入手。"); closeSafe();
    } else { notify("番号が違う。"); document.getElementById('safe-disp').value = ""; }
}
function closeSafe() { player.isUI = false; document.getElementById('safe-ui').style.display='none'; }
function notify(t) { document.getElementById('msg-text').innerText = t; }

function updateUI() {
    for(let i=0; i<2; i++){
        const s = document.getElementById('s'+i); const k = player.inv[i];
        s.querySelector('.slot-icon').innerText = k ? ITEM_DATA[k].icon : "";
        s.querySelector('.slot-label').innerText = k ? ITEM_DATA[k].name : "Slot "+(i+1);
        s.className = (i === player.sel) ? "slot active" : "slot";
    }
}

function animate() {
    if(!player.isUI && !player.inIns) {
        if(keys['KeyQ']) yaw += 0.04; if(keys['KeyE']) yaw -= 0.04;
        const move = new THREE.Vector3();
        const fwd = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        const rgt = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        if(keys['KeyW']) move.add(fwd); if(keys['KeyS']) move.add(fwd.negate());
        if(keys['KeyA']) move.add(rgt.negate()); if(keys['KeyD']) move.add(rgt);
        if(move.length() > 0) camera.position.addScaledVector(move.normalize(), 0.18);

        if(!player.r3 && camera.position.x > 36) {
            player.r3 = true;
            const t = document.getElementById('telop'); t.style.opacity = 1;
            setTimeout(()=>t.style.opacity = 0, 4000);
            notify("最後のヒント：『黄色は赤の直後ではない』");
        }
        camera.position.x = Math.max(-7, Math.min(51, camera.position.x));
        camera.position.z = Math.max(-7, Math.min(7, camera.position.z));
        if(!world.d1 && camera.position.x > 7.4) camera.position.x = 7.4;
        if(!world.d2 && camera.position.x > 29.4) camera.position.x = 29.4;
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
    }
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(e.code === 'Space' && !player.isUI && !player.inIns) interact();
    if(e.code === 'Tab') { e.preventDefault(); player.sel = 1 - player.sel; updateUI(); }
    if(e.code.includes('Shift')) toggleInspect();
});
window.addEventListener('keyup', e => keys[e.code] = false);
</script>
</body>
</html>
