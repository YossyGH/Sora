<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Escape - Standard Room</title>
    <style>
        :root {
            --wall: #f4f1ea; /* 温かみのある白 */
            --floor: #8b5a2b; /* フローリング風 */
            --accent: #2c3e50;
        }
        body, html { margin: 0; padding: 0; height: 100vh; background: #333; color: #333; font-family: "Helvetica Neue", Arial, sans-serif; overflow: hidden; }
        
        /* 3D 空間の設定 */
        #viewport {
            width: 100vw; height: 50vh;
            perspective: 1000px;
            background: #aad; /* 窓の外の空の色 */
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        #world {
            width: 400px; height: 400px;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .wall {
            position: absolute; width: 400px; height: 400px;
            border: 1px solid #ddd;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backface-visibility: hidden;
        }

        /* 壁の装飾と配置 */
        .front  { transform: translateZ(200px); background: var(--wall); }
        .back   { transform: rotateY(180deg) translateZ(200px); background: var(--wall); }
        .left   { transform: rotateY(-90deg) translateZ(200px); background: #ebe8e0; }
        .right  { transform: rotateY(90deg) translateZ(200px); background: #ebe8e0; }
        .floor  { transform: rotateX(-90deg) translateZ(200px); background: var(--floor); box-shadow: inset 0 0 100px rgba(0,0,0,0.2); }
        .ceiling { transform: rotateX(90deg) translateZ(200px); background: #fff; }

        /* 家具のシンボル */
        .obj { font-size: 5rem; cursor: pointer; transition: 0.2s; user-select: none; }
        .obj:hover { transform: scale(1.1); }
        .label { font-weight: bold; margin-top: 10px; background: rgba(255,255,255,0.8); padding: 2px 10px; border-radius: 10px; font-size: 0.8rem; }

        /* UIエリア */
        #ui { height: 50vh; background: #fff; display: flex; flex-direction: column; }
        #log { flex: 1; padding: 15px; font-size: 0.95rem; border-bottom: 1px solid #eee; overflow-y: auto; line-height: 1.6; }
        
        /* 十字キー / コントローラー */
        .controller {
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 50px 50px;
            gap: 10px;
            justify-content: center;
            padding: 20px;
            background: #f9f9f9;
        }
        .btn {
            background: #eee; border: 1px solid #ccc; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer; user-select: none;
        }
        .btn:active { background: #ddd; transform: translateY(2px); }
        .btn-large { grid-column: span 3; background: var(--accent); color: #fff; font-size: 0.9rem; font-weight: bold; margin-top: 5px;}

        /* 入力ボックス */
        #input-box { padding: 10px 20px; display: flex; gap: 10px; background: #f9f9f9; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 5px; font-size: 1.2rem; text-align: center; }

        /* クリア画面 */
        #clear {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.95); display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
    </style>
</head>
<body>

<div id="viewport">
    <div id="world">
        <div class="wall front">
            <div class="obj" onclick="interact('door')">🚪</div>
            <div class="label">出口のドア</div>
        </div>
        <div class="wall back">
            <div class="obj" onclick="interact('desk')">🛋️</div>
            <div class="label">ソファ</div>
        </div>
        <div class="wall left">
            <div class="obj" onclick="interact('plant')">🪴</div>
            <div class="label">観葉植物</div>
        </div>
        <div class="wall right">
            <div class="obj" onclick="interact('shelf')">📦</div>
            <div class="label">収納ボックス</div>
        </div>
        <div class="wall floor"></div>
        <div class="wall ceiling"></div>
    </div>
</div>

<div id="ui">
    <div id="log">普通の部屋に閉じ込められたようだ。矢印ボタンで周囲を調べ、脱出用の4桁の暗証番号を見つけよう。</div>
    
    <div id="input-box">
        <input type="number" id="pass" placeholder="0000">
    </div>

    <div class="controller">
        <div></div>
        <div class="btn" onclick="rotate(180)">↑</div>
        <div></div>
        <div class="btn" onclick="rotate(-90)">←</div>
        <div class="btn" onclick="rotate(0)">●</div>
        <div class="btn" onclick="rotate(90)">→</div>
