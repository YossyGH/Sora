<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Realistic & Complex Escape - 3 Rooms</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Hiragino Kaku Gothic Pro', 'ヒラギノ角ゴ Pro W3', sans-serif; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 1000; color: white; }
        #start-btn { padding: 25px 80px; font-size: 28px; background: #007bff; border: none; color: white; cursor: pointer; border-radius: 60px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s; }
        #start-btn:hover { background: #0056b3; transform: scale(1.05); }

        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #inventory { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .slot { width: 80px; height: 80px; border: 5px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; font-size: 45px; border-radius: 20px; color: white; transition: 0.2s; }
        .slot.selected { border-color: #007bff; box-shadow: 0 0 25px #007bff; background: rgba(0,0,0,0.8); transform: scale(1.1); }

        #controls-guide { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 15px; border: 3px solid #007bff; color: white; font-size: 15px; line-height: 1.8; font-weight: bold; pointer-events: auto; }
        #msg-box { position: absolute; bottom: 40px; width: 100%; text-align: center; }
        #text { display: inline-block; background: rgba(0,0,0,0.7); color: white; padding: 20px 60px; border-radius: 50px; border: 4px solid #007bff; font-size: 20px; font-weight: bold; min-width: 400px; text-shadow: 0 0 5px rgba(0,0,0,0.5); }
        
        /* 金庫・装置入力パネル */
        #input-panel { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(30,30,30,0.95); padding: 40px; border-radius: 30px; border: 6px solid #007bff; pointer-events: auto; text-align: center; z-index: 2000; color: white; }
        #input-panel h2 { color: #007bff; margin-bottom: 25px; }
        #input-panel input { font-size: 40px; width: 220px; text-align: center; border: 3px solid #007bff; background: #111; color: white; border-radius: 15px; margin-bottom: 20px; outline: none; padding: 10px; }
        #input-panel button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; margin: 5px; font-weight: bold; background: #007bff; color: white; }
        #input-panel button.close { background: #555; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="font-size: 50px; margin-bottom: 10px;">🌌 忘れ去られた現実 🌌</h1>
    <p style="margin-bottom: 40px; font-size: 18px;">〜３つの部屋の謎を解き明かせ〜</p>
    <button id="start-btn">冒険をはじめる！</button>
</div>

<div id="ui">
    <div id="inventory"><div id="slot-0" class="slot"></div><div id="slot-1" class="slot"></div></div>
    <div id="controls-guide">
        【操作パネル】<br>
        🏃 移動：矢印キー (↑ ↓ ← →)<br>
        🔄 視点：マウスを動かす<br>
        🖱️ 調べる：左クリック<br>
        📦 選択：Spaceキー<br>
        📝 詳細：Enterキー<br>
        🔑 使用：Shiftキー
    </div>
    <div id="msg-box"><div id="text"></div></div>
    
    <div id="input-panel">
        <h2 id="input-panel-title">パスコード入力</h2>
        <input type="text" id="panel-input" placeholder="0000"><br>
        <button id="panel-submit">確定</button>
        <button id="panel-close" class="close">閉じる</button>
    </div>
</div>

<script>
    // --- グローバル状態管理 ---
    const state = { 
        inv: [], sel: -1, 
        door1Open: false, room2DoorOpen: false, exitOpen: false,
        chairMoved: false, rabbitNote: false,
        safeCodeFound: false, deviceActivated: false,
        room2CodePart1: null, room2CodePart2: null, room2CodePart3: null, // 書斎の謎の破片
        undergroundCodePart1: null, undergroundCodePart2: null, // 地下室の謎の破片
    };

    const items = { 
        key1: { icon: "🗝️", name: "古い真鍮の鍵", desc: "錆びついているが、まだ使える。次の部屋への扉を開くようだ。" },
        cipher_sheet: { icon: "📜", name: "謎の暗号シート", desc: "奇妙な記号が並んだ紙切れ。何かを解読するためのようだ。" },
        key2: { icon: "🔑", name: "光る黄金の鍵", desc: "まばゆい輝きを放つ、最後の脱出への鍵だ。" }
    };

    // --- Three.js 初期設定 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a); // 暗い背景
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap; // 柔らかな影
    document.body.appendChild(renderer.domElement);

    // --- ライティング (リアル志向) ---
    const ambientLight = new THREE.AmbientLight(0xaaaaaa, 0.3); // 全体的な薄い光
    scene.add(ambientLight);

    const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
    mainLight.position.set(10, 15, 10);
    mainLight.castShadow = true;
    mainLight.shadow.mapSize.width = 2048; // 影の解像度
    mainLight.shadow.mapSize.height = 2048;
    mainLight.shadow.camera.near = 0.5;
    mainLight.shadow.camera.far = 50;
    mainLight.shadow.camera.left = -20;
    mainLight.shadow.camera.right = 20;
    mainLight.shadow.camera.top = 20;
    mainLight.shadow.camera.bottom = -20;
    scene.add(mainLight);

    const loader = new THREE.TextureLoader();

    // --- 部屋生成関数 (テクスチャ対応) ---
    function createRoom(x, wallTextureUrl, floorTextureUrl, name) {
        const roomGroup = new THREE.Group();
        roomGroup.position.x = x;
        roomGroup.name = name;

        // 壁
        const wallTexture = loader.load(wallTextureUrl);
        wallTexture.wrapS = wallTexture.wrapT = THREE.RepeatWrapping;
        wallTexture.repeat.set(4, 3);
        const wallMaterial = new THREE.MeshStandardMaterial({ 
            map: wallTexture, 
            side: THREE.BackSide, 
            roughness: 0.8, 
            metalness: 0.1 
        });
        const walls = new THREE.Mesh(new THREE.BoxGeometry(16, 9, 16), wallMaterial);
        walls.position.y = 4.5;
        walls.receiveShadow = true;
        roomGroup.add(walls);

        // 床
        const floorTexture = loader.load(floorTextureUrl);
        floorTexture.wrapS = floorTexture.wrapT = THREE.RepeatWrapping;
        floorTexture.repeat.set(4, 4);
        const floorMaterial = new THREE.MeshStandardMaterial({ 
            map: floorTexture, 
            roughness: 0.6, 
            metalness: 0.2 
        });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(16, 16), floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        roomGroup.add(floor);

        scene.add(roomGroup);
        return roomGroup;
    }

    // 部屋1: パステルピンクの部屋
    const room1 = createRoom(
        0, 
        'https://threejs.org/examples/textures/brick_diffuse.jpg', // 仮のレンガテクスチャ
        'https://threejs.org/examples/textures/hardwood2_diffuse.jpg', // 仮の木目テクスチャ
        "Room1"
    );
    // 部屋2: 書斎（ミントグリーン基調）
    const room2 = createRoom(
        22, 
        'https://threejs.org/examples/textures/bricks.jpg', // 仮のレンガテクスチャ
        'https://threejs.org/examples/textures/circuit_pattern.jpg', // 仮の回路パターンテクスチャ
        "Room2"
    );
    // 部屋3: 不気味な地下室 (ダークで錆びた雰囲気)
    const room3 = createRoom(
        44, 
        'https://threejs.org/examples/textures/carbon/Carbon.png', // 仮のカーボンテクスチャ
        'https://threejs.org/examples/textures/waterduds.jpg', // 仮の水テクスチャ
        "Room3"
    );

    // --- オブジェ & ギミック ---

    // マテリアル定義 (PBR基準)
    const woodMaterial = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.7, metalness: 0.1 });
    const metalMaterial = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.3, metalness: 0.8 });
    const plasticMaterial = new THREE.MeshStandardMaterial({ color: 0x66ccff, roughness: 0.4, metalness: 0.0 });
    const glowingMaterial = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 0.7 }); // 光るマテリアル

    // Room 1: 初期の部屋
    const shelf = new THREE.Mesh(new THREE.BoxGeometry(3, 5, 1), woodMaterial);
    shelf.position.set(-6, 2.5, -6);
    shelf.castShadow = true; shelf.receiveShadow = true;
    scene.add(shelf);

    const vase = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 0.8), plasticMaterial);
    vase.position.set(-6, 5.4, -6); vase.name = "vase";
    vase.castShadow = true; vase.receiveShadow = true;
    scene.add(vase);

    const door1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 6, 3), metalMaterial);
    door1.position.set(8, 3, 0); door1.name = "door1";
    door1.castShadow = true; door1.receiveShadow = true;
    scene.add(door1);

    // Room 2: 書斎
    const bookshelf = new THREE.Mesh(new THREE.BoxGeometry(6, 7, 1), woodMaterial);
    bookshelf.position.set(22, 3.5, -7.4); bookshelf.name = "bookshelf";
    bookshelf.castShadow = true; bookshelf.receiveShadow = true;
    scene.add(bookshelf);

    const chair = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), plasticMaterial);
    chair.position.set(24, 0.75, 2); chair.name = "chair";
    chair.castShadow = true; chair.receiveShadow = true;
    scene.add(chair);

    const safe = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), metalMaterial);
    safe.position.set(28, 1, -5); safe.name = "safe";
    safe.castShadow = true; safe.receiveShadow = true;
    scene.add(safe);

    const room2Door = new THREE.Mesh(new THREE.BoxGeometry(0.3, 6, 3), metalMaterial);
    room2Door.position.set(30, 3, 0); room2Door.name = "room2Door";
    room2Door.castShadow = true; room2Door.receiveShadow = true;
    scene.add(room2Door);

    const rabbit = new THREE.Group();
    const rabbitMat = new THREE.MeshStandardMaterial({color: 0xff85a2, roughness: 0.6});
    const rBody = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), rabbitMat); rBody.position.y = 0.6;
    const rHead = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), rabbitMat); rHead.position.y = 1.4;
    rabbit.add(rBody, rHead); rabbit.position.set(16, 0, 6); rabbit.name = "rabbit";
    rabbit.castShadow = true; rabbit.receiveShadow = true;
    scene.add(rabbit);
    
    // Room 3: 地下室
    const pipe1 = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 8, 8), metalMaterial);
    pipe1.rotation.z = Math.PI / 2; pipe1.position.set(44, 5, -5); pipe1.name = "pipe1";
    pipe1.castShadow = true; pipe1.receiveShadow = true;
    scene.add(pipe1);

    const device = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), metalMaterial);
    device.position.set(48, 1, 0); device.name = "device";
    device.castShadow = true; device.receiveShadow = true;
    scene.add(device);

    const glowingPart = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), glowingMaterial);
    glowingPart.position.set(48, 2.2, 0); glowingPart.name = "glowingPart";
    scene.add(glowingPart);

    const exitDoor = new THREE.Mesh(new THREE.BoxGeometry(0.3, 6, 3), metalMaterial);
    exitDoor.position.set(52, 3, 0); exitDoor.name = "exitDoor";
    exitDoor.castShadow = true; exitDoor.receiveShadow = true;
    scene.add(exitDoor);

    // --- UI/コントロール ---
    camera.position.set(0, 3, 8);
    const activeKeys = {};
    let yaw = 0, pitch = 0;

    document.getElementById('start-btn').onclick = () => { renderer.domElement.requestPointerLock(); document.getElementById('overlay').style.display = 'none'; };

    window.onkeydown = (e) => {
        activeKeys[e.code] = true;
        if (e.code === 'Space' && state.inv.length > 0) { state.sel = (state.sel + 1) % state.inv.length; updateUI(); notify(items[state.inv[state.sel]].name + " を選択中"); }
        if (e.code === 'Enter' && state.sel !== -1) { notify("【詳細】" + items[state.inv[state.sel]].desc); }
        if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') handleAction(true);
    };
    window.onkeyup = (e) => activeKeys[e.code] = false;

    document.onmousemove = (e) => { if (document.pointerLockElement) { yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002; pitch = Math.max(-1.4, Math.min(1.4, pitch)); } };

    // --- インタラクションハンドラ ---
    const handleAction = (isShift) => {
        if (!document.pointerLockElement) return;
        const ray = new THREE.Raycaster(); ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = ray.intersectObjects(scene.children, true);
        if (hits.length > 0 && hits[0].distance < 6) {
            let o = hits[0].object; while(o.parent && !o.name) o = o.parent; // 親グループまで遡る

            if (o.name === "vase") { 
                if (!state.inv.includes("key1")) { state.inv.push("key1"); state.sel=0; updateUI(); notify("花瓶から『古い真鍮の鍵』を見つけた。"); }
            } else if (o.name === "door1") { 
                if (isShift && state.inv[state.sel] === "key1") { state.door1Open = true; o.position.y += 8; notify("鍵が回り、次の部屋への扉が開いた。"); }
                else if (!isShift) notify("この扉には鍵がかかっているようだ。");
            } else if (o.name === "bookshelf") {
                notify("古びた本棚だ。よく見ると、特定の本の背表紙に数字の『７』が刻まれている...");
                state.room2CodePart1 = 7;
            } else if (o.name === "chair") { 
                if (!state.chairMoved) {
                    state.chairMoved = true;
                    o.position.z += 3; // 椅子を動かす
                    notify("椅子を動かした。床に隠された数字『３』が！");
                    state.room2CodePart2 = 3;
                } else {
                    notify("もう椅子は動いている。");
                }
            } else if (o.name === "rabbit") {
                notify("ウサギ：こんにちは！地下室への扉の鍵は、『金庫のパスワード』だよ。僕の耳の数を足してね！(『２』)");
                state.room2CodePart3 = 2;
            } else if (o.name === "safe") {
                if (state.room2CodePart1 && state.room2CodePart2 && state.room2CodePart3) {
                    openInputPanel("safe-input", "金庫のパスコード (3桁)", (code) => {
                        if (code === "732") { // 7(本棚), 3(椅子), 2(ウサギ)
                            state.inv.push("cipher_sheet"); updateUI();
                            notify("金庫が開いた！中に『謎の暗号シート』が入っていた。");
                            state.safeCodeFound = true;
                            closeInputPanel();
                        } else { notify("パスコードが違うようだ...", true); }
                    });
                } else {
                    notify("金庫だ。何かのパスコードが必要なようだが、ヒントが見当たらない...");
                }
            } else if (o.name === "room2Door") {
                if (isShift && state.inv[state.sel] === "cipher_sheet" && state.safeCodeFound) { // 金庫から暗号シートを入手済み
                    state.room2DoorOpen = true; o.position.y += 8;
                    notify("暗号シートが扉のセンサーに反応した！地下室への道が開かれた。");
                } else if (!isShift) {
                    notify("この扉は特殊な認証が必要なようだ...何かの紙をかざす場所がある。");
                }
            } else if (o.name === "pipe1") {
                notify("錆びたパイプが壁に沿って続いている。よく見ると、特定のジョイントに奇妙な数字『４』が刻まれている。");
                state.undergroundCodePart1 = 4;
            } else if (o.name === "device") {
                if (!state.deviceActivated) {
                    notify("古びた機械だ。電源は入っていないようだ。どこかにスイッチがあるはず。");
                } else {
                    openInputPanel("device-input", "装置の解除コード (2桁)", (code) => {
                        if (code === "48") { // パイプの4と謎の8
                            state.inv.push("key2"); updateUI();
                            notify("装置が解除され、『光る黄金の鍵』が排出された！");
                            state.undergroundCodePart2 = 8; // 謎のヒントをここで得る
                            closeInputPanel();
                        } else { notify("解除コードが間違っている。", true); }
                    });
                }
            } else if (o.name === "glowingPart") {
                if (!state.deviceActivated) {
                    state.deviceActivated = true;
                    glowingPart.material.emissiveIntensity = 1.5; // 明るく光らせる
                    notify("光る部品を触ると、機械に微かに電気が通った！");
                } else {
                    notify("既に電気が通っているようだ。");
                }
            } else if (o.name === "exitDoor") {
                if (isShift && state.inv[state.sel] === "key2") {
                    state.exitOpen = true; o.position.y += 8;
                    notify("脱出成功！おめでとうございます！あなたは忘れ去られた現実から解放されました。");
                } else if (!isShift) {
                    notify("厳重な出口の扉だ。最後の鍵が必要なようだ。");
                }
            }
        }
    };
    window.onmousedown = () => handleAction(false);

    // 入力パネル制御
    function openInputPanel(inputId, title, onSubmit) {
        document.getElementById('input-panel-title').innerText = title;
        document.getElementById('panel-input').value = '';
        document.getElementById('panel-input').id = inputId; // idを動的に変更
        document.getElementById('panel-submit').onclick = () => onSubmit(document.getElementById(inputId).value);
        document.getElementById('input-panel').style.display = 'block';
    }
    function closeInputPanel() {
        document.getElementById('input-panel').style.display = 'none';
        renderer.domElement.requestPointerLock();
    }
    document.getElementById('panel-close').onclick = closeInputPanel;

    // --- メインループ ---
    function animate() {
        if (document.pointerLockElement) {
            const moveSpeed = 0.18; // 少し早く
            const moveDirection = new THREE.Vector3();
            if (activeKeys['ArrowUp']) moveDirection.z -= 1;
            if (activeKeys['ArrowDown']) moveDirection.z += 1;
            if (activeKeys['ArrowLeft']) moveDirection.x -= 1;
            if (activeKeys['ArrowRight']) moveDirection.x += 1;

            if (moveDirection.length() > 0) {
                moveDirection.normalize().applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                camera.position.addScaledVector(moveDirection, moveSpeed);
            }
            camera.position.y = 3; // プレイヤーの高さ固定

            // 各部屋の移動制限
            const currentRoomX = Math.floor((camera.position.x + 8) / 22); // どの部屋にいるか大まかに判定
            
            if (currentRoomX === 0) { // Room1
                if (camera.position.x < -7) camera.position.x = -7;
                if (!state.door1Open && camera.position.x > 7.5) camera.position.x = 7.5;
            } else if (currentRoomX === 1) { // Room2 (書斎)
                if (camera.position.x < 15) camera.position.x = 15;
                if (!state.room2DoorOpen && camera.position.x > 30.5) camera.position.x = 30.5;
            } else if (currentRoomX === 2) { // Room3 (地下室)
                if (camera.position.x < 37) camera.position.x = 37;
                if (!state.exitOpen && camera.position.x > 53.5) camera.position.x = 53.5;
            }
            // Z軸方向の部屋内移動制限
            if (camera.position.z < -7) camera.position.z = -7;
            if (camera.position.z > 7) camera.position.z = 7;
        }
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }
    animate();

    function notify(message, isError = false) { 
        const msgElement = document.getElementById('text');
        msgElement.innerText = message;
        if (isError) {
            msgElement.style.color = '#ff3333'; // エラー時は赤色
            msgElement.style.borderColor = '#ff3333';
        } else {
            msgElement.style.color = 'white';
            msgElement.style.borderColor = '#007bff';
        }
    }
    function updateUI() { 
        for(let i=0; i<2; i++) { 
            const slot = document.getElementById('slot-'+i); 
            slot.innerHTML = state.inv[i] ? items[state.inv[i]].icon : ""; 
            slot.classList.toggle('selected', i === state.sel); 
        } 
    }

    // ウィンドウリサイズ対応
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
