<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>INSIGHT - ヒント機能搭載</title>
    <style>
        :root {
            --bg: #050505;
            --main: #ffffff;
            --accent: #00ff88;
            --hint-bg: #1a1a1a;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            background: var(--bg);
            color: var(--main);
            font-family: "Hiragino Sans", sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #screen {
            width: 100%;
            max-width: 400px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        #problem-box {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #333;
            margin-top: 20px;
            background: #000;
            border-radius: 15px;
        }

        .hint-text {
            font-size: 1.5rem;
            margin: 10px 0;
            letter-spacing: 3px;
        }

        /* ヒントエリア */
        #hint-section {
            flex: 1;
            width: 100%;
            margin-top: 15px;
            font-size: 0.85rem;
        }

        .hint-btn {
            background: #333;
            color: #ccc;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
            width: 100%;
            text-align: left;
        }

        .hint-content {
            background: var(--hint-bg);
            padding: 10px;
            border-left: 3px solid var(--accent);
            display: none; /* 初期は非表示 */
            margin-bottom: 10px;
            color: #aaa;
        }

        /* 入力エリア */
        #answer-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #555;
            color: #fff;
            font-size: 2rem;
            text-align: center;
            outline: none;
            margin-bottom: 15px;
        }

        button#unlock-btn {
            background: var(--main);
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        #clear-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--accent); color: #000;
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="screen">
        <div id="problem-box">
            <div class="hint-text">11 = 2</div>
            <div class="hint-text">12 = 3</div>
            <div class="hint-text">20 = 1</div>
            <div class="hint-text" style="color: var(--accent);">55 = ?</div>
        </div>

        <div id="hint-section">
            <button class="hint-btn" onclick="toggleHint('h1')">💡 ヒント1を見る</button>
            <div id="h1" class="hint-content">最初の2つ（11と12）だけを見ると「足し算」に見えますが、「20=1」がそのルールを壊しています。</div>

            <button class="hint-btn" onclick="toggleHint('h2')">💡 ヒント2を見る</button>
            <div id="h2" class="hint-content">中学生で習う「指数」の書き方を思い出して。20は「2の0乗」...つまり 2<sup>0</sup> です。</div>
        </div>

        <div id="answer-section">
            <input type="number" id="input" placeholder="00" pattern="\d*">
            <button id="unlock-btn" onclick="check()">UNLOCK</button>
        </div>
    </div>

    <div id="clear-layer">
        <h1>SUCCESS</h1>
        <p>5 + 5 = 10</p>
        <button onclick="location.reload()" style="background:#000; color:#fff; border:none; padding:10px 20px; margin-top:20px;">RETRY</button>
    </div>

    <script>
        function toggleHint(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }
