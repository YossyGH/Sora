<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Realistic Escape - Definitive Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Hiragino Kaku Gothic Pro', sans-serif; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 1000; color: white; }
        #start-btn { padding: 25px 80px; font-size: 28px; background: #007bff; border: none; color: white; cursor: pointer; border-radius: 60px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #inventory { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .slot { width: 80px; height: 80px; border: 5px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; font-size: 45px; border-radius: 20px; color: white; }
        .slot.selected { border-color: #007bff; box-shadow: 0 0 25px #007bff; background: rgba(0,0,0,0.8); transform: scale(1.1); }
        #controls-guide { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 15px; border: 3px solid #007bff; color: white; font-size: 15px; line-height: 1.8; pointer-events: auto; }
        #msg-box { position: absolute; bottom: 40px; width: 100%; text-align: center; }
        #text { display: inline-block; background: rgba(0,0,0,0.7); color: white; padding: 20px 60px; border-radius: 50px; border: 4px solid #007bff; font-size: 20px; font-weight: bold; min-width: 400px; }
        #input-panel { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(30,30,30,0.95); padding: 40px; border-radius: 30px; border: 6px solid #007bff; pointer-events: auto; text-align: center; z-index: 2000; color: white; }
        #input-panel input { font-size: 40px; width: 220px; text-align: center; border: 3px solid #007bff; background: #111; color: white; border-radius: 15px; margin-bottom: 20px; outline: none; padding: 10px; }
        #input-panel button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; margin: 5px; font-weight: bold; background: #007bff; color: white; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="font-size: 50px; margin-bottom: 10px;">🌌 忘れ去られた現実 🌌</h1>
    <p style="margin-bottom: 40px; font-size: 18px;">〜３つの部屋の謎を解き明かせ〜</p>
    <button id="start-btn">冒険をはじめる！</button>
</div>

<div id="ui">
    <div id="inventory"><div id="slot-0" class="slot"></div><div id="slot-1" class="slot"></div></div>
    <div id="controls-guide">
        【操作パネル】<br>🏃 移動：矢印キー / 🔄 視点：マウス<br>📦 選択：Space / 📝 詳細：Enter<br>🔑 使用：Shift / 🖱️ 調べる：クリック
    </div>
    <div id="msg-box"><div id="text"></div></div>
    <div id="input-panel">
        <h2 id="panel-title">PASSCODE</h2>
        <p id="panel-hint" style="color: #007bff; margin-bottom: 10px; font-weight: bold;"></p>
        <input type="text" id="panel-input" placeholder="----"><br>
        <button id="panel-submit">確定</button>
        <button id="panel-close" style="background:#555;">閉じる</button>
    </div>
</div>

<script>
    const state = { inv: [], sel: -1, d1: false, d2: false, exit: false, hints: { chair: false, book: false, memo: false } };
    const items = { 
        key1: { icon: "🗝️", name: "真鍮の鍵", desc: "書斎へ続く扉を開く古い鍵。" },
        card: { icon: "💳", name: "認証カード", desc: "地下室のロックを解除するカード。" },
        key2: { icon: "🔑", name: "黄金の鍵", desc: "脱出のための最後の鍵。" }
    };

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
    document.body.appendChild(renderer.domElement);

    // Lights (前回のリアルな設定を復元)
    const amb = new THREE.AmbientLight(0xaaaaaa, 0.3); scene.add(amb);
    const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
    mainLight.position.set(10, 15, 10);
    mainLight.castShadow = true;
    mainLight.shadow.mapSize.width = 2048; mainLight.shadow.mapSize.height = 2048;
    scene.add(mainLight);

    const loader = new THREE.TextureLoader();
    function createRoom(x, wallColor, floorTex, name) {
        const g = new THREE.Group(); g.position.x = x; g.name = name;
        const walls = new THREE.Mesh(new THREE.BoxGeometry(16, 9, 16), new THREE.MeshStandardMaterial({ color: wallColor, side: THREE.BackSide, roughness: 0.8 }));
        walls.position.y = 4.5; walls.receiveShadow = true; g.add(walls);
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(16, 16), new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.6, metalness: 0.2 }));
        floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; g.add(floor);
        scene.add(g); return g;
    }
    const r1 = createRoom(0, 0x3d2a2a, null, "Room1");
    const r2 = createRoom(22, 0x2a3d2e, null, "Room2");
    const r3 = createRoom(44, 0x1a1a2b, null, "Room3");

    // Objects
    const mMetal = new THREE.MeshStandardMaterial({color: 0x888888, metalness: 0.8, roughness: 0.2});
    const mWood = new THREE.MeshStandardMaterial({color: 0x5d4037, roughness: 0.7});

    // Room 1
    const vase = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 0.8), new THREE.MeshStandardMaterial({color: 0x00bcd4}));
    vase.position.set(-6, 0.4, -6); vase.name = "vase"; scene.add(vase);
    const door1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), mMetal);
    door1.position.set(8, 3, 0); door1.name = "door1"; scene.add(door1);

    // Room 2 (Logical Study)
    const bookshelf = new THREE.Mesh(new THREE.BoxGeometry(6, 7, 1), mWood);
    bookshelf.position.set(22, 3.5, -7.4); bookshelf.name = "bookshelf"; scene.add(bookshelf);
    const chair = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshStandardMaterial({color: 0xff4081}));
    chair.position.set(25, 0.75, 4); chair.name = "chair"; scene.add(chair);
    const safe = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), mMetal);
    safe.position.set(29, 1, -5); safe.name = "safe"; scene.add(safe);
    const door2 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), mMetal);
    door2.position.set(30, 3, 0); door2.name = "door2"; scene.add(door2);
    const rabbit = new THREE.Mesh(new THREE.SphereGeometry(0.6, 24, 24), new THREE.MeshStandardMaterial({color: 0xeeeeee, roughness: 0.5}));
    rabbit.position.set(16, 0.6, 6); rabbit.name = "rabbit"; scene.add(rabbit);

    // Room 3
    const device = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 0.5), new THREE.MeshStandardMaterial({color:0x00ff00, emissive:0x00ff00, emissiveIntensity:0.5}));
    device.position.set(51.8, 3.5, 0); device.name = "device"; scene.add(device);
    const exitDoor = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), new THREE.MeshStandardMaterial({color: 0xffd700, metalness: 1}));
    exitDoor.position.set(52, 3, 0); exitDoor.name = "exitDoor"; scene.add(exitDoor);

    // --- Logic ---
    camera.position.set(0, 3, 8);
    let yaw = 0, pitch = 0; const activeKeys = {};

    document.getElementById('start-btn').onclick = () => { renderer.domElement.requestPointerLock(); document.getElementById('overlay').style.display='none'; };
    window.onkeydown = (e) => {
        activeKeys[e.code] = true;
        if (e.code === 'Space' && state.inv.length > 0) { state.sel=(state.sel+1)%state.inv.length; updateUI(); notify(items[state.inv[state.sel]].name + " 装備"); }
        if (e.code === 'Enter' && state.sel !== -1) notify(items[state.inv[state.sel]].desc);
        if (e.shiftKey) handleAction(true);
    };
    window.onkeyup = (e) => activeKeys[e.code] = false;
    document.onmousemove = (e) => { if(document.pointerLockElement){ yaw-=e.movementX*0.002; pitch-=e.movementY*0.002; pitch=Math.max(-1.4, Math.min(1.4, pitch)); } };

    function handleAction(isShift) {
        if (!document.pointerLockElement) return;
        const ray = new THREE.Raycaster(); ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = ray.intersectObjects(scene.children, true);
        if (hits.length > 0 && hits[0].distance < 6) {
            let o = hits[0].object;
            if (o.name === "vase") { if(!state.inv.includes("key1")){ state.inv.push("key1"); state.sel=0; updateUI(); notify("花瓶の中から『真鍮の鍵』を見つけた。"); } }
            else if (o.name === "door1") {
                if (isShift && state.inv[state.sel]==="key1") { state.d1=true; o.position.y+=8; notify("鍵が開いた。書斎へ進める。"); }
                else if(!isShift) notify("扉は閉ざされている。鍵が必要だ。");
            }
            else if (o.name === "chair") { 
                o.position.z += 2.5; state.hints.chair = true;
                notify("桃色の椅子を動かした。床に数字『3』と刻印『I』がある。"); 
            }
            else if (o.name === "bookshelf") { 
                state.hints.book = true;
                notify("緑の本棚だ。背表紙に数字『8』と刻印『II』が見える。"); 
            }
            else if (o.name === "rabbit") { 
                notify("ウサギは無言で足元を指している..."); 
                if(camera.position.distanceTo(o.position) < 4) {
                    state.hints.memo = true;
                    notify("足元に数字『4』と刻印『III』のメモが落ちている。");
                }
            }
            else if (o.name === "safe") {
                if(state.hints.chair && state.hints.book && state.hints.memo) {
                    showInput("金庫のロック", "刻印の順序: I → II → III", (val) => {
                        if(val === "384") { // Chair(3), Book(8), Memo(4)
                            state.inv.push("card"); updateUI(); notify("認証成功。内部からカードを入手。"); hideInput();
                        } else { notify("コードが一致しない。"); }
                    });
                } else { notify("金庫だ。まだ手がかりが足りない。"); }
            }
            else if (o.name === "door2") {
                if(isShift && state.inv[state.sel]==="card") { state.d2=true; o.position.y+=8; notify("カード認証完了。地下室へ。"); }
                else if(!isShift) notify("電子ロックだ。カードが必要らしい。");
            }
            else if (o.name === "device") {
                if(!state.inv.includes("key2")) { state.inv.push("key2"); updateUI(); notify("装置から『黄金の鍵』が排出された。"); }
            }
            else if (o.name === "exitDoor") {
                if(isShift && state.inv[state.sel]==="key2") { state.exit=true; o.position.y+=8; notify("脱出成功！おめでとう！"); }
                else if(!isShift) notify("最後の出口だ。黄金の鍵を使え。");
            }
        }
    }
    window.onmousedown = () => handleAction(false);

    function showInput(title, hint, onOk) {
        document.exitPointerLock();
        document.getElementById('input-panel').style.display = 'block';
        document.getElementById('panel-title').innerText = title;
        document.getElementById('panel-hint').innerText = hint;
        document.getElementById('panel-submit').onclick = () => onOk(document.getElementById('panel-input').value);
    }
    function hideInput() { document.getElementById('input-panel').style.display='none'; renderer.domElement.requestPointerLock(); }
    document.getElementById('panel-close').onclick = hideInput;

    function loop() {
        if (document.pointerLockElement) {
            const d = new THREE.Vector3();
            if (activeKeys['ArrowUp']) d.z -= 1; if (activeKeys['ArrowDown']) d.z += 1;
            if (activeKeys['ArrowLeft']) d.x -= 1; if (activeKeys['ArrowRight']) d.x += 1;
            if (d.length() > 0) { d.normalize().applyAxisAngle(new THREE.Vector3(0,1,0), yaw); camera.position.addScaledVector(d, 0.16); }
            camera.position.y = 3;
            if(camera.position.x < -7) camera.position.x = -7;
            if(!state.d1 && camera.position.x > 7.4) camera.position.x = 7.4;
            if(!state.d2 && camera.position.x > 29.4) camera.position.x = 29.4;
            if(camera.position.x > 51) camera.position.x = 51;
            if(Math.abs(camera.position.z) > 7) camera.position.z = Math.sign(camera.position.z) * 7;
        }
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        renderer.render(scene, camera);
        requestAnimationFrame(loop);
    }
    loop();

    function notify(t) { document.getElementById('text').innerText = t; }
    function updateUI() { for(let i=0; i<2; i++){ const s=document.getElementById('slot-'+i); s.innerHTML=state.inv[i]?items[state.inv[i]].icon:""; s.classList.toggle('selected', i===state.sel); } }
</script>
</body>
</html>
