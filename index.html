<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D Escape - Refined Graphics</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; background: #111; }
        canvas { display: block; }

        /* UI */
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; color: white;
        }

        #inventory {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 12px; pointer-events: auto;
        }
        .slot {
            width: 70px; height: 70px; border: 2px solid #333; background: rgba(20,20,20,0.8);
            display: flex; align-items: center; justify-content: center;
            font-size: 35px; border-radius: 4px; transition: all 0.3s;
        }
        .slot.selected { border-color: #f1c40f; box-shadow: 0 0 20px rgba(241,196,15,0.4); background: rgba(40,40,30,0.9); }

        /* アイテム詳細表示 (Enter) */
        #item-detail {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 300px;
            background: rgba(0,0,0,0.9); border: 1px solid #f1c40f;
            padding: 20px; text-align: center; border-radius: 10px; pointer-events: auto;
        }
        #item-detail h2 { margin: 0; color: #f1c40f; }
        #item-detail .icon { font-size: 60px; margin: 10px 0; }

        #msg-box { position: absolute; bottom: 40px; width: 100%; text-align: center; }
        #text {
            display: inline-block; background: rgba(10,10,10,0.85);
            padding: 12px 40px; border-radius: 5px; font-size: 18px;
            border-left: 5px solid #f1c40f; letter-spacing: 1px;
        }

        #guide {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.7); padding: 20px; border-radius: 5px; font-size: 12px;
            line-height: 1.8; border: 1px solid #444;
        }

        #numpad {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: #1a1a1a;
            padding: 30px; border: 2px solid #f1c40f; border-radius: 5px;
            pointer-events: auto; text-align: center; box-shadow: 0 0 50px black;
        }
        input { font-size: 32px; width: 140px; text-align: center; margin-bottom: 20px; background: #222; color: #fff; border: 1px solid #444; }
        button { padding: 12px 24px; cursor: pointer; background: #f1c40f; border: none; font-weight: bold; border-radius: 3px; color: #000; }
    </style>
</head>
<body>

<div id="ui">
    <div id="inventory">
        <div id="slot-0" class="slot"></div>
        <div id="slot-1" class="slot"></div>
        <div id="slot-2" class="slot"></div>
    </div>

    <div id="item-detail">
        <h2 id="detail-name">ITEM</h2>
        <div class="icon" id="detail-icon">❓</div>
        <p id="detail-desc">説明</p>
        <small style="color:#888">クリックで閉じる</small>
    </div>

    <div id="guide">
        <b>CONTROLS</b><br>
        移動: [↑][↓][←][→] / [WASD]<br>
        視点: マウス移動<br>
        調べる: 左クリック<br>
        選択: [Space]<br>
        <b>詳細確認: [Enter]</b>
    </div>

    <div id="msg-box">
        <div id="text">画面をクリックして探索を開始</div>
    </div>

    <div id="numpad">
        <h2 style="color:#f1c40f; margin-top:0;">SECURITY</h2>
        <input type="number" id="code-in" placeholder="000"><br>
        <button onclick="checkSafe()">ENTER</button>
        <button onclick="closeNumpad()" style="background:#444; color:white;">BACK</button>
    </div>
</div>

<div style="position:absolute; top:50%; left:50%; width:4px; height:4px; background:white; border-radius:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:100; opacity:0.5;"></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const state = { inv: [], sel: -1, solved: false };
    const itemData = {
        note: { name: "メモ", icon: "📜", desc: "「4 6 1」という数字が記されている。" },
        handle: { name: "ハンドル", icon: "⚙️", desc: "何かの機械に取り付けるための部品だ。" },
        key: { name: "重厚な鍵", icon: "🔑", desc: "この部屋の出口を開けるための鍵だろう。" }
    };

    // --- Scene & Rendering ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x111111, 0, 25);
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- Lighting (きめ細やかな描写) ---
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);
    const spotLight = new THREE.SpotLight(0xffffff, 100);
    spotLight.position.set(0, 10, 0);
    spotLight.castShadow = true;
    scene.add(spotLight);

    // --- 部屋のデザイン (グラフィック強化) ---
    const roomSize = 16;
    const roomGeo = new THREE.BoxGeometry(roomSize, 8, roomSize);
    const wallMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.8 });
    const room = new THREE.Mesh(roomGeo, wallMat);
    room.position.y = 4;
    room.receiveShadow = true;
    scene.add(room);

    // 床の模様 (グリッド)
    const grid = new THREE.GridHelper(roomSize, 16, 0x000000, 0xcccccc);
    grid.position.y = 0.05;
    scene.add(grid);

    // 装飾用の柱や縁取り
    function addDecoration(w, h, d, x, y, z) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({color: 0x333333}));
        m.position.set(x, y, z);
        scene.add(m);
    }
    addDecoration(roomSize, 0.4, 0.4, 0, 0.2, 7.8); // 巾木
    addDecoration(roomSize, 0.4, 0.4, 0, 0.2, -7.8);

    // --- オブジェクト ---
    function makeArtObj(w, h, d, x, z, col, name) {
        const group = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({color: col, metalness: 0.5, roughness: 0.2}));
        body.castShadow = true;
        body.receiveShadow = true;
        group.add(body);
        group.position.set(x, h/2, z);
        group.name = name;
        scene.add(group);
        return group;
    }

    makeArtObj(1, 5, 4, -7, 0, 0x4a3728, "shelf"); // 本棚
    makeArtObj(3, 1.2, 2, 6, 4, 0x222222, "desk");  // 高級デスク
    makeArtObj(0.6, 0.6, 0.6, 6, 4, 0xf1c40f, "box"); // 金庫(金)
    makeArtObj(2.5, 5, 0.3, 0, -7.8, 0x111111, "door"); // 重厚なドア

    camera.position.set(0, 3, 5);

    // --- 操作ロジック ---
    const keys = {};
    let yaw = 0, pitch = 0;

    window.addEventListener('keydown', e => { 
        keys[e.code] = true;
        if(e.code === 'Space') cycleItem();
        if(e.code === 'Enter') showItemDetail();
    });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    renderer.domElement.addEventListener('mousedown', () => {
        if(document.getElementById('numpad').style.display !== 'block' && 
           document.getElementById('item-detail').style.display !== 'block') {
            renderer.domElement.requestPointerLock();
        }
    });

    document.addEventListener('mousemove', e => {
        if (document.pointerLockElement === renderer.domElement) {
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI/2.3, Math.min(Math.PI/2.3, pitch));
        }
    });

    // アイテム詳細を閉じるイベント
    document.getElementById('item-detail').addEventListener('click', () => {
        document.getElementById('item-detail').style.display = 'none';
        renderer.domElement.requestPointerLock();
    });

    function update() {
        if (document.pointerLockElement === renderer.domElement) {
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            const moveDir = new THREE.Vector3();
            const matrix = new THREE.Matrix4().makeRotationY(yaw);
            const forward = new THREE.Vector3(0, 0, -1).applyMatrix4(matrix);
            const right = new THREE.Vector3(1, 0, 0).applyMatrix4(matrix);

            if (keys['ArrowUp'] || keys['KeyW']) moveDir.add(forward);
            if (keys['ArrowDown'] || keys['KeyS']) moveDir.sub(forward);
            if (keys['ArrowLeft'] || keys['KeyA']) moveDir.sub(right);
            if (keys['ArrowRight'] || keys['KeyD']) moveDir.add(right);

            if (moveDir.length() > 0) {
                moveDir.normalize().multiplyScalar(0.15);
                const nextX = camera.position.x + moveDir.x;
                const nextZ = camera.position.z + moveDir.z;
                const limit = (roomSize / 2) - 1.2;
                if (Math.abs(nextX) < limit) camera.position.x = nextX;
                if (Math.abs(nextZ) < limit) camera.position.z = nextZ;
            }
        }
        renderer.render(scene, camera);
        requestAnimationFrame(update);
    }
    update();

    // --- アクション ---
    window.addEventListener('mousedown', () => {
        if (document.pointerLockElement !== renderer.domElement) return;
        const ray = new THREE.Raycaster();
        ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = ray.intersectObjects(scene.children, true);

        if(hits.length > 0 && hits[0].distance < 6) {
            let target = hits[0].object.name || hits[0].object.parent.name;
            const held = state.inv[state.sel];

            if(target === "shelf") {
                if(!state.inv.includes("note")) {
                    state.inv.push("note");
                    notify("本棚の隙間にメモを見つけた。");
                }
            } else if(target === "desk") {
                if(!state.solved) {
                    document.exitPointerLock();
                    document.getElementById('numpad').style.display = 'block';
                }
            } else if(target === "box") {
                if(held === "handle") {
                    state.inv.splice(state.sel, 1);
                    state.inv.push("key");
                    state.sel = state.inv.length - 1;
                    notify("ハンドルが適合した！「金の鍵」を入手。");
                } else { notify("回転させるためのハンドルが必要だ。"); }
            } else if(target === "door") {
                if(held === "key") {
                    notify("脱出に成功した...");
                    setTimeout(()=>location.reload(), 3000);
                } else { notify("鍵が閉まっている。"); }
            }
            updateUI();
        }
    });

    window.checkSafe = () => {
        if(document.getElementById('code-in').value === "461") {
            state.solved = true;
            state.inv.push("handle");
            closeNumpad();
            notify("ロックが解除された。「ハンドル」を入手。");
            updateUI();
        } else { alert("ACCESS DENIED"); }
    };

    window.closeNumpad = () => {
        document.getElementById('numpad').style.display = 'none';
        renderer.domElement.requestPointerLock();
    };

    function cycleItem() {
        if(state.inv.length > 0) {
            state.sel = (state.sel + 1) % state.inv.length;
            updateUI();
        }
    }

    function showItemDetail() {
        if(state.sel === -1) return;
        const item = itemData[state.inv[state.sel]];
        document.getElementById('detail-name').innerText = item.name;
        document.getElementById('detail-icon').innerText = item.icon;
        document.getElementById('detail-desc').innerText = item.desc;
        document.getElementById('item-detail').style.display = 'block';
        document.exitPointerLock();
    }

    function notify(t) { document.getElementById('text').innerText = t; }
    function updateUI() {
        for(let i=0; i<3; i++) {
            const s = document.getElementById(`slot-${i}`);
            s.innerHTML = state.inv[i] ? itemData[state.inv[i]].icon : "";
            s.classList.toggle('selected', i === state.sel);
        }
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
