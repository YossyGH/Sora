<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Realistic Escape - 2 Rooms Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Helvetica Neue', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* スタート画面（移動できない問題を解決するため） */
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; 
            flex-direction: column; color: white; pointer-events: auto; z-index: 100;
        }
        #start-btn { 
            padding: 20px 50px; font-size: 24px; background: #00d4ff; border: none; 
            color: black; cursor: pointer; border-radius: 5px; font-weight: bold;
        }

        #inventory { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .slot { width: 64px; height: 64px; border: 2px solid #444; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; font-size: 30px; border-radius: 4px; }
        .slot.selected { border-color: #00d4ff; box-shadow: 0 0 10px #00d4ff; }
        
        #msg-box { position: absolute; bottom: 40px; width: 100%; text-align: center; }
        #text { display: inline-block; background: rgba(0,0,0,0.9); color: white; padding: 15px 40px; border-radius: 4px; border-left: 4px solid #00d4ff; font-size: 18px; }
    </style>
</head>
<body>

<div id="overlay">
    <h1>REALISTIC ESCAPE</h1>
    <p>移動: WASD / 視点: マウス / 調べる: クリック / 使う: Shift</p>
    <button id="start-btn">CLICK TO START</button>
</div>

<div id="ui">
    <div id="inventory">
        <div id="slot-0" class="slot"></div>
        <div id="slot-1" class="slot"></div>
    </div>
    <div id="msg-box"><div id="text">部屋を探索してください。</div></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const state = { inv: [], sel: -1, doorOpen: false };
    const items = { key: { name: "真鍮の鍵", icon: "🗝️" } };

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- Lighting ---
    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);
    const pointLight = new THREE.PointLight(0xffffff, 60);
    pointLight.position.set(0, 6, 0);
    pointLight.castShadow = true;
    scene.add(pointLight);

    // --- Room Construction (2 Rooms) ---
    function createRoom(xOffset, color, name) {
        const roomGroup = new THREE.Group();
        roomGroup.position.x = xOffset;
        
        // 床
        const floorGeo = new THREE.PlaneGeometry(12, 12);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        roomGroup.add(floor);

        // 壁
        const wallGeo = new THREE.BoxGeometry(12, 7, 12);
        const wallMat = new THREE.MeshStandardMaterial({ color: color, side: THREE.BackSide, roughness: 0.9 });
        const walls = new THREE.Mesh(wallGeo, wallMat);
        walls.position.y = 3.5;
        walls.receiveShadow = true;
        roomGroup.add(walls);

        scene.add(roomGroup);
        return roomGroup;
    }

    const room1 = createRoom(0, 0x444444, "Entrance");
    const room2 = createRoom(12.1, 0x2c3e50, "Study"); // 隣の部屋

    // --- リアルな家具・小物 ---

    // 1. 棚
    function addShelf(parent) {
        const shelf = new THREE.Group();
        const woodMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1f, roughness: 0.6 });
        const frame = new THREE.Mesh(new THREE.BoxGeometry(2, 4.5, 1), woodMat);
        frame.position.y = 2.25;
        shelf.add(frame);
        
        // 花瓶 (小物追加)
        const vaseGeo = new THREE.CylinderGeometry(0.15, 0.25, 0.6, 16);
        const vaseMat = new THREE.MeshStandardMaterial({ color: 0x008080, roughness: 0.1, metalness: 0.5 });
        const vase = new THREE.Mesh(vaseGeo, vaseMat);
        vase.position.set(0, 4.8, 0);
        vase.name = "vase";
        shelf.add(vase);

        shelf.position.set(-4.5, 0, -4.5);
        shelf.name = "shelf";
        parent.add(shelf);
    }
    addShelf(room1);

    // 2. 壁掛け時計 (小物追加)
    function addClock(parent) {
        const clock = new THREE.Group();
        const face = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.1, 32), new THREE.MeshStandardMaterial({color:0xffffff}));
        face.rotation.x = Math.PI / 2;
        const frame = new THREE.Mesh(new THREE.TorusGeometry(0.6, 0.05, 16, 100), new THREE.MeshStandardMaterial({color:0x331100}));
        
        const hourHand = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.3, 0.05), new THREE.MeshStandardMaterial({color:0x000000}));
        hourHand.position.y = 0.15;
        clock.add(face, frame, hourHand);
        clock.position.set(0, 4.5, -5.9);
        parent.add(clock);
    }
    addClock(room1);

    // 3. ドア (接続用)
    const door = new THREE.Group();
    const doorBody = new THREE.Mesh(new THREE.BoxGeometry(2.5, 5, 0.2), new THREE.MeshStandardMaterial({color:0x1a1a1a, metalness: 0.6}));
    doorBody.position.y = 2.5;
    door.add(doorBody);
    door.position.set(6, 0, 0);
    door.rotation.y = Math.PI / 2;
    door.name = "door_to_r2";
    scene.add(door);

    // --- Controls ---
    camera.position.set(0, 3, 5);
    let yaw = 0, pitch = 0;
    const move = { w: false, a: false, s: false, d: false };

    document.getElementById('start-btn').addEventListener('click', () => {
        document.body.requestPointerLock();
        document.getElementById('overlay').style.display = 'none';
    });

    window.addEventListener('keydown', e => {
        const key = e.code.toLowerCase();
        if (key === 'keyw') move.w = true;
        if (key === 'keys') move.s = true;
        if (key === 'keya') move.a = true;
        if (key === 'keyd') move.d = true;
        if (e.code === 'Space') cycleItem();
        if (e.shiftKey) useItem();
    });
    window.addEventListener('keyup', e => {
        const key = e.code.toLowerCase();
        if (key === 'keyw') move.w = false;
        if (key === 'keys') move.s = false;
        if (key === 'keya') move.a = false;
        if (key === 'keyd') move.d = false;
    });

    document.addEventListener('mousemove', e => {
        if (document.pointerLockElement) {
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
        }
    });

    function animate() {
        if (document.pointerLockElement) {
            const speed = 0.1;
            const fwd = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
            const side = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
            
            if (move.w) camera.position.addScaledVector(fwd, speed);
            if (move.s) camera.position.addScaledVector(fwd, -speed);
            if (move.a) camera.position.addScaledVector(side, -speed);
            if (move.d) camera.position.addScaledVector(side, speed);

            // 簡易的な移動範囲制限
            camera.position.y = 3;
            if (camera.position.x < -5) camera.position.x = -5;
            if (!state.doorOpen && camera.position.x > 5) camera.position.x = 5;
            if (camera.position.x > 17) camera.position.x = 17;
        }
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }
    animate();

    // --- Interaction ---
    window.addEventListener('mousedown', () => {
        if (!document.pointerLockElement) return;
        const ray = new THREE.Raycaster();
        ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = ray.intersectObjects(scene.children, true);

        if (hits.length > 0 && hits[0].distance < 4) {
            let obj = hits[0].object;
            while(obj.parent && !obj.name) obj = obj.parent;

            if (obj.name === "shelf" || obj.name === "vase") {
                if (!state.inv.includes("key")) {
                    state.inv.push("key");
                    notify("花瓶の裏に「真鍮の鍵」が隠されていた。");
                    updateUI();
                } else {
                    notify("重厚な作りの棚だ。");
                }
            } else if (obj.name === "door_to_r2") {
                notify("鍵がかかっている。");
            }
        }
    });

    function useItem() {
        if (state.inv[state.sel] === "key") {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(scene.children, true);
            const doorHit = hits.find(h => h.object.parent.name === "door_to_r2");
            
            if (doorHit && doorHit.distance < 4) {
                state.doorOpen = true;
                notify("鍵が開いた！隣の部屋へ行ける。");
                doorHit.object.parent.position.y += 5; // ドアが開く
            }
        }
    }

    function notify(t) { document.getElementById('text').innerText = t; }
    function cycleItem() { if(state.inv.length > 0) { state.sel = (state.sel + 1) % state.inv.length; updateUI(); } }
    function updateUI() {
        for(let i=0; i<2; i++) {
            const s = document.getElementById(`slot-${i}`);
            s.innerHTML = state.inv[i] ? items[state.inv[i]].icon : "";
            s.classList.toggle('selected', i === state.sel);
        }
    }
</script>
</body>
</html>
