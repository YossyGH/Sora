<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>THE THREE ROOMS - TRUE FINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; color: white; }
        #guide { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); color: #fff; padding: 15px; border-radius: 8px; font-size: 13px; z-index: 500; border-left: 5px solid #e74c3c; }
        .k { background: #444; padding: 2px 5px; border-radius: 3px; color: #ffeb3b; }
        #inv { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 500; }
        .slot { width: 85px; height: 85px; background: rgba(20,20,20,0.9); border: 2px solid #444; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .slot.active { border-color: #e74c3c; background: rgba(231,76,60,0.1); }
        #msg-box { position: absolute; bottom: 50px; width: 100%; text-align: center; pointer-events: none; }
        #msg-text { display: inline-block; background: rgba(0,0,0,0.85); color: white; padding: 12px 30px; border-bottom: 3px solid #e74c3c; font-size: 18px; }
        #safe-ui { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2c3e50; padding: 20px; border-radius: 10px; z-index: 1500; border: 3px solid #fff; }
        #safe-disp { font-size: 30px; width: 150px; text-align: center; margin-bottom: 10px; }
        .numpad { display: grid; grid-template-columns: repeat(3, 50px); gap: 5px; }
        .numpad button { height: 50px; cursor: pointer; }
        /* テロップの設定：絶対に見えるように設定 */
        #telop { position: fixed; top: 35%; width: 100%; text-align: center; color: #ffeb3b; font-size: 38px; font-weight: bold; opacity: 0; transition: opacity 1s; pointer-events: none; z-index: 2000; text-shadow: 2px 2px 10px #000; }
    </style>
</head>
<body>

<div id="overlay">
    <h1>THE THREE ROOMS</h1>
    <button style="padding:15px 40px; cursor:pointer;" onclick="startGame()">ゲーム開始</button>
</div>

<div id="guide">
    <span class="k">↑↓←→</span> 移動 / <span class="k">マウス</span> 視点<br>
    <span class="k">SPACE</span> 調べる / <span class="k">TAB</span> 切替 / <span class="k">SHIFT</span> 詳細
</div>

<div id="inv">
    <div id="s0" class="slot active"><div style="font-size:30px"></div><div style="font-size:10px">Slot 1</div></div>
    <div id="s1" class="slot"><div style="font-size:30px"></div><div style="font-size:10px">Slot 2</div></div>
    <div id="s2" class="slot"><div style="font-size:30px"></div><div style="font-size:10px">Slot 3</div></div>
</div>

<div id="telop">ヒント：『黄色は赤の直後ではない』</div>
<div id="msg-box"><div id="msg-text">脱出のヒントを探せ。</div></div>

<div id="safe-ui">
    <input type="text" id="safe-disp" readonly>
    <div class="numpad" id="btns"></div>
    <button onclick="checkSafe()" style="width:100%; margin-top:10px; padding:10px; background:#27ae60; color:white; border:none; cursor:pointer;">解除</button>
</div>

<script>
let scene, camera, renderer, yaw = 0, pitch = 0, keys = {};
const player = { inv: [null, null, null], sel: 0, isUI: false, r3: false };
const world = { d1: false, d2: false, chair: false, puzzle: [] };

const ITEM_DATA = {
    key1: { icon: "🗝️", name: "真鍮の鍵", desc: "『赤は青より前だが、直前（隣）ではない』" },
    card: { icon: "💳", name: "認証カード", desc: "『青は2番目だ』" },
    key2: { icon: "🔑", name: "黄金の鍵", desc: "脱出の鍵。金の扉に使え。" }
};

function startGame() {
    document.getElementById('overlay').style.display = 'none';
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    [0, 22, 44].forEach(x => {
        let p = new THREE.PointLight(0xffffff, 1, 30); p.position.set(x, 7, 0); scene.add(p);
    });

    createRoom(0, 0x2c1e14); createRoom(22, 0x0f260f); createRoom(44, 0x0f0f26);

    const v = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 1), new THREE.MeshStandardMaterial({color: 0x00bcd4}));
    v.position.set(-6, 1.5, -6); v.name = "vase"; scene.add(v);

    const d1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), new THREE.MeshStandardMaterial({color: 0x3e2723}));
    d1.position.set(8, 3, 0); d1.name = "door1"; scene.add(d1);

    const ch = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.5, 1.5), new THREE.MeshStandardMaterial({color: 0x880e4f}));
    ch.position.set(24, 0.25, 5); ch.name = "chair"; scene.add(ch);

    const s = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshStandardMaterial({color: 0x111}));
    s.position.set(29, 0.6, -6); s.name = "safe"; scene.add(s);
    
    const d2 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), new THREE.MeshStandardMaterial({color: 0x000}));
    d2.position.set(30, 3, 0); d2.name = "door2"; scene.add(d2);

    createP(40, -5, 0xff3333, "red"); createP(46, -5, 0x3333ff, "blue");
    createP(40, 5, 0xffff33, "yellow"); createP(46, 5, 0x33ff33, "green");

    const ex = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), new THREE.MeshStandardMaterial({color: 0xffd700}));
    ex.position.set(52, 3, 0); ex.name = "exit"; scene.add(ex);

    const b = document.getElementById('btns');
    for(let i=1; i<=9; i++) {
        let btn = document.createElement('button'); btn.innerText = i;
        btn.onclick = () => document.getElementById('safe-disp').value += i;
        b.appendChild(btn);
    }

    camera.position.set(0, 3, 8);
    renderer.domElement.requestPointerLock();
    animate();
}

function createRoom(x, col) {
    const box = new THREE.Mesh(new THREE.BoxGeometry(16, 9, 16), new THREE.MeshStandardMaterial({color: col, side: 1}));
    box.position.set(x, 4.5, 0); scene.add(box);
}

function createP(x, z, col, id) {
    const g = new THREE.Group();
    const o = new THREE.Mesh(new THREE.OctahedronGeometry(0.7), new THREE.MeshStandardMaterial({color: col, emissive: col, emissiveIntensity: 0.6}));
    o.position.y = 4; o.name = "n_" + id; o.userData = { originalColor: col };
    g.add(o); g.position.set(x, 1.75, z); scene.add(g);
}

function addToInv(id) {
    if (player.inv.includes(id)) return;
    const emptySlot = player.inv.indexOf(null);
    if (emptySlot !== -1) {
        player.inv[emptySlot] = id;
        if(id === "key2") player.sel = emptySlot;
        updateUI();
    }
}

function interact() {
    const r = new THREE.Raycaster(); r.setFromCamera(new THREE.Vector2(0,0), camera);
    const h = r.intersectObjects(scene.children, true);
    if(h.length > 0 && h[0].distance < 6) {
        const o = h[0].object; const item = player.inv[player.sel];
        
        if(o.name === "vase") { 
            addToInv("key1"); notify("真鍮の鍵と、中に『1枚のコイン』を見つけた。"); 
        }
        else if(o.name === "door1") { 
            if(item === "key1") { o.position.y += 8; world.d1 = true; notify("Room 1 開放。"); } 
            else notify("鍵が必要だ。"); 
        }
        else if(o.name === "chair") { 
            if(!world.chair) { 
                o.position.x -= 3; world.chair = true; 
                notify("椅子を動かした。座面裏に『PASS = (椅子の数1 + コイン数1) × 441』とある。"); 
            } 
        }
        else if(o.name === "safe") { 
            if(world.chair) { player.isUI = true; document.getElementById('safe-ui').style.display='block'; document.exitPointerLock(); }
            else notify("金庫だ。番号が必要だ。");
        }
        else if(o.name === "door2") { 
            if(item === "card") { o.position.y += 8; world.d2 = true; notify("Room 2 開放。"); } 
            else notify("カードキーが必要だ。"); 
        }
        else if(o.name.startsWith("n_")) {
            const id = o.name.split("_")[1]; world.puzzle.push(id); 
            o.material.emissive.set(0xffffff); o.material.emissiveIntensity = 12;
            if(world.puzzle.length === 4) {
                if(world.puzzle.join(",") === "red,blue,yellow,green") { addToInv("key2"); notify("解錠！黄金の鍵を入手。"); }
                else { world.puzzle = []; notify("リセット。"); scene.traverse(obj => { if(obj.name?.startsWith("n_")) { obj.material.emissive.set(obj.userData.originalColor); obj.material.emissiveIntensity = 0.6; } }); }
            }
        }
        else if(o.name === "exit") { if(item === "key2") { alert("脱出成功！"); location.reload(); } }
    }
}

function checkSafe() {
    if(document.getElementById('safe-disp').value === "882") {
        addToInv("card"); notify("カードを入手。"); player.isUI = false; document.getElementById('safe-ui').style.display='none';
        renderer.domElement.requestPointerLock();
    } else { document.getElementById('safe-disp').value = ""; }
}

function updateUI() {
    for(let i=0; i<3; i++){
        const s = document.getElementById('s'+i); const k = player.inv[i];
        s.children[0].innerText = k ? ITEM_DATA[k].icon : "";
        s.className = (i === player.sel) ? "slot active" : "slot";
    }
}

function notify(t) { document.getElementById('msg-text').innerText = t; }

function animate() {
    if(!player.isUI) {
        const move = new THREE.Vector3();
        const fwd = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        const rgt = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        if(keys['ArrowUp']) move.add(fwd); if(keys['ArrowDown']) move.add(fwd.negate());
        if(keys['ArrowLeft']) move.add(rgt.negate()); if(keys['ArrowRight']) move.add(rgt);
        if(move.length() > 0) camera.position.addScaledVector(move.normalize(), 0.18);

        // Room 3突入判定とテロップ強制表示
        if(!player.r3 && camera.position.x > 36) {
            player.r3 = true;
            const t = document.getElementById('telop');
            t.style.opacity = "1";
            setTimeout(() => { t.style.opacity = "0"; }, 6000);
        }

        camera.position.x = Math.max(-7, Math.min(51, camera.position.x));
        if(!world.d1 && camera.position.x > 7.4) camera.position.x = 7.4;
        if(!world.d2 && camera.position.x > 29.4) camera.position.x = 29.4;
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
    }
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(e.code === 'Space' && !player.isUI) interact();
    if(e.code === 'Tab') { e.preventDefault(); player.sel = (player.sel + 1) % 3; updateUI(); }
});
window.addEventListener('keyup', e => keys[e.code] = false);
document.addEventListener('mousemove', e => { if (document.pointerLockElement) { yaw -= e.movementX * 0.002; pitch = Math.max(-1.4, Math.min(1.4, pitch - e.movementY * 0.002)); } });
</script>
</body>
</html>
