<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Walkable Escape</title>
    <style>
        :root { --wall: #e0e0e0; --floor: #795548; --accent: #2196F3; }
        body { margin: 0; background: #222; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* 3Dレンダリングエリア */
        #stage {
            width: 100%; height: 50vh; perspective: 600px;
            background: #87CEEB; position: relative; overflow: hidden;
        }

        #camera {
            width: 100%; height: 100%; position: absolute;
            transform-style: preserve-3d; transition: transform 0.3s ease;
        }

        /* 空間（部屋） */
        .room {
            position: absolute; width: 400px; height: 400px;
            top: 50%; left: 50%; margin: -200px;
            transform-style: preserve-3d;
        }

        .plane {
            position: absolute; width: 400px; height: 400px;
            background: var(--wall); border: 2px solid #ccc;
            display: flex; align-items: center; justify-content: center; font-size: 50px;
            backface-visibility: hidden;
        }

        /* 迷路の構造 (Z方向に並べる) */
        .p-front  { transform: translateZ(200px); }
        .p-back   { transform: rotateY(180deg) translateZ(200px); }
        .p-left   { transform: rotateY(-90deg) translateZ(200px); }
        .p-right  { transform: rotateY(90deg) translateZ(200px); }
        .p-floor  { transform: rotateX(-90deg) translateZ(200px); background: var(--floor); }
        .p-ceil   { transform: rotateX(90deg) translateZ(200px); background: #fff; }

        /* UIと操作 */
        #ui { flex: 1; background: #fff; color: #333; display: flex; flex-direction: column; }
        #msg { padding: 15px; font-size: 0.9rem; border-bottom: 1px solid #ddd; height: 60px; overflow-y: auto; }
        
        .d-pad {
            display: grid; grid-template-columns: 70px 70px 70px; grid-template-rows: 60px 60px;
            gap: 10px; justify-content: center; padding: 20px;
        }
        .btn {
            background: #eee; border: 2px solid #ccc; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold;
        }
        .btn:active { background: #bbb; }
        .btn-action { grid-column: span 3; background: var(--accent); color: white; border: none; }

        #pass-ui { padding: 0 20px; text-align: center; }
        input { width: 100px; font-size: 1.5rem; text-align: center; border: 2px solid #ccc; border-radius: 5px; }

        #clear {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #fff; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="stage">
    <div id="camera">
        <div class="room">
            <div class="plane p-front">🚪</div> <div class="plane p-back">🖼️</div>  <div class="plane p-left">📚</div>  <div class="plane p-right">🪴</div> <div class="plane p-floor"></div>
            <div class="plane p-ceil"></div>
        </div>
    </div>
</div>

<div id="ui">
    <div id="msg">矢印で部屋の中を移動できる。目の前のものを詳しく調べるには「CHECK」を押せ。</div>
    
    <div id="pass-ui">
        <input type="number" id="code" placeholder="----">
    </div>

    <div class="d-pad">
        <div></div>
        <div class="btn" onclick="move('f')">前進</div>
        <div></div>
        <div class="btn" onclick="turn('l')">左向</div>
        <div class="btn" onclick="move('b')">後退</div>
        <div class="btn" onclick="turn('r')">右向</div>
        <div class="btn btn-action" onclick="check()">CHECK (調べる / 脱出)</div>
    </div>
</div>

<div id="clear">
    <h1>ESCAPE SUCCESS!</h1>
    <p>おめでとう！よしたは部屋を攻略した！</p>
    <button onclick="location.reload()" style="padding: 15px 30px; font-size: 1rem;">最初から</button>
</div>
