<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cute Escape - 3 Rooms</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background: #fff5f8; }
        canvas { display: block; }

        /* UI */
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: #555; }
        #inventory { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .slot { 
            width: 65px; height: 65px; border: 3px solid #ffd1dc; background: rgba(255,255,255,0.9); 
            display: flex; align-items: center; justify-content: center; font-size: 35px; border-radius: 15px; 
        }
        .slot.selected { border-color: #ff99ab; box-shadow: 0 0 15px #ff99ab; background: #fff0f3; }

        #item-detail { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 300px; background: white; border: 4px solid #ff99ab; padding: 20px; text-align: center; border-radius: 20px; pointer-events: auto; 
        }
        
        #msg-box { position: absolute; bottom: 30px; width: 100%; text-align: center; }
        #text { 
            display: inline-block; background: rgba(255,255,255,0.9); padding: 10px 30px; 
            border-radius: 25px; font-size: 18px; border: 2px solid #ff99ab; color: #ff6b81; font-weight: bold;
        }

        #guide { 
            position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.8); 
            padding: 15px; border-radius: 15px; font-size: 13px; border: 1px solid #ffd1dc;
        }

        #numpad { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; padding: 25px; border: 4px solid #ff99ab; border-radius: 20px; pointer-events: auto; text-align: center; 
        }
        input { font-size: 30px; width: 120px; text-align: center; margin-bottom: 15px; border: 2px solid #ffd1dc; border-radius: 10px; color: #ff6b81; }
        button { 
            padding: 10px 20px; cursor: pointer; background: #ff99ab; border: none; 
            font-weight: bold; border-radius: 10px; color: white; margin: 5px;
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="inventory">
        <div id="slot-0" class="slot"></div>
        <div id="slot-1" class="slot"></div>
        <div id="slot-2" class="slot"></div>
    </div>

    <div id="item-detail">
        <h2 id="detail-name" style="margin:0; color:#ff6b81;">ITEM</h2>
        <div id="detail-icon" style="font-size:60px; margin:15px;">❓</div>
        <p id="detail-desc" style="color:#777;">説明</p>
        <button onclick="closeDetail()">閉じる</button>
    </div>

    <div id="guide">
        <b>お部屋のしらべかた</b><br>
        移動: [↑][↓][←][→] / [WASD]<br>
        視点: マウスをうごかす<br>
        しらべる: 左クリック<br>
        えらぶ: [Space]<br>
        くわしく見る: [Enter]<br>
        つかう: [Shift]
    </div>

    <div id="msg-box">
        <div id="text">画面をクリックしてスタート！</div>
    </div>

    <div id="numpad">
        <h2 style="color:#ff6b81">カギをあける</h2>
        <input type="number" id="code-in" placeholder="000"><br>
        <button onclick="checkSafe()">OK!</button>
        <button onclick="closeNumpad()" style="background:#ccc;">やめる</button>
    </div>
</div>

<div style="position:absolute; top:50%; left:50%; width:10px; height:10px; border:2px solid #ff99ab; border-radius:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:10; opacity:0.5;"></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const state = { 
        inv: [], sel: -1, 
        currentRoom: 1, 
        solvedRoom1: false,
        solvedRoom2: false,
        room1Btns: []
    };

    const itemData = {
        key_r2: { name: "キャンディのカギ", icon: "🍭", desc: "ピンクのドアを開けるカギ。甘い匂いがする。" },
        lever: { name: "星のレバー", icon: "⭐", desc: "キラキラしたレバー。青い部屋で使えそう。" },
        key_exit: { name: "魔法のカギ", icon: "✨", desc: "これで外に出られるよ！やったね！" }
    };

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambient);
    const light = new THREE.PointLight(0xffffff, 50);
    camera.add(light);
    scene.add(camera);

    const roomSize = 14;
    const roomHeight = 8;
    const spacing = 25;

    // 部屋作成関数
    function createRoom(id, x, color) {
        const group = new THREE.Group();
        group.position.x = x;
        
        // 壁と床
        const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(roomSize, roomHeight, roomSize),
            new THREE.MeshStandardMaterial({ color: color, side: THREE.BackSide, roughness: 1 })
        );
        mesh.position.y = roomHeight / 2;
        group.add(mesh);

        // 床の白いグリッド（可愛らしく）
        const grid = new THREE.GridHelper(roomSize, 14, 0xffffff, 0xffffff);
        grid.position.y = 0.01;
        grid.material.opacity = 0.3;
        grid.material.transparent = true;
        group.add(grid);

        scene.add(group);
        return group;
    }

    const room1 = createRoom(1, 0, 0xfff0f3); // ピンク
    const room2 = createRoom(2, spacing, 0xfffde7); // イエロー
    const room3 = createRoom(3, spacing * 2, 0xe3f2fd); // ブルー

    // オブジェクト作成 (可愛く修正)
    function makeCuteObj(w, h, d, x, y, z, col, name, parent, ry = 0) {
        const m = new THREE.Mesh(
            new THREE.BoxGeometry(w, h, d),
            new THREE.MeshStandardMaterial({ color: col, roughness: 0.2 })
        );
        m.position.set(x, y + h/2, z);
        m.rotation.y = ry;
        m.name = name;
        parent.add(m);
        return m;
    }

    // --- 部屋1の家具 ---
    makeCuteObj(1.5, 5, 4, -6.2, 0, 0, 0xffccbc, "shelf_r1", room1); // 本棚(アプリコット)
    makeCuteObj(0.6, 0.6, 0.3, 0, 3, -6.9, 0xff6b81, "btn_red", room1); // 赤ボタン
    makeCuteObj(0.6, 0.6, 0.3, 2, 3, -6.9, 0x81ecec, "btn_blue", room1); // 青ボタン
    // ドア1 (右側) - 壁にピッタリ沿うように配置
    makeCuteObj(2.5, 5.5, 0.1, 6.95, 0, 0, 0xff99ab, "door_1_2", room1, Math.PI / 2);

    // --- 部屋2の家具 ---
    makeCuteObj(3, 1.2, 2, 5.5, 0, 4, 0x81ecec, "desk_r2", room2); // 水色の机
    makeCuteObj(0.8, 0.8, 0.8, 5.5, 1.2, 4, 0x55efc4, "safe_r2", room2); // ミント色の金庫
    makeCuteObj(1, 1.5, 0.2, -6.9, 4, 0, 0xfad390, "poster_r2", room2, Math.PI / 2); // ポスター
    // ドア2 (左：部屋1へ / 右：部屋3へ)
    makeCuteObj(2.5, 5.5, 0.1, -6.95, 0, 0, 0xff99ab, "door_2_1", room2, Math.PI / 2);
    makeCuteObj(2.5, 5.5, 0.1, 6.95, 0, 0, 0x74b9ff, "door_2_3", room2, Math.PI / 2);

    // --- 部屋3の家具 ---
    makeCuteObj(1, 2, 1, 0, 0, -5, 0xa29bfe, "pedestal_r3", room3); // 紫の台座
    makeCuteObj(2.5, 5.5, 0.1, 6.95, 0, 0, 0x6c5ce7, "door_exit", room3, Math.PI / 2); // 脱出ドア
    makeCuteObj(2.5, 5.5, 0.1, -6.95, 0, 0, 0x74b9ff, "door_3_2", room3, Math.PI / 2);

    camera.position.set(0, 3, 5);

    // --- 操作ロジック ---
    const keys = {};
    let yaw = 0, pitch = 0;

    window.addEventListener('keydown', e => { 
        keys[e.code] = true;
        if(e.code === 'Space') cycleItem();
        if(e.code === 'Enter') showItemDetail();
        if(e.code === 'ShiftLeft' || e.code === 'ShiftRight') useItem();
    });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    renderer.domElement.addEventListener('click', () => {
        if(document.getElementById('numpad').style.display !== 'block' && 
           document.getElementById('item-detail').style.display !== 'block') {
            renderer.domElement.requestPointerLock();
        }
    });

    document.addEventListener('mousemove', e => {
        if (document.pointerLockElement === renderer.domElement) {
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
        }
    });

    function moveLoop() {
        if (document.pointerLockElement === renderer.domElement) {
            const moveVec = new THREE.Vector3();
            const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
            const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0, 1, 0));

            if (keys['ArrowUp'] || keys['KeyW']) moveVec.add(forward);
            if (keys['ArrowDown'] || keys['KeyS']) moveVec.sub(forward);
            if (keys['ArrowLeft'] || keys['KeyA']) moveVec.sub(right);
            if (keys['ArrowRight'] || keys['KeyD']) moveVec.add(right);

            if (moveVec.length() > 0) {
                moveVec.normalize().multiplyScalar(0.12);
                const nextX = camera.position.x + moveVec.x;
                const nextZ = camera.position.z + moveVec.z;
                
                const roomX = (state.currentRoom - 1) * spacing;
                const limit = (roomSize / 2) - 0.8;
                if (Math.abs(nextX - roomX) < limit) camera.position.x = nextX;
                if (Math.abs(nextZ) < limit) camera.position.z = nextZ;
            }
        }
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        renderer.render(scene, camera);
        requestAnimationFrame(moveLoop);
    }
    moveLoop();

    // クリック：調べる
    window.addEventListener('mousedown', () => {
        if (document.pointerLockElement !== renderer.domElement) return;
        const ray = new THREE.Raycaster();
        ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = ray.intersectObjects(scene.children, true);

        if(hits.length > 0 && hits[0].distance < 5) {
            const target = hits[0].object.name;
            
            if(target === "shelf_r1") notify("可愛らしい本がたくさん並んでいる。");
            else if(target === "btn_red") { state.room1Btns.push("R"); notify("赤いボタンを押した！"); checkR1(); }
            else if(target === "btn_blue") { state.room1Btns.push("B"); notify("青いボタンを押した！"); checkR1(); }
            else if(target === "door_1_2") { if(state.inv.includes("key_r2")) moveRoom(2); else notify("カギがかかっている。ピンクのカギが必要。"); }
            else if(target === "poster_r2") notify("ポスターに『5 2 1』と書いてある。");
            else if(target === "safe_r2") { document.exitPointerLock(); document.getElementById('numpad').style.display='block'; }
            else if(target === "door_2_1") moveRoom(1);
            else if(target === "door_2_3") { if(state.solvedRoom2) moveRoom(3); else notify("金庫をあけないと開かないみたい。"); }
            else if(target === "door_3_2") moveRoom(2);
            else if(target === "door_exit") notify("最後のドアだ。魔法のカギがあれば出られるよ。");
            updateUI();
        }
    });

    // Shift：つかう
    function useItem() {
        if (document.pointerLockElement !== renderer.domElement || state.sel === -1) return;
        const held = state.inv[state.sel];
        const ray = new THREE.Raycaster();
        ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = ray.intersectObjects(scene.children, true);

        if(hits.length > 0 && hits[0].distance < 5) {
            const target = hits[0].object.name;
            if(target === "door_1_2" && held === "key_r2") moveRoom(2);
            else if(target === "pedestal_r3" && held === "lever") {
                state.inv.splice(state.sel, 1);
                state.inv.push("key_exit");
                notify("レバーをさしこんだ！魔法のカギが出てきたよ。");
            }
            else if(target === "door_exit" && held === "key_exit") {
                notify("おめでとう！脱出成功！");
                setTimeout(()=>location.reload(), 3000);
            }
            updateUI();
        }
    }

    function checkR1() {
        if(state.room1Btns.join("") === "RBR") {
            if(!state.inv.includes("key_r2")) {
                state.inv.push("key_r2");
                notify("正解！ピンクのカギが落ちてきたよ。");
            }
        } else if(state.room1Btns.length >= 3) state.room1Btns = [];
    }

    window.checkSafe = () => {
        if(document.getElementById('code-in').value === "521") {
            state.solvedRoom2 = true;
            state.inv.push("lever");
            closeNumpad();
            notify("金庫が開いた！星のレバーをゲット！");
            updateUI();
        } else { alert("番号がちがうみたい。"); }
    };

    function moveRoom(n) {
        state.currentRoom = n;
        camera.position.x = (n-1) * spacing;
        notify(`部屋${n}に移動したよ。`);
    }

    window.closeNumpad = () => { document.getElementById('numpad').style.display='none'; renderer.domElement.requestPointerLock(); };
    function showItemDetail() {
        if(state.sel === -1) return;
        const item = itemData[state.inv[state.sel]];
        document.getElementById('detail-name').innerText = item.name;
        document.getElementById('detail-icon').innerText = item.icon;
        document.getElementById('detail-desc').innerText = item.desc;
        document.getElementById('item-detail').style.display = 'block';
        document.exitPointerLock();
    }
    window.closeDetail = () => { document.getElementById('item-detail').style.display='none'; renderer.domElement.requestPointerLock(); };
    function cycleItem() { if(state.inv.length > 0) { state.sel = (state.sel + 1) % state.inv.length; updateUI(); } }
    function notify(t) { document.getElementById('text').innerText = t; }
    function updateUI() {
        for(let i=0; i<3; i++) {
            const s = document.getElementById(`slot-${i}`);
            s.innerHTML = state.inv[i] ? itemData[state.inv[i]].icon : "";
            s.classList.toggle('selected', i === state.sel);
        }
    }
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
