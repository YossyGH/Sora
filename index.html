<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D Escape - Movement Fixed Final</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #ffffff; }
        canvas { display: block; }

        /* UI */
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; color: white; text-shadow: 1px 1px 3px black;
        }

        #inventory {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 10px; pointer-events: auto;
        }
        .slot {
            width: 64px; height: 64px; border: 3px solid #555; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; border-radius: 12px;
        }
        .slot.selected { border-color: #00d4ff; box-shadow: 0 0 15px #00d4ff; background: rgba(0,212,255,0.3); }

        #msg-box { position: absolute; bottom: 40px; width: 100%; text-align: center; }
        #text {
            display: inline-block; background: rgba(0,0,0,0.8);
            padding: 12px 35px; border-radius: 30px; font-size: 18px; border: 2px solid #00d4ff;
        }

        #guide {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; font-size: 13px; line-height: 1.5;
        }

        #numpad {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: #1a1a1a;
            padding: 25px; border: 4px solid #00d4ff; border-radius: 20px;
            pointer-events: auto; text-align: center;
        }
        input { font-size: 32px; width: 140px; text-align: center; margin-bottom: 15px; border-radius: 8px; }
        button { padding: 12px 25px; cursor: pointer; background: #00d4ff; border: none; font-weight: bold; border-radius: 8px; color: white; }
    </style>
</head>
<body>

<div id="ui">
    <div id="inventory">
        <div id="slot-0" class="slot"></div>
        <div id="slot-1" class="slot"></div>
        <div id="slot-2" class="slot"></div>
    </div>

    <div id="guide">
        <b>【移動】</b><br>
        矢印キー [↑][↓][←][→]<br>
        または [W][A][S][D]<br><br>
        <b>【視点】</b><br>
        マウスを動かす<br>
        (クリックで操作開始)<br><br>
        <b>【操作】</b><br>
        中央の〇を合わせてクリック<br>
        [Space] でアイテム選択
    </div>

    <div id="msg-box">
        <div id="text">画面内をクリックしてゲームを開始してください</div>
    </div>

    <div id="numpad">
        <h2 style="color:#00d4ff; margin-top:0;">SAFE LOCK</h2>
        <input type="number" id="code-in" placeholder="000"><br>
        <button onclick="checkSafe()">解除</button>
        <button onclick="closeNumpad()">閉じる</button>
    </div>
</div>

<div style="position:absolute; top:50%; left:50%; width:10px; height:10px; border:2px solid #00d4ff; border-radius:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:100;"></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const state = { inv: [], sel: -1, solved: false };
    const items = {
        note: { name: "メモ", icon: "📜" },
        handle: { name: "ハンドル", icon: "⚙️" },
        key: { name: "金の鍵", icon: "🔑" }
    };

    // --- シーン・カメラ ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdddddd); 

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 強めの照明
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2); 
    scene.add(ambientLight);
    const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
    sunLight.position.set(5, 10, 5);
    scene.add(sunLight);

    // 部屋
    const roomSize = 16;
    const room = new THREE.Mesh(
        new THREE.BoxGeometry(roomSize, 8, roomSize),
        new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.BackSide })
    );
    room.position.y = 4;
    scene.add(room);

    // 床（色を変えて分かりやすく）
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(roomSize, roomSize),
        new THREE.MeshStandardMaterial({ color: 0x999999 })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // オブジェクト配置
    function createObj(w, h, d, x, z, col, name) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({color: col}));
        m.position.set(x, h/2, z);
        m.name = name;
        scene.add(m);
        return m;
    }

    createObj(1.5, 5, 4, -7, 0, 0x5d4037, "shelf"); // 本棚
    createObj(3, 1.2, 2, 6, 4, 0x444444, "desk");   // 机
    createObj(0.7, 0.7, 0.7, 6, 4, 0x111111, "box"); // 金庫
    createObj(2.5, 5, 0.2, 0, -7.9, 0x2980b9, "door"); // ドア

    camera.position.set(0, 3, 5);

    // --- 操作系（マウスロック & キー判定） ---
    const keys = {};
    const moveSpeed = 0.15;
    const rotateSpeed = 0.002;
    let yaw = 0, pitch = 0;

    window.addEventListener('keydown', e => { 
        keys[e.code] = true;
        if(e.code === 'Space') cycleItem();
    });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    renderer.domElement.addEventListener('mousedown', () => {
        if(document.getElementById('numpad').style.display !== 'block') {
            renderer.domElement.requestPointerLock();
        }
    });

    document.addEventListener('mousemove', e => {
        if (document.pointerLockElement === renderer.domElement) {
            yaw -= e.movementX * rotateSpeed;
            pitch -= e.movementY * rotateSpeed;
            pitch = Math.max(-Math.PI/2.3, Math.min(Math.PI/2.3, pitch));
        }
    });

    // --- メインループ（移動計算） ---
    function update() {
        if (document.pointerLockElement === renderer.domElement) {
            camera.rotation.set(pitch, yaw, 0, 'YXZ');

            const moveDirection = new THREE.Vector3();
            // カメラの向きから「前」と「右」を取得
            const matrix = new THREE.Matrix4().makeRotationY(yaw);
            const forward = new THREE.Vector3(0, 0, -1).applyMatrix4(matrix);
            const right = new THREE.Vector3(1, 0, 0).applyMatrix4(matrix);

            // 矢印キー・WASD判定
            if (keys['ArrowUp'] || keys['KeyW']) moveDirection.add(forward);
            if (keys['ArrowDown'] || keys['KeyS']) moveDirection.sub(forward);
            if (keys['ArrowLeft'] || keys['KeyA']) moveDirection.sub(right);
            if (keys['ArrowRight'] || keys['KeyD']) moveDirection.add(right);

            if (moveDirection.length() > 0) {
                moveDirection.normalize().multiplyScalar(moveSpeed);
                const nextX = camera.position.x + moveDirection.x;
                const nextZ = camera.position.z + moveDirection.z;
                
                // 壁の当たり判定
                const limit = (roomSize / 2) - 1.2;
                if (Math.abs(nextX) < limit) camera.position.x = nextX;
                if (Math.abs(nextZ) < limit) camera.position.z = nextZ;
            }
        }
        renderer.render(scene, camera);
        requestAnimationFrame(update);
    }
    update();

    // --- ゲームアクション ---
    window.addEventListener('mousedown', () => {
        if (document.pointerLockElement !== renderer.domElement) return;
        const ray = new THREE.Raycaster();
        ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = ray.intersectObjects(scene.children);

        if(hits.length > 0 && hits[0].distance < 6) {
            const target = hits[0].object.name;
            const held = state.inv[state.sel];

            if(target === "shelf") {
                if(!state.inv.includes("note")) {
                    state.inv.push("note");
                    notify("メモを発見！『暗号は 104』");
                }
            } else if(target === "desk") {
                if(!state.solved) {
                    document.exitPointerLock();
                    document.getElementById('numpad').style.display = 'block';
                }
            } else if(target === "box") {
                if(held === "handle") {
                    state.inv.splice(state.sel, 1);
                    state.inv.push("key");
                    state.sel = state.inv.length - 1;
                    notify("ハンドルを使い、「金の鍵」を入手した！");
                } else { notify("何かを差し込む穴がある。"); }
            } else if(target === "door") {
                if(held === "key") {
                    notify("脱出成功！！");
                    setTimeout(()=>location.reload(), 3000);
                } else { notify("鍵がかかっている。"); }
            }
            updateUI();
        }
    });

    window.checkSafe = () => {
        if(document.getElementById('code-in').value === "104") {
            state.solved = true;
            state.inv.push("handle");
            closeNumpad();
            notify("金庫が開いた！「ハンドル」を入手。");
            updateUI();
        } else { alert("番号が違う！"); }
    };

    window.closeNumpad = () => {
        document.getElementById('numpad').style.display = 'none';
        renderer.domElement.requestPointerLock();
    };

    function cycleItem() {
        if(state.inv.length > 0) {
            state.sel = (state.sel + 1) % state.inv.length;
            updateUI();
            notify(items[state.inv[state.sel]].name + " を選択中");
        }
    }

    function notify(t) { document.getElementById('text').innerText = t; }
    function updateUI() {
        for(let i=0; i<3; i++) {
            const s = document.getElementById(`slot-${i}`);
            s.innerHTML = state.inv[i] ? items[state.inv[i]].icon : "";
            s.classList.toggle('selected', i === state.sel);
        }
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
