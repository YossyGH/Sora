<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>INSIGHT - ひらめきの試練</title>
    <style>
        :root {
            --bg: #000000;
            --main: #ffffff;
            --accent: #ff3e3e;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            background: var(--bg);
            color: var(--main);
            font-family: "Hiragino Sans", "Meiryo", sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #screen {
            width: 100%;
            max-width: 400px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 謎のメインエリア */
        #problem-box {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #333;
            margin-top: 20px;
            position: relative;
            background: #050505;
        }

        .hint-text {
            font-size: 1.2rem;
            margin: 10px 0;
            text-align: center;
            letter-spacing: 2px;
        }

        /* ギミック：逆さまの文字 */
        .upside-down {
            transform: rotate(180deg);
            display: inline-block;
        }

        /* 入力エリア */
        #answer-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #555;
            color: #fff;
            font-size: 2rem;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
        }

        input:focus { border-bottom-color: var(--accent); }

        button {
            background: var(--main);
            color: var(--bg);
            border: none;
            padding: 15px;
            font-weight: bold;
            letter-spacing: 5px;
            cursor: pointer;
        }

        /* 隠し要素 */
        .hidden-hint {
            position: absolute;
            bottom: 5px;
            right: 10px;
            font-size: 0.6rem;
            color: #222; /* ほぼ見えない */
        }

        /* クリア演出 */
        #clear-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--main); color: var(--bg);
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="screen">
        <div style="font-size: 0.7rem; color: #666;">PHASE: CLAIRVOYANCE</div>
        
        <div id="problem-box">
            <div class="hint-text">11 = 2</div>
            <div class="hint-text">12 = 3</div>
            <div class="hint-text">20 = 1</div>
            <div class="hint-text" style="color: var(--accent);">55 = ?</div>
            
            <div class="hidden-hint">答えは画面の外にはない。</div>
        </div>

        <div id="answer-section">
            <input type="number" id="input" placeholder="???" pattern="\d*">
            <button onclick="check()">UNLOCK</button>
        </div>
    </div>

    <div id="clear-layer">
        <h1>GENIUS</h1>
        <p>あなたのひらめきは本物だ。</p>
        <button onclick="location.reload()" style="background:#000; color:#fff; margin-top:20px;">NEXT STAGE</button>
    </div>
