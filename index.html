<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>部屋からの脱出！</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        
        /* 開始画面：絶対にクリックを逃さない設定 */
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: #111; display: flex; align-items: center; 
            justify-content: center; flex-direction: column; z-index: 9999; color: white; 
        }
        #start-btn { 
            padding: 30px 100px; font-size: 35px; background: #28a745; border: none; 
            color: white; cursor: pointer; border-radius: 100px; font-weight: bold; 
            box-shadow: 0 0 50px rgba(40,167,69,0.5); transition: 0.3s;
        }
        #start-btn:hover { background: #34ce57; transform: scale(1.1); }

        /* Congratulations テロップ */
        #clear-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 10000; align-items: center; justify-content: center;
            flex-direction: column; color: #ffd700; text-align: center; pointer-events: none;
        }
        .congrats-text { font-size: 80px; text-shadow: 0 0 30px #ffd700; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* ゲームUI */
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; visibility: hidden; }
        #inventory { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .slot { width: 70px; height: 70px; border: 3px solid #555; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; font-size: 40px; border-radius: 15px; }
        .slot.selected { border-color: #00ffcc; box-shadow: 0 0 15px #00ffcc; }
        #msg-box { position: absolute; bottom: 30px; width: 100%; text-align: center; }
        #text { display: inline-block; background: rgba(0,0,0,0.9); color: white; padding: 20px 50px; border-radius: 50px; border: 2px solid #28a745; font-size: 22px; }
        
        #panel { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; padding: 40px; border-radius: 30px; border: 5px solid #28a745; pointer-events: auto; text-align: center; color: white; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="font-size: 50px; margin-bottom: 30px;">部屋からの脱出！</h1>
    <button id="start-btn" onclick="forceStart()">脱出を開始する</button>
</div>

<div id="clear-screen">
    <div class="congrats-text">Congratulations!</div>
    <p style="font-size: 24px; color: white;">脱出成功！あなたは全ての謎を解き明かした。</p>
</div>

<div id="ui">
    <div id="inventory"><div id="slot-0" class="slot"></div><div id="slot-1" class="slot"></div></div>
    <div id="msg-box"><div id="text">扉を開ける方法を探そう。</div></div>
    <div id="panel">
        <h2>暗証番号入力</h2>
        <p id="p-hint" style="color: #00ffcc;"></p>
        <input type="text" id="p-input" style="font-size: 30px; width: 150px; text-align: center;"><br><br>
        <button id="p-ok" style="padding: 10px 30px; background:#28a745; color:white; border:none; cursor:pointer;">決定</button>
    </div>
</div>

<script>
    // --- Audio ---
    let audioCtx;
    function playSound(f) {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(f, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    // --- Scene ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.9));
    const light = new THREE.DirectionalLight(0xffffff, 0.6); light.position.set(5,10,5); scene.add(light);

    const state = { inv: [], sel: -1, d1: false, d2: false, hints: { chair: false }, r3_seq: [], r3_correct: ["red", "yellow", "blue"] };
    const items = { key1: "🗝️", card: "💳", key2: "🔑" };

    function buildRoom(x, col) {
        const g = new THREE.Group(); g.position.x = x;
        const walls = new THREE.Mesh(new THREE.BoxGeometry(16, 9, 16), new THREE.MeshStandardMaterial({ color: col, side: THREE.BackSide }));
        walls.position.y = 4.5; g.add(walls);
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(16, 16), new THREE.MeshStandardMaterial({ color: 0x222 }));
        floor.rotation.x = -Math.PI/2; g.add(floor);
        scene.add(g); return g;
    }
    buildRoom(0, 0x5d4037); buildRoom(22, 0x2e7d32); buildRoom(44, 0x1a237e);

    // Props
    const vase = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.8), new THREE.MeshStandardMaterial({color: 0x00bcd4}));
    vase.position.set(-5, 0.4, -5); vase.name = "vase"; scene.add(vase);

    const door1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), new THREE.MeshStandardMaterial({color: 0x795548}));
    door1.position.set(8, 3, 0); door1.name = "door1"; scene.add(door1);

    const chair = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshStandardMaterial({color: 0xd81b60}));
    chair.position.set(26, 0.75, 4); chair.name = "chair"; scene.add(chair);

    const safe = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({color: 0x444}));
    safe.position.set(29, 0.5, -5); safe.name = "safe"; scene.add(safe);

    const door2 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), new THREE.MeshStandardMaterial({color: 0x212121}));
    door2.position.set(30, 3, 0); door2.name = "door2"; scene.add(door2);

    const nodes = {};
    const createP = (x, z, col, id) => {
        const crys = new THREE.Mesh(new THREE.OctahedronGeometry(0.5), new THREE.MeshStandardMaterial({color: col, emissive: col, emissiveIntensity: 0.5}));
        crys.position.set(x, 3, z); crys.name = "node_" + id; scene.add(crys); nodes[id] = crys;
    };
    createP(40, -4, 0xff0000, "red"); createP(48, 0, 0x00e5ff, "blue"); createP(40, 4, 0xffff00, "yellow");

    const exitDoor = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), new THREE.MeshStandardMaterial({color: 0xffd700}));
    exitDoor.position.set(52, 3, 0); exitDoor.name = "exitDoor"; scene.add(exitDoor);

    // --- Control ---
    camera.position.set(0, 3, 10);
    let yaw = 0, pitch = 0, keys = {};

    function forceStart() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('ui').style.visibility = 'visible';
        // ロックを試みるが、失敗しても無視してゲームループは回す
        try { renderer.domElement.requestPointerLock(); } catch(e) {}
        animate(); 
    }

    window.onkeydown = (e) => {
        keys[e.code] = true;
        if(e.code === 'Space' && state.inv.length > 0) {
            state.sel = (state.sel + 1) % state.inv.length;
            updateUI(); notify(state.inv[state.sel] === "key1" ? "真鍮の鍵を装備" : state.inv[state.sel] === "card" ? "認証カードを装備" : "黄金の鍵を装備");
        }
    };
    window.onkeyup = (e) => keys[e.code] = false;
    document.onmousemove = (e) => { if(document.pointerLockElement){ yaw-=e.movementX*0.003; pitch-=e.movementY*0.003; pitch=Math.max(-1.4, Math.min(1.4, pitch)); } };

    function interact() {
        const ray = new THREE.Raycaster(); ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = ray.intersectObjects(scene.children);
        if (hits.length > 0 && hits[0].distance < 6) {
            let o = hits[0].object;
            if (o.name === "vase" && !state.inv.includes("key1")) { state.inv.push("key1"); state.sel=0; updateUI(); playSound(800); notify("鍵を入手！[Shift]で扉に使え。"); }
            else if (o.name === "door1" && keys['ShiftLeft'] && state.inv[state.sel]==="key1") { state.d1=true; o.position.y+=8; playSound(400); }
            else if (o.name === "chair") { o.position.z += 2; state.hints.chair=true; notify("椅子に『384』の文字。"); }
            else if (o.name === "safe" && state.hints.chair) {
                document.exitPointerLock(); document.getElementById('panel').style.display='block';
                document.getElementById('p-ok').onclick = () => {
                    if(document.getElementById('p-input').value === "384") {
                        state.inv.push("card"); updateUI(); playSound(1000); 
                        document.getElementById('panel').style.display='none'; renderer.domElement.requestPointerLock();
                    }
                };
            }
            else if (o.name === "door2" && keys['ShiftLeft'] && state.inv[state.sel]==="card") { state.d2=true; o.position.y+=8; playSound(400); }
            else if (o.name.startsWith("node_")) {
                const c = o.name.replace("node_", ""); state.r3_seq.push(c);
                if(state.r3_seq.length === 3) {
                    if(JSON.stringify(state.r3_seq) === JSON.stringify(state.r3_correct)) {
                        state.inv.push("key2"); updateUI(); playSound(1200); notify("黄金の鍵を入手！");
                    } else { state.r3_seq = []; notify("失敗。赤→黄→青の順だ。"); }
                }
            }
            else if (o.name === "exitDoor" && keys['ShiftLeft'] && state.inv[state.sel]==="key2") {
                o.position.y+=8; 
                document.getElementById('clear-screen').style.display = 'flex';
                playSound(1500);
            }
        }
    }
    window.onmousedown = interact;

    function animate() {
        const d = new THREE.Vector3();
        if (keys['ArrowUp'] || keys['KeyW']) d.z -= 1; if (keys['ArrowDown'] || keys['KeyS']) d.z += 1;
        if (keys['ArrowLeft'] || keys['KeyA']) d.x -= 1; if (keys['ArrowRight'] || keys['KeyD']) d.x += 1;
        if (d.length() > 0) { d.normalize().applyAxisAngle(new THREE.Vector3(0,1,0), yaw); camera.position.addScaledVector(d, 0.15); }
        
        if(!state.d1 && camera.position.x > 7) camera.position.x = 7;
        if(!state.d2 && camera.position.x > 29) camera.position.x = 29;

        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }

    function notify(t) { document.getElementById('text').innerText = t; }
    function updateUI() { for(let i=0; i<2; i++){ const s=document.getElementById('slot-'+i); s.innerHTML=state.inv[i]?items[state.inv[i]]:""; s.classList.toggle('selected', i===state.sel); } }
</script>
</body>
</html>
