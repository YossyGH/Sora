<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D Escape Room</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        
        /* UIレイヤー */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* 下のCanvasをクリック可能に */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .hud {
            pointer-events: auto;
            background: rgba(0,0,0,0.6);
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
            text-align: center;
            max-width: 80%;
        }

        .inventory {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .slot {
            width: 50px; height: 50px; border: 1px solid white;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
        }

        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        button {
            padding: 10px 20px; font-size: 16px; cursor: pointer;
            background: #e74c3c; color: white; border: none; border-radius: 5px;
        }

        /* 暗号入力モーダル */
        #numpad {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #2c3e50;
            padding: 20px;
            border-radius: 10px;
            pointer-events: auto;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="crosshair"></div>
    
    <div class="hud" id="msg-box">
        <div id="text">マウスをドラッグして見渡し、クリックで調べよう</div>
        <div class="inventory">
            <div id="inv-note" class="slot">?</div>
            <div id="inv-key" class="slot">?</div>
        </div>
    </div>

    <div id="numpad">
        <h3>金庫の暗号</h3>
        <input type="number" id="code-input" style="font-size: 24px; width: 100px; text-align: center;"><br><br>
        <button onclick="checkCode()">開ける</button>
        <button onclick="closeNumpad()" style="background:#7f8c8d">戻る</button>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- 基本設定 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- ライト ---
    const light = new THREE.PointLight(0xffffff, 50, 100);
    light.position.set(0, 5, 0);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // --- 部屋の作成 (床・壁) ---
    const roomGroup = new THREE.Group();
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x5d4037 });
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x333333 });

    const floor = new THREE.Mesh(new THREE.BoxGeometry(10, 0.1, 10), floorMat);
    roomGroup.add(floor);

    // 壁の配置
    const createWall = (x, z, ry, color = 0x5d4037) => {
        const wall = new THREE.Mesh(new THREE.PlaneGeometry(10, 5), new THREE.MeshStandardMaterial({color: color, side: THREE.DoubleSide}));
        wall.position.set(x, 2.5, z);
        wall.rotation.y = ry;
        return wall;
    };
    roomGroup.add(createWall(0, -5, 0, 0x4a312c)); // 奥
    roomGroup.add(createWall(-5, 0, Math.PI/2));    // 左
    roomGroup.add(createWall(5, 0, -Math.PI/2));   // 右
    scene.add(roomGroup);

    // --- オブジェクト配置 ---
    // 1. 本棚 (左の壁)
    const shelf = new THREE.Mesh(new THREE.BoxGeometry(1, 3, 3), new THREE.MeshStandardMaterial({color: 0x2e1a10}));
    shelf.position.set(-4.5, 1.5, 0);
    shelf.name = "bookshelf";
    scene.add(shelf);

    // 2. 机 (右の壁)
    const desk = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 3), new THREE.MeshStandardMaterial({color: 0x3e2723}));
    desk.position.set(4, 0.5, 0);
    desk.name = "desk";
    scene.add(desk);

    // 3. ドア (正面の壁)
    const door = new THREE.Mesh(new THREE.BoxGeometry(2, 3.5, 0.2), new THREE.MeshStandardMaterial({color: 0x222222}));
    door.position.set(0, 1.75, -4.9);
    door.name = "door";
    scene.add(door);

    camera.position.set(0, 1.7, 3);

    let hasNote = false;
    let hasKey = false;
    const raycaster = new THREE.Raycaster();
