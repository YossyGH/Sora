<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Realistic Escape - Perfect Movement</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        canvas { display: block; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); display: flex; align-items: center; 
            justify-content: center; flex-direction: column; color: white; z-index: 100;
        }
        #start-btn { 
            padding: 15px 40px; font-size: 20px; background: #00d4ff; border: none; 
            color: black; cursor: pointer; border-radius: 4px; font-weight: bold;
        }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #inventory { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 8px; pointer-events: auto; }
        .slot { width: 60px; height: 60px; border: 2px solid #444; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; font-size: 25px; }
        .slot.selected { border-color: #00d4ff; box-shadow: 0 0 10px #00d4ff; }
        #msg-box { position: absolute; bottom: 30px; width: 100%; text-align: center; }
        #text { display: inline-block; background: rgba(0,0,0,0.8); color: white; padding: 10px 25px; border-left: 4px solid #00d4ff; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="letter-spacing: 0.2em;">THE ROOMS</h1>
    <p>操作: [W][A][S][D] で移動 / マウスで視点 / クリックで調べる</p>
    <button id="start-btn">ゲームを開始する</button>
</div>

<div id="ui">
    <div id="inventory">
        <div id="slot-0" class="slot"></div>
    </div>
    <div id="msg-box"><div id="text">部屋を探索して出口を探してください。</div></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const state = { inv: [], sel: 0, doorOpen: false };

    // --- Scene & Camera ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- Lighting ---
    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    const spot = new THREE.PointLight(0xffffff, 80, 20);
    spot.position.set(0, 6, 0);
    spot.castShadow = true;
    scene.add(spot);

    // --- Room Construction ---
    function makeRoom(x, color) {
        const group = new THREE.Group();
        group.position.x = x;
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 }));
        floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
        group.add(floor);
        const walls = new THREE.Mesh(new THREE.BoxGeometry(12, 7, 12), new THREE.MeshStandardMaterial({ color: color, side: THREE.BackSide }));
        walls.position.y = 3.5; walls.receiveShadow = true;
        group.add(walls);
        scene.add(group);
        return group;
    }
    const room1 = makeRoom(0, 0x333333);
    const room2 = makeRoom(12.1, 0x1a2a3a);

    // --- Objects (Shelf, Clock, Vase) ---
    // 棚
    const shelf = new THREE.Group();
    const woodMat = new THREE.MeshStandardMaterial({ color: 0x2d1b0f });
    const back = new THREE.Mesh(new THREE.BoxGeometry(2.5, 5, 0.2), woodMat);
    back.position.set(0, 2.5, -0.4);
    shelf.add(back);
    [0.1, 1.5, 3, 4.8].forEach(y => {
        const plate = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.1, 1), woodMat);
        plate.position.y = y; shelf.add(plate);
    });
    // 花瓶
    const vase = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 0.7, 12), new THREE.MeshStandardMaterial({color: 0x005566, roughness: 0.2}));
    vase.position.set(0.5, 3.4, 0); vase.name = "vase";
    shelf.add(vase);
    shelf.position.set(-4, 0, -5);
    room1.add(shelf);

    // 時計
    const clock = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.1, 32), new THREE.MeshStandardMaterial({color: 0xffffff}));
    clock.rotation.x = Math.PI / 2; clock.position.set(0, 4.5, -5.9);
    room1.add(clock);

    // ドア
    const door = new THREE.Group();
    const doorBody = new THREE.Mesh(new THREE.BoxGeometry(2.5, 5, 0.2), new THREE.MeshStandardMaterial({color: 0x111111, metalness: 0.5}));
    doorBody.position.set(0, 2.5, 0); door.add(doorBody);
    door.position.set(6, 0, 0); door.rotation.y = Math.PI/2; door.name = "door";
    scene.add(door);

    // --- Movement Logic ---
    camera.position.set(0, 3, 5);
    const keys = {};
    let yaw = 0, pitch = 0;

    document.getElementById('start-btn').addEventListener('click', () => {
        renderer.domElement.requestPointerLock();
        document.getElementById('overlay').style.display = 'none';
    });

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    document.addEventListener('mousemove', e => {
        if (document.pointerLockElement) {
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-1.5, Math.min(1.5, pitch));
        }
    });

    function update() {
        if (document.pointerLockElement) {
            const speed = 0.12;
            const direction = new THREE.Vector3();
            // 向いている方向を基準に移動ベクトルを計算
            if (keys['KeyW'] || keys['ArrowUp']) direction.z -= 1;
            if (keys['KeyS'] || keys['ArrowDown']) direction.z += 1;
            if (keys['KeyA'] || keys['ArrowLeft']) direction.x -= 1;
            if (keys['KeyD'] || keys['ArrowRight']) direction.x += 1;

            if (direction.length() > 0) {
                direction.normalize();
                // カメラの水平回転(yaw)を適用
                direction.applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                camera.position.addScaledVector(direction, speed);
            }

            // 衝突制限（部屋の壁）
            camera.position.y = 3;
            if (camera.position.x < -5) camera.position.x = -5;
            if (camera.position.z < -5) camera.position.z = -5;
            if (camera.position.z > 5) camera.position.z = 5;
            if (!state.doorOpen && camera.position.x > 5.5) camera.position.x = 5.5;
            if (camera.position.x > 17) camera.position.x = 17;
        }
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        renderer.render(scene, camera);
        requestAnimationFrame(update);
    }
    update();

    // --- Interaction ---
    window.addEventListener('mousedown', () => {
        if (!document.pointerLockElement) return;
        const ray = new THREE.Raycaster();
        ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = ray.intersectObjects(scene.children, true);

        if (hits.length > 0 && hits[0].distance < 4) {
            let obj = hits[0].object;
            while(obj.parent && !obj.name) obj = obj.parent;

            if (obj.name === "vase") {
                if (!state.inv.includes("key")) {
                    state.inv.push("key");
                    document.getElementById('slot-0').innerText = "🗝️";
                    document.getElementById('slot-0').classList.add('selected');
                    notify("花瓶の中から「古い鍵」を見つけた！");
                }
            } else if (obj.name === "door") {
                if (state.inv.includes("key")) {
                    state.doorOpen = true;
                    notify("鍵を使ってドアを開けた！");
                    obj.position.y += 5; // 上にスライド
                } else {
                    notify("鍵がかかっている。");
                }
            }
        }
    });

    function notify(t) { document.getElementById('text').innerText = t; }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
