<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>本格3D脱出ゲーム - リッチ版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #222 0%, #000 100%); 
            display: flex; align-items: center; justify-content: center; 
            flex-direction: column; z-index: 9999; color: white; 
        }
        #start-msg { font-size: 24px; color: #28a745; margin-top: 20px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; visibility: hidden; }
        #inventory { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 12px; }
        .slot { width: 75px; height: 75px; border: 3px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; font-size: 40px; border-radius: 15px; }
        .slot.selected { border-color: #00ffcc; box-shadow: 0 0 20px #00ffcc; }
        #text { position: absolute; bottom: 40px; width: 100%; text-align: center; color: #fff; font-size: 20px; text-shadow: 2px 2px 4px #000; }
        
        #clear-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: #ffd700; z-index: 10000; align-items: center; justify-content: center; flex-direction: column; font-size: 60px; font-weight: bold; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="font-size: 48px;">ESCAPE EXPERIENCE</h1>
    <p style="color: #888;">[移動: 矢印キー | 視点: Q, E または マウス | アクション: SPACE]</p>
    <div id="start-msg">PRESS ENTER TO START</div>
</div>

<div id="clear-screen">
    <div>Congratulations!</div>
    <p style="font-size: 20px; color: #fff; margin-top: 20px;">脱出に成功しました！</p>
</div>

<div id="ui">
    <div id="inventory"><div id="slot-0" class="slot"></div><div id="slot-1" class="slot"></div></div>
    <div id="text">扉を開ける方法を探そう。</div>
</div>

<script>
    let scene, camera, renderer, yaw = 0, pitch = 0;
    let keys = {};
    const state = { inv: [], sel: 0, d1: false, d2: false, hints: { chair: false }, r3_seq: [] };
    const items = { key1: "🗝️", card: "💳", key2: "🔑" };

    // キーボード入力
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Enter' && !scene) { init(); return; }
        keys[e.code] = true;
        if (e.code === 'Space') interact();
        if (e.code === 'Tab') { e.preventDefault(); state.sel = (state.sel + 1) % 2; updateUI(); }
    });
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    // マウス視点移動も有効化
    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement) {
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-1.4, Math.min(1.4, pitch));
        }
    });

    function init() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('ui').style.visibility = 'visible';
        
        // Scene & Renderer
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // マウスロックを試行（失敗してもキーボードで遊べる）
        renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());

        // Lights
        const amb = new THREE.AmbientLight(0xffffff, 0.9); scene.add(amb);
        const sun = new THREE.DirectionalLight(0xffffff, 0.7); sun.position.set(5, 15, 5); sun.castShadow = true;
        scene.add(sun);

        // Rooms
        buildRoom(0, 0x5d4037);  // 茶
        buildRoom(22, 0x2e7d32); // 緑
        buildRoom(44, 0x1a237e); // 紺

        // Room 1: Desk & Vase
        const desk = new THREE.Group();
        const top = new THREE.Mesh(new THREE.BoxGeometry(4, 0.2, 2.5), new THREE.MeshStandardMaterial({color: 0x3e2723}));
        top.position.y = 1.4; desk.add(top);
        for(let x of [-1.8, 1.8]) for(let z of [-1, 1]) {
            let l = new THREE.Mesh(new THREE.BoxGeometry(0.15, 1.4, 0.15), new THREE.MeshStandardMaterial({color: 0x21100b}));
            l.position.set(x, 0.7, z); desk.add(l);
        }
        desk.position.set(-5, 0, -5); scene.add(desk);

        const vase = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 0.7), new THREE.MeshStandardMaterial({color: 0x00bcd4}));
        vase.position.set(-5, 1.5, -5); vase.name = "vase"; scene.add(vase);
        
        const door1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), new THREE.MeshStandardMaterial({color: 0x795548}));
        door1.position.set(8, 3, 0); door1.name = "door1"; scene.add(door1);

        // Room 2: Chair & Safe
        const chair = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshStandardMaterial({color: 0xd81b60}));
        chair.position.set(26, 0.75, 4); chair.name = "chair"; scene.add(chair);
        
        const safe = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshStandardMaterial({color: 0x444, metalness: 0.9}));
        safe.position.set(29, 0.6, -5); safe.name = "safe"; scene.add(safe);

        const door2 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), new THREE.MeshStandardMaterial({color: 0x212121}));
        door2.position.set(30, 3, 0); door2.name = "door2"; scene.add(door2);

        // Room 3: Pillars & Exit
        createPillar(40, -4, 0xff0000, "red");
        createPillar(48, 0, 0x00e5ff, "blue");
        createPillar(40, 4, 0xffff00, "yellow");

        const exitDoor = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), new THREE.MeshStandardMaterial({color: 0xffd700, metalness: 1}));
        exitDoor.position.set(52, 3, 0); exitDoor.name = "exitDoor"; scene.add(exitDoor);

        camera.position.set(0, 3, 8);
        animate();
    }

    function buildRoom(x, col) {
        const g = new THREE.Group(); g.position.x = x;
        const box = new THREE.Mesh(new THREE.BoxGeometry(16, 9, 16), new THREE.MeshStandardMaterial({ color: col, side: THREE.BackSide }));
        box.position.y = 4.5; g.add(box);
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(16, 16), new THREE.MeshStandardMaterial({ color: 0x222 }));
        floor.rotation.x = -Math.PI/2; g.add(floor);
        scene.add(g);
    }

    function createPillar(x, z, col, id) {
        const g = new THREE.Group(); g.position.set(x, 0, z);
        const crys = new THREE.Mesh(new THREE.OctahedronGeometry(0.5), new THREE.MeshStandardMaterial({color: col, emissive: col, emissiveIntensity: 0.5}));
        crys.position.y = 3.5; crys.name = "node_" + id; 
        g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,3), new THREE.MeshStandardMaterial({color:0x111})).translateY(1.5), crys);
        scene.add(g);
    }

    function interact() {
        const ray = new THREE.Raycaster();
        ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = ray.intersectObjects(scene.children, true);
        if (hits.length > 0 && hits[0].distance < 6) {
            const o = hits[0].object;
            const item = state.inv[state.sel];
            if (o.name === "vase") { state.inv.push("key1"); updateUI(); notify("真鍮の鍵を入手した。"); }
            else if (o.name === "door1" && item === "key1") { o.position.y += 8; notify("扉が開いた。"); }
            else if (o.name === "chair") { o.position.z += 1.5; state.hints.chair = true; notify("椅子を動かした。足元に番号がある：384"); }
            else if (o.name === "safe" && state.hints.chair) { state.inv.push("card"); updateUI(); notify("金庫を解錠！カードを入手。"); }
            else if (o.name === "door2" && item === "card") { o.position.y += 8; notify("認証。地下室へ進む。"); }
            else if (o.name.startsWith("node_")) {
                const c = o.name.replace("node_", ""); state.r3_seq.push(c);
                o.material.emissiveIntensity = 4.0;
                if(state.r3_seq.length === 3) {
                    if(state.r3_seq.join(',') === "red,yellow,blue") { state.inv.push("key2"); updateUI(); notify("黄金の鍵を入手！"); }
                    else { state.r3_seq = []; notify("リセット... 赤→黄→青だ。"); }
                }
            }
            else if (o.name === "exitDoor" && item === "key2") {
                document.getElementById('clear-screen').style.display = 'flex';
            }
        }
    }

    function notify(t) { document.getElementById('text').innerText = t; }
    function updateUI() { for(let i=0; i<2; i++){ const s=document.getElementById('slot-'+i); s.innerText=state.inv[i]?items[state.inv[i]]:""; s.classList.toggle('selected', i===state.sel); } }

    function animate() {
        if (keys['KeyQ']) yaw += 0.04;
        if (keys['KeyE']) yaw -= 0.04;
        
        const dir = new THREE.Vector3();
        const f = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
        const r = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
        if (keys['ArrowUp'] || keys['KeyW']) dir.add(f);
        if (keys['ArrowDown'] || keys['KeyS']) dir.add(f.negate());
        if (keys['ArrowLeft'] || keys['KeyA']) dir.add(r.negate());
        if (keys['ArrowRight'] || keys['KeyD']) dir.add(r);

        if (dir.length() > 0) camera.position.addScaledVector(dir.normalize(), 0.16);
        
        // 当たり判定
        camera.position.x = Math.max(-7, Math.min(52, camera.position.x));
        camera.position.z = Math.max(-7, Math.min(7, camera.position.z));

        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }
</script>
</body>
</html>
