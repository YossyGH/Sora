<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>THE THREE ROOMS - 日本語完全版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; }
        
        /* 起動画面 */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a2a3a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; color: #fff; text-align: center;
        }
        .start-msg { font-size: 20px; color: #00ffcc; margin-top: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 右上：操作ガイド */
        #hud-guide {
            position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8);
            color: #fff; padding: 15px; border-radius: 8px; border: 1px solid #00ffcc;
            font-size: 13px; line-height: 1.8; z-index: 100; pointer-events: none;
        }
        .key { background: #444; padding: 2px 6px; border-radius: 4px; color: #00ffcc; font-weight: bold; }

        /* 左側：インベントリ */
        #inventory { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .slot { 
            width: 85px; height: 85px; background: rgba(0,0,0,0.85); border: 2px solid #555; 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            font-size: 45px; transition: 0.3s; position: relative;
        }
        .slot.selected { border-color: #00ffcc; box-shadow: 0 0 20px rgba(0,255,204,0.5); transform: scale(1.05); }
        .slot-label { position: absolute; bottom: -22px; font-size: 11px; color: #ccc; white-space: nowrap; }

        /* 下部：メッセージ */
        #msg-log { position: absolute; bottom: 50px; width: 100%; text-align: center; pointer-events: none; }
        #msg-inner { 
            display: inline-block; background: rgba(0,0,0,0.9); color: #fff; padding: 15px 40px; 
            border-bottom: 3px solid #00ffcc; font-size: 18px; min-width: 400px;
        }

        /* Shiftキー：アイテム詳細 */
        #inspect-view {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); z-index: 8000; flex-direction: column;
            align-items: center; justify-content: center; color: #fff;
        }
        #inspect-content { text-align: center; max-width: 500px; border: 1px solid #333; padding: 50px; border-radius: 30px; }

        /* 金庫テンキー */
        #safe-ui {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #222; padding: 35px; border-radius: 20px; border: 3px solid #00ffcc;
            z-index: 7000; text-align: center; pointer-events: auto;
        }
        #safe-display { font-size: 45px; width: 200px; background: #000; color: #00ffcc; border: 1px solid #444; margin-bottom: 25px; text-align: center; }
        .numpad { display: grid; grid-template-columns: repeat(3, 75px); gap: 12px; justify-content: center; }
        .numpad button { height: 65px; font-size: 24px; background: #333; color: #fff; border: 1px solid #555; cursor: pointer; }
        .numpad button:hover { background: #444; border-color: #00ffcc; }

        /* クリア画面 */
        #clear-view {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 20000; flex-direction: column; align-items: center; justify-content: center; color: #ffd700;
        }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="font-size: 65px; letter-spacing: 12px; margin: 0;">密室からの脱出</h1>
    <p style="color: #888;">THE THREE ROOMS: MASTER EDITION</p>
    <div class="start-msg">画面をクリックし、[ ENTER ] キーで開始</div>
</div>

<div id="hud-guide">
    <div style="border-bottom: 1px solid #555; margin-bottom: 8px; font-weight: bold; color: #00ffcc;">操作方法</div>
    <div><span class="key">W/A/S/D</span> : 移動</div>
    <div><span class="key">Q / E</span> : 視点回転</div>
    <div><span class="key">マウス</span> : 視点移動</div>
    <div><span class="key">SPACE</span> : 調べる / 使う</div>
    <div><span class="key">TAB</span> : アイテム選択</div>
    <div><span class="key">SHIFT</span> : 詳細を見る</div>
</div>

<div id="inventory">
    <div id="slot0" class="slot"><div class="slot-label">スロット 1</div></div>
    <div id="slot1" class="slot"><div class="slot-label">スロット 2</div></div>
</div>

<div id="msg-log"><div id="msg-inner">ここから脱出する方法を探さなければ...</div></div>

<div id="inspect-view">
    <div id="inspect-content">
        <div id="ins-icon" style="font-size: 120px; margin-bottom: 25px;"></div>
        <h2 id="ins-title" style="color: #00ffcc; font-size: 32px; margin: 10px 0;"></h2>
        <p id="ins-desc" style="color: #bbb; line-height: 1.8; font-size: 18px;"></p>
        <div style="margin-top: 40px; font-size: 14px; color: #555;">[ SHIFT ] キーで戻る</div>
    </div>
</div>

<div id="safe-ui">
    <div style="color: #fff; margin-bottom: 15px; font-weight: bold;">暗証番号を入力してください</div>
    <input type="text" id="safe-display" maxlength="3" readonly>
    <div class="numpad" id="numpad-btns"></div>
    <button onclick="unlockSafe()" style="width: 100%; margin-top: 20px; padding: 15px; background: #00ffcc; border: none; font-weight: bold; cursor: pointer; font-size: 18px;">解除</button>
    <button onclick="closeSafe()" style="width: 100%; margin-top: 8px; background: none; border: none; color: #666; cursor: pointer;">キャンセル</button>
</div>

<div id="clear-view">
    <h1 style="font-size: 85px; text-shadow: 0 0 30px #ffd700;">脱出成功</h1>
    <p style="color: #fff; font-size: 24px;">おめでとうございます！すべての謎を解き明かしました。</p>
    <button onclick="location.reload()" style="margin-top: 50px; padding: 18px 50px; background: none; border: 2px solid #ffd700; color: #ffd700; cursor: pointer; font-size: 20px;">もう一度遊ぶ</button>
</div>

<script>
let scene, camera, renderer, yaw = 0, pitch = 0;
let keys = {};
const state = { 
    inv: [], sel: 0, d1: false, d2: false, 
    hints: { chair: false }, r3_seq: [], openUI: false, inspecting: false 
};

const itemMaster = {
    key1: { icon: "🗝️", name: "真鍮の鍵", desc: "古びた真鍮製の鍵。Room1にある重厚な扉を開けることができそうだ。" },
    card: { icon: "💳", name: "認証カード", desc: "電子ロックを解除するためのICカード。Room2の扉の読み取り機に対応している。" },
    key2: { icon: "🔑", name: "黄金の鍵", desc: "眩しく輝く黄金の鍵。この施設から脱出するための最後の希望だ。" }
};

// 入力処理
window.addEventListener('keydown', (e) => {
    if (e.code === 'Enter' && !scene) { initGame(); return; }
    if (state.openUI || state.inspecting) {
        if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') toggleInspect();
        return;
    }
    keys[e.code] = true;
    if (e.code === 'Space') doInteract();
    if (e.code === 'Tab') { e.preventDefault(); state.sel = (state.sel + 1) % 2; updateUI(); }
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') toggleInspect();
});
window.addEventListener('keyup', (e) => keys[e.code] = false);

document.addEventListener('mousemove', (e) => {
    if (document.pointerLockElement) {
        yaw -= e.movementX * 0.0022;
        pitch -= e.movementY * 0.0022;
        pitch = Math.max(-1.4, Math.min(1.4, pitch));
    }
});

function initGame() {
    document.getElementById('start-screen').style.display = 'none';
    
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // ライティング
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(15, 30, 15);
    light.castShadow = true;
    light.shadow.mapSize.set(2048, 2048);
    scene.add(light);

    // 部屋生成
    createBox(0, 0x4d3322);  // Room 1 (茶)
    createBox(22, 0x1a3322); // Room 2 (緑)
    createBox(44, 0x112244); // Room 3 (紺)

    // Room 1 オブジェクト
    const desk = createDeskGroup(-5, -5); scene.add(desk);
    const vase = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 0.9, 16), new THREE.MeshStandardMaterial({color: 0x008899, metalness: 0.6}));
    vase.position.set(-5, 1.5, -5); vase.name = "vase"; vase.castShadow = true; scene.add(vase);
    const door1 = createDoorMesh(8, 0x554433, "door1"); scene.add(door1);

    // Room 2 オブジェクト
    const chair = createChairGroup(26, 4); chair.name = "chair"; scene.add(chair);
    const safe = new THREE.Mesh(new THREE.BoxGeometry(1.3, 1.3, 1.3), new THREE.MeshStandardMaterial({color: 0x222, metalness: 0.9}));
    safe.position.set(29, 0.65, -5); safe.name = "safe"; scene.add(safe);
    const door2 = createDoorMesh(30, 0x111, "door2"); scene.add(door2);

    // Room 3 オブジェクト
    createPillarNode(40, -4, 0xff4444, "red");
    createPillarNode(48, 0, 0x44ccff, "blue");
    createPillarNode(40, 4, 0xffdd44, "yellow");
    const exitDoor = createDoorMesh(52, 0xffcc00, "exitDoor"); scene.add(exitDoor);

    // テンキーボタン生成
    const pad = document.getElementById('numpad-btns');
    for(let i=1; i<=9; i++){
        let b = document.createElement('button'); b.innerText = i;
        b.onclick = () => document.getElementById('safe-display').value += i;
        pad.appendChild(b);
    }

    camera.position.set(0, 3, 8);
    renderer.domElement.onclick = () => { if(!state.openUI && !state.inspecting) renderer.domElement.requestPointerLock(); };
    updateUI();
    animate();
}

function createBox(x, col) {
    const wall = new THREE.Mesh(new THREE.BoxGeometry(16, 9, 16), new THREE.MeshStandardMaterial({color: col, side: THREE.BackSide}));
    wall.position.set(x, 4.5, 0); wall.receiveShadow = true; scene.add(wall);
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(16, 16), new THREE.MeshStandardMaterial({color: 0x111}));
    floor.rotation.x = -Math.PI/2; floor.position.x = x; floor.receiveShadow = true; scene.add(floor);
}

function createDeskGroup(x, z) {
    const g = new THREE.Group();
    const t = new THREE.Mesh(new THREE.BoxGeometry(4, 0.2, 2.5), new THREE.MeshStandardMaterial({color: 0x2a1a10}));
    t.position.y = 1.4; t.castShadow = true; g.add(t);
    [[-1.8,-1],[1.8,-1],[-1.8,1],[1.8,1]].forEach(p => {
        let l = new THREE.Mesh(new THREE.BoxGeometry(0.15, 1.4, 0.15), new THREE.MeshStandardMaterial({color: 0x150a05}));
        l.position.set(p[0], 0.7, p[1]); l.castShadow = true; g.add(l);
    });
    g.position.set(x, 0, z); return g;
}

function createChairGroup(x, z) {
    const g = new THREE.Group();
    const s = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.2, 1.4), new THREE.MeshStandardMaterial({color: 0x771133}));
    s.position.y = 0.8; g.add(s);
    const b = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.5, 0.2), new THREE.MeshStandardMaterial({color: 0x771133}));
    b.position.set(0, 1.5, -0.65); g.add(b);
    g.position.set(x, 0, z); return g;
}

function createPillarNode(x, z, col, id) {
    const g = new THREE.Group();
    g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 3), new THREE.MeshStandardMaterial({color: 0x111})));
    const c = new THREE.Mesh(new THREE.OctahedronGeometry(0.6), new THREE.MeshStandardMaterial({color: col, emissive: col, emissiveIntensity: 0.5}));
    c.position.y = 3.5; c.name = "node_"+id; g.add(c);
    g.position.set(x, 1.5, z); scene.add(g);
}

function createDoorMesh(x, col, name) {
    const d = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), new THREE.MeshStandardMaterial({color: col}));
    d.position.set(x, 3, 0); d.name = name; d.castShadow = true; return d;
}

function doInteract() {
    const r = new THREE.Raycaster();
    r.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = r.intersectObjects(scene.children, true);
    if(hits.length > 0 && hits[0].distance < 6) {
        const o = hits[0].object;
        const item = state.inv[state.sel];

        if(o.name === "vase") {
            if(!state.inv.includes("key1")) { state.inv.push("key1"); updateUI(); msg("『真鍮の鍵』を拾った。[Shift]キーで詳しく確認できる。"); }
        }
        else if(o.name === "door1") {
            if(item === "key1") { o.position.y += 8; state.d1 = true; msg("鍵が合致した。扉が開く。"); }
            else msg("鍵がかかっている。何かが必要だ。");
        }
        else if(o.name === "chair" || o.parent?.name === "chair") {
            const t = (o.name === "chair") ? o : o.parent;
            if(!state.hints.chair) { t.position.z += 2.5; state.hints.chair = true; msg("椅子を動かした。座面に数字が書かれている：『384』"); }
        }
        else if(o.name === "safe") {
            if(state.hints.chair) { state.openUI = true; document.getElementById('safe-ui').style.display = 'block'; document.exitPointerLock(); }
            else msg("金庫だ。暗証番号が必要のようだ。");
        }
        else if(o.name === "door2") {
            if(item === "card") { o.position.y += 8; state.d2 = true; msg("認証成功。ロックを解除した。"); }
            else msg("電子ロックされている。認証カードが必要だ。");
        }
        else if(o.name.startsWith("node_")) {
            const c = o.name.split("_")[1]; state.r3_seq.push(c); o.material.emissiveIntensity = 5;
            if(state.r3_seq.length === 3) {
                if(state.r3_seq.join(",") === "red,yellow,blue") { state.inv.push("key2"); updateUI(); msg("パズルが解けた！黄金の鍵が現れた。"); }
                else { state.r3_seq = []; msg("順序が違うようだ。光が消えた。"); }
            }
        }
        else if(o.name === "exitDoor") {
            if(item === "key2") { document.getElementById('clear-view').style.display = 'flex'; document.exitPointerLock(); }
            else msg("脱出の扉だ。黄金のマスターキーが必要だ。");
        }
    }
}

function toggleInspect() {
    const item = state.inv[state.sel];
    if(!item) return;
    state.inspecting = !state.inspecting;
    const ui = document.getElementById('inspect-view');
    if(state.inspecting) {
        ui.style.display = 'flex';
        document.getElementById('ins-icon').innerText = itemMaster[item].icon;
        document.getElementById('ins-title').innerText = itemMaster[item].name;
        document.getElementById('ins-desc').innerText = itemMaster[item].desc;
    } else { ui.style.display = 'none'; }
}

function unlockSafe() {
    if(document.getElementById('safe-display').value === "384") {
        state.inv.push("card"); updateUI(); msg("正解だ。金庫から『認証カード』を入手した。"); closeSafe();
    } else { msg("番号が違う。"); document.getElementById('safe-display').value = ""; }
}
function closeSafe() { state.openUI = false; document.getElementById('safe-ui').style.display = 'none'; }
function msg(t) { document.getElementById('msg-inner').innerText = t; }

function updateUI() {
    for(let i=0; i<2; i++){
        const s = document.getElementById('slot'+i);
        const item = state.inv[i];
        s.innerText = item ? itemMaster[item].icon : "";
        s.className = (i === state.sel) ? "slot selected" : "slot";
        s.querySelector('.slot-label').innerText = item ? itemMaster[item].name : "未入手";
    }
}

function animate() {
    if(!state.openUI && !state.inspecting) {
        if(keys['KeyQ']) yaw += 0.04;
        if(keys['KeyE']) yaw -= 0.04;
        
        const d = new THREE.Vector3();
        const f = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        const r = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        if(keys['ArrowUp'] || keys['KeyW']) d.add(f);
        if(keys['ArrowDown'] || keys['KeyS']) d.add(f.negate());
        if(keys['ArrowLeft'] || keys['KeyA']) d.add(r.negate());
        if(keys['ArrowRight'] || keys['KeyD']) d.add(r);

        if(d.length() > 0) camera.position.addScaledVector(d.normalize(), 0.17);

        // 壁判定
        camera.position.x = Math.max(-7, Math.min(51, camera.position.x));
        camera.position.z = Math.max(-7, Math.min(7, camera.position.z));
        if(!state.d1 && camera.position.x > 7.4) camera.position.x = 7.4;
        if(!state.d2 && camera.position.x > 29.4) camera.position.x = 29.4;

        camera.rotation.set(pitch, yaw, 0, 'YXZ');
    }
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
</script>
</body>
</html>
