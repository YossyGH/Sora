<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>キーボード脱出ゲーム</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        
        /* 開始画面 */
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; color: #0f0; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 10000; 
        }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        /* ゲームUI */
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; visibility: hidden; }
        #inventory { position: absolute; top: 20px; left: 20px; background: rgba(0,255,0,0.1); border: 1px solid #0f0; padding: 10px; color: #0f0; }
        #msg-box { position: absolute; bottom: 50px; width: 100%; text-align: center; }
        #text { color: #0f0; font-size: 20px; background: rgba(0,0,0,0.8); padding: 10px 20px; border: 1px solid #0f0; }

        /* クリア画面 */
        #clear-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; color: #ffd700; z-index: 20000; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
    </style>
</head>
<body>

<div id="overlay">
    <h1>ESCAPE ROOM: KEYBOARD ONLY</h1>
    <p style="color: #666;">Move: ARROWS | Rotate: Q/E | Action: SPACE</p>
    <h2 class="blink">[ PRESS ENTER TO START ]</h2>
</div>

<div id="clear-screen">
    <h1 style="font-size: 60px;">Congratulations!</h1>
    <p style="font-size: 24px; color: #fff;">You have successfully escaped the room.</p>
</div>

<div id="ui">
    <div id="inventory">ITEM: <span id="item-name">NONE</span></div>
    <div id="msg-box"><span id="text">部屋を探索せよ...</span></div>
</div>

<script>
let scene, camera, renderer, yaw = 0;
let keys = {};
const state = { hasKey: false, cleared: false };

// キーボード入力の監視
window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'Enter' && !scene) initGame();
    if (e.code === 'Space') interact();
});
window.addEventListener('keyup', (e) => keys[e.code] = false);

function initGame() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('ui').style.visibility = 'visible';
    
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.0));
    camera.position.set(0, 3, 10);

    // 部屋
    const wall = new THREE.Mesh(new THREE.BoxGeometry(20, 10, 20), new THREE.MeshStandardMaterial({color: 0x333, side: THREE.BackSide}));
    wall.position.y = 5; scene.add(wall);
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshStandardMaterial({color: 0x111}));
    floor.rotation.x = -Math.PI/2; scene.add(floor);

    // ターゲット：花瓶（青）
    const vase = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 1), new THREE.MeshStandardMaterial({color: 0x00aaff}));
    vase.position.set(-6, 0.75, -6); vase.name = "vase"; scene.add(vase);

    // ターゲット：扉（茶）
    const door = new THREE.Mesh(new THREE.BoxGeometry(0.5, 7, 4), new THREE.MeshStandardMaterial({color: 0x553311}));
    door.position.set(9.7, 3.5, 0); door.name = "door"; scene.add(door);

    animate();
}

function interact() {
    if (!scene) return;
    const ray = new THREE.Raycaster();
    // 常にカメラの正面（画面中央）をチェック
    ray.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = ray.intersectObjects(scene.children);
    
    if (hits.length > 0 && hits[0].distance < 5) {
        const target = hits[0].object;
        if (target.name === "vase") {
            state.hasKey = true;
            document.getElementById('item-name').innerText = "GOLD KEY";
            notify("鍵を手に入れた！扉へ向かえ。");
        } else if (target.name === "door") {
            if (state.hasKey) {
                state.cleared = true;
                target.position.y += 10;
                document.getElementById('clear-screen').style.display = 'flex';
            } else {
                notify("鍵がかかっている...");
            }
        }
    }
}

function notify(t) { document.getElementById('text').innerText = t; }

function animate() {
    if (state.cleared) return;

    // 視点回転 (Q, E)
    if (keys['KeyQ'] || keys['KeyA']) yaw += 0.04;
    if (keys['KeyE'] || keys['KeyD']) yaw -= 0.04;

    // 移動 (↑, ↓)
    const dir = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
    if (keys['ArrowUp'] || keys['KeyW']) camera.position.addScaledVector(dir, 0.15);
    if (keys['ArrowDown'] || keys['KeyS']) camera.position.addScaledVector(dir, -0.15);

    // 壁の衝突制限
    camera.position.x = Math.max(-9, Math.min(9, camera.position.x));
    camera.position.z = Math.max(-9, Math.min(9, camera.position.z));

    camera.rotation.set(0, yaw, 0);
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
</script>
</body>
</html>
