<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Bright Escape - Rooms</title>
    <style>
        body { margin: 0; overflow: hidden; background: #eee; font-family: 'Hiragino Kaku Gothic Pro', sans-serif; }
        canvas { display: block; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.9); display: flex; align-items: center; 
            justify-content: center; flex-direction: column; z-index: 100;
        }
        #start-btn { 
            padding: 15px 50px; font-size: 20px; background: #ff85a2; border: none; 
            color: white; cursor: pointer; border-radius: 30px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #inventory { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .slot { 
            width: 70px; height: 70px; border: 3px solid #ddd; background: rgba(255,255,255,0.8); 
            display: flex; align-items: center; justify-content: center; font-size: 35px; border-radius: 12px; 
        }
        .slot.selected { border-color: #ff85a2; box-shadow: 0 0 15px #ff85a2; background: #fff4f6; }
        #msg-box { position: absolute; bottom: 40px; width: 100%; text-align: center; }
        #text { 
            display: inline-block; background: rgba(255,255,255,0.9); color: #444; padding: 15px 40px; 
            border-radius: 30px; border: 2px solid #ff85a2; font-size: 18px; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color: #ff85a2;">PASTEL ESCAPE</h1>
    <p>[W][A][S][D] で移動 / マウスで視点 / [Space] でアイテム選択</p>
    <button id="start-btn">ゲームをはじめる</button>
</div>

<div id="ui">
    <div id="inventory">
        <div id="slot-0" class="slot"></div>
        <div id="slot-1" class="slot"></div>
    </div>
    <div id="msg-box"><div id="text">お部屋を探索してみましょう♪</div></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const state = { 
        inv: [], sel: -1, 
        door1Open: false, 
    };

    const items = {
        key1: { name: "真鍮の鍵", icon: "🗝️" },
        key2: { name: "出口の鍵", icon: "🔑" }
    };

    // --- シーン・カメラ ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xfff0f3);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- 明るい照明 ---
    const amb = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(amb);
    const sun = new THREE.DirectionalLight(0xffffff, 0.5);
    sun.position.set(5, 10, 7.5);
    sun.castShadow = true;
    scene.add(sun);

    // --- 部屋の構築 (可愛らしい壁色) ---
    function createRoom(x, color) {
        const group = new THREE.Group();
        group.position.x = x;
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 }));
        floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
        group.add(floor);
        const walls = new THREE.Mesh(new THREE.BoxGeometry(12, 7, 12), new THREE.MeshStandardMaterial({ color: color, side: THREE.BackSide }));
        walls.position.y = 3.5; walls.receiveShadow = true;
        group.add(walls);
        scene.add(group);
        return group;
    }
    const room1 = createRoom(0, 0xffcad4); // パステルピンク
    const room2 = createRoom(15, 0xbde0fe); // パステルブルー

    // --- 家具 ---
    const wood = new THREE.MeshStandardMaterial({ color: 0xba9470 });
    const shelf = new THREE.Group();
    const sBack = new THREE.Mesh(new THREE.BoxGeometry(2.5, 5, 0.2), wood); sBack.position.y = 2.5; shelf.add(sBack);
    for(let i=0; i<4; i++){
        const p = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.1, 1), wood); p.position.y = i*1.5 + 0.1; shelf.add(p);
    }
    const vase = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 0.6), new THREE.MeshStandardMaterial({color: 0x98ff98}));
    vase.position.set(0.5, 3.4, 0.2); vase.name = "vase"; shelf.add(vase);
    shelf.position.set(-4.5, 0, -5); room1.add(shelf);

    const door1 = new THREE.Group();
    const dBody = new THREE.Mesh(new THREE.BoxGeometry(2.5, 5, 0.2), new THREE.MeshStandardMaterial({color:0xffffff}));
    dBody.position.y = 2.5; door1.add(dBody);
    door1.position.set(6, 0, 0); door1.rotation.y = Math.PI/2; door1.name = "door1";
    scene.add(door1);

    // --- 移動・視点 ---
    camera.position.set(0, 3, 5);
    const keys = {};
    let yaw = 0, pitch = 0;

    document.getElementById('start-btn').addEventListener('click', () => {
        renderer.domElement.requestPointerLock();
        document.getElementById('overlay').style.display = 'none';
    });

    window.addEventListener('keydown', e => { 
        keys[e.code] = true; 
        // スペースキーでアイテムを選択
        if (e.code === 'Space') {
            if (state.inv.length > 0) {
                state.sel = (state.sel + 1) % state.inv.length;
                updateUI();
                notify(`${items[state.inv[state.sel]].name} を選択中`);
            }
        }
    });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    document.addEventListener('mousemove', e => {
        if (document.pointerLockElement) {
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-1.5, Math.min(1.5, pitch));
        }
    });

    function update() {
        if (document.pointerLockElement) {
            const speed = 0.12;
            const dir = new THREE.Vector3();
            if (keys['KeyW'] || keys['ArrowUp']) dir.z -= 1;
            if (keys['KeyS'] || keys['ArrowDown']) dir.z += 1;
            if (keys['KeyA'] || keys['ArrowLeft']) dir.x -= 1;
            if (keys['KeyD'] || keys['ArrowRight']) dir.x += 1;

            if (dir.length() > 0) {
                dir.normalize().applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                camera.position.addScaledVector(dir, speed);
            }
            camera.position.y = 3;
            // 境界
            if (camera.position.x < -5) camera.position.x = -5;
            if (!state.door1Open && camera.position.x > 5.5) camera.position.x = 5.5;
            if (camera.position.x > 20) camera.position.x = 20;
        }
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        renderer.render(scene, camera);
        requestAnimationFrame(update);
    }
    update();

    // --- インタラクション ---
    window.addEventListener('mousedown', () => {
        if (!document.pointerLockElement) return;
        const ray = new THREE.Raycaster();
        ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = ray.intersectObjects(scene.children, true);

        if (hits.length > 0 && hits[0].distance < 4) {
            let obj = hits[0].object;
            while(obj.parent && !obj.name) obj = obj.parent;

            if (obj.name === "vase") {
                if (!state.inv.includes("key1")) {
                    state.inv.push("key1");
                    if (state.sel === -1) state.sel = 0; // 最初のアイテム取得時に自動選択
                    notify("ミント色の花瓶から「真鍮の鍵」を見つけました！");
                    updateUI();
                }
            } else if (obj.name === "door1") {
                if (state.sel !== -1 && state.inv[state.sel] === "key1") {
                    state.door1Open = true;
                    notify("扉が開きました！");
                    obj.position.y += 5;
                } else { notify("鍵がかかっています。"); }
            }
        }
    });

    function notify(t) { document.getElementById('text').innerText = t; }
    function updateUI() {
        for(let i=0; i<2; i++) {
            const s = document.getElementById(`slot-${i}`);
            s.innerHTML = state.inv[i] ? items[state.inv[i]].icon : "";
            s.classList.toggle('selected', i === state.sel);
        }
    }
</script>
</body>
</html>
