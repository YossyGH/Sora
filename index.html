<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Realistic Escape - Sequence Mystery</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Hiragino Kaku Gothic Pro', sans-serif; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 1000; color: #fff; }
        #start-btn { padding: 20px 60px; font-size: 24px; background: #ff4081; border: none; color: white; cursor: pointer; border-radius: 50px; font-weight: bold; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #inventory { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .slot { width: 70px; height: 70px; border: 3px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; font-size: 40px; border-radius: 15px; }
        .slot.selected { border-color: #00e5ff; box-shadow: 0 0 15px #00e5ff; background: rgba(0,229,255,0.2); }
        #controls-guide { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 2px solid #00e5ff; color: #fff; font-size: 13px; line-height: 1.5; pointer-events: auto; }
        #msg-box { position: absolute; bottom: 30px; width: 100%; text-align: center; }
        #text { display: inline-block; background: rgba(0,0,0,0.8); color: #00e5ff; padding: 15px 40px; border-radius: 30px; border: 2px solid #00e5ff; font-size: 18px; font-weight: bold; min-width: 300px; }
        #input-panel { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 30px; border-radius: 20px; border: 4px solid #ff4081; pointer-events: auto; text-align: center; z-index: 2000; color: white; }
        #input-panel input { font-size: 40px; width: 180px; text-align: center; background: #000; color: #ff4081; border: 2px solid #ff4081; border-radius: 10px; margin-bottom: 20px; }
        #input-panel button { padding: 10px 25px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; background: #ff4081; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div id="overlay">
    <h1>REALISTIC ESCAPE</h1>
    <p>3つの部屋と順序の謎</p>
    <button id="start-btn">潜入開始</button>
</div>

<div id="ui">
    <div id="inventory"><div id="slot-0" class="slot"></div><div id="slot-1" class="slot"></div></div>
    <div id="controls-guide">
        【操作】<br>移動：矢印キー<br>視点：マウス<br>選択：Space<br>詳細：Enter<br>使用：Shift<br>調べる：クリック
    </div>
    <div id="msg-box"><div id="text">扉の先には何があるのか...</div></div>
    <div id="input-panel">
        <h2 id="panel-title">CODE REQUIRED</h2>
        <p id="panel-hint" style="font-size:12px; color:#aaa; margin-bottom:10px;"></p>
        <input type="text" id="panel-input" maxlength="4" placeholder="????"><br>
        <button id="panel-ok">ENTER</button>
        <button id="panel-close" style="background:#555; margin-left:10px;">CLOSE</button>
    </div>
</div>

<script>
    const state = { 
        inv: [], sel: -1, 
        d1: false, d2: false, exit: false,
        room2_hints: { chair: false, book: false, rabbit: false }
    };

    const items = {
        key1: { icon: "🗝️", name: "古い鍵", desc: "書斎へ続く重厚な扉の鍵。" },
        card: { icon: "💳", name: "認証カード", desc: "地下室の電子ロックを解除するカード。" },
        key2: { icon: "🔑", name: "黄金の鍵", desc: "地上へ戻るための唯一の鍵。" }
    };

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Lighting
    const amb = new THREE.AmbientLight(0xffffff, 0.4); scene.add(amb);
    const spot = new THREE.SpotLight(0xffffff, 1.5); spot.position.set(5, 10, 5); spot.castShadow = true; scene.add(spot);

    // --- Room Building ---
    const loader = new THREE.TextureLoader();
    function buildRoom(x, color, wallTex) {
        const g = new THREE.Group(); g.position.x = x;
        const mat = new THREE.MeshStandardMaterial({ color: color, side: THREE.BackSide, roughness: 0.8 });
        const box = new THREE.Mesh(new THREE.BoxGeometry(16, 9, 16), mat);
        box.position.y = 4.5; box.receiveShadow = true; g.add(box);
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(16,16), new THREE.MeshStandardMaterial({color:0x333333}));
        floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; g.add(floor);
        scene.add(g); return g;
    }
    const r1 = buildRoom(0, 0xffcccc); // Pink Room
    const r2 = buildRoom(22, 0xccffcc); // Green Study
    const r3 = buildRoom(44, 0x111111); // Dark Basement

    // Objects
    const mWood = new THREE.MeshStandardMaterial({color:0x5d4037});
    const mMetal = new THREE.MeshStandardMaterial({color:0x757575, metalness:0.8, roughness:0.2});

    // Room 1
    const vase = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4,0.8), new THREE.MeshStandardMaterial({color:0x00bcd4}));
    vase.position.set(-6, 0.4, -6); vase.name = "vase"; scene.add(vase);
    const door1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 6, 3), mMetal);
    door1.position.set(8, 3, 0); door1.name = "door1"; scene.add(door1);

    // Room 2 (Study)
    const bookshelf = new THREE.Mesh(new THREE.BoxGeometry(5, 7, 1), new THREE.MeshStandardMaterial({color:0x2e7d32}));
    bookshelf.position.set(22, 3.5, -7); bookshelf.name = "bookshelf"; scene.add(bookshelf);
    const chair = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshStandardMaterial({color:0xe91e63}));
    chair.position.set(25, 0.75, 3); chair.name = "chair"; scene.add(chair);
    const safe = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), mMetal);
    safe.position.set(28, 1, -5); safe.name = "safe"; scene.add(safe);
    const door2 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 6, 3), mMetal);
    door2.position.set(30, 3, 0); door2.name = "door2"; scene.add(door2);
    const rabbit = new THREE.Mesh(new THREE.SphereGeometry(0.5,16,16), new THREE.MeshStandardMaterial({color:0xffffff}));
    rabbit.position.set(16, 0.5, 5); rabbit.name = "rabbit"; scene.add(rabbit);

    // Room 3 (Basement)
    const panel = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1, 1), new THREE.MeshStandardMaterial({color:0x00ff00, emissive:0x00ff00}));
    panel.position.set(51.8, 4, 0); panel.name = "exit_panel"; scene.add(panel);
    const exitDoor = new THREE.Mesh(new THREE.BoxGeometry(0.3, 6, 3), new THREE.MeshStandardMaterial({color:0x000, metalness:1}));
    exitDoor.position.set(52, 3, 0); exitDoor.name = "exitDoor"; scene.add(exitDoor);

    // Logic
    camera.position.set(0, 3, 8);
    let yaw = 0, pitch = 0; const keys = {};

    document.getElementById('start-btn').onclick = () => { renderer.domElement.requestPointerLock(); document.getElementById('overlay').style.display='none'; };
    window.onkeydown = (e) => {
        keys[e.code] = true;
        if (e.code === 'Space' && state.inv.length > 0) { state.sel = (state.sel+1)%state.inv.length; updateUI(); notify(items[state.inv[state.sel]].name + " 装備"); }
        if (e.code === 'Enter' && state.sel !== -1) notify(items[state.inv[state.sel]].desc);
        if (e.shiftKey) handleAction(true);
    };
    window.onkeyup = (e) => keys[e.code] = false;
    document.onmousemove = (e) => { if(document.pointerLockElement){ yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; pitch=Math.max(-1.4, Math.min(1.4, pitch)); } };

    function handleAction(isShift) {
        if (!document.pointerLockElement) return;
        const ray = new THREE.Raycaster(); ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = ray.intersectObjects(scene.children, true);
        if (hits.length > 0 && hits[0].distance < 6) {
            let o = hits[0].object;
            if (o.name === "vase") { if(!state.inv.includes("key1")){ state.inv.push("key1"); state.sel=0; updateUI(); notify("古い鍵を入手した。"); } }
            else if (o.name === "door1") {
                if (isShift && state.inv[state.sel]==="key1") { state.d1=true; o.position.y+=8; notify("書斎の扉が開いた。"); }
                else if(!isShift) notify("鍵がかかっている。");
            }
            // Room 2 Mystery
            else if (o.name === "chair") { 
                o.position.z += 2; state.room2_hints.chair = true;
                notify("椅子の下に数字が見える...『 5 』だ。"); 
            }
            else if (o.name === "bookshelf") { 
                state.room2_hints.book = true;
                notify("本の隙間に数字が刻まれている...『 2 』だ。"); 
            }
            else if (o.name === "rabbit") { 
                state.room2_hints.rabbit = true;
                notify("ウサギ『最後は僕の耳の数(2)だよ。順序は【桃→緑→白】だよ！』"); 
            }
            else if (o.name === "safe") {
                if(state.room2_hints.chair && state.room2_hints.book && state.room2_hints.rabbit) {
                    showInput("SAFE CODE", "順序ヒント：桃 → 緑 → 白", (val) => {
                        if(val === "522") { // Chair(5), Book(2), Rabbit(2)
                            state.inv.push("card"); updateUI(); notify("金庫が開いた！認証カードを入手。");
                            hideInput();
                        } else { notify("番号が違うようだ。"); }
                    });
                } else { notify("まだヒントが足りない..."); }
            }
            else if (o.name === "door2") {
                if(isShift && state.inv[state.sel]==="card") { state.d2=true; o.position.y+=8; notify("認証成功。地下へ進める。"); }
                else if(!isShift) notify("カードリーダーがある。");
            }
            // Room 3
            else if (o.name === "exit_panel") {
                notify("装置を作動させた！黄金の鍵が現れた！");
                if(!state.inv.includes("key2")) { state.inv.push("key2"); updateUI(); }
            }
            else if (o.name === "exitDoor") {
                if(isShift && state.inv[state.sel]==="key2") { state.exit=true; o.position.y+=8; notify("脱出成功！おめでとう！"); }
                else if(!isShift) notify("最後は黄金の鍵が必要だ。");
            }
        }
    }
    window.onmousedown = () => handleAction(false);

    function showInput(title, hint, onOk) {
        document.exitPointerLock();
        const p = document.getElementById('input-panel');
        p.style.display = 'block';
        document.getElementById('panel-title').innerText = title;
        document.getElementById('panel-hint').innerText = hint;
        document.getElementById('panel-ok').onclick = () => onOk(document.getElementById('panel-input').value);
    }
    function hideInput() { document.getElementById('input-panel').style.display='none'; renderer.domElement.requestPointerLock(); }
    document.getElementById('panel-close').onclick = hideInput;

    function loop() {
        if (document.pointerLockElement) {
            const d = new THREE.Vector3();
            if (keys['ArrowUp']) d.z -= 1; if (keys['ArrowDown']) d.z += 1;
            if (keys['ArrowLeft']) d.x -= 1; if (keys['ArrowRight']) d.x += 1;
            if (d.length() > 0) { d.normalize().applyAxisAngle(new THREE.Vector3(0,1,0), yaw); camera.position.addScaledVector(d, 0.15); }
            camera.position.y = 3;
            // Boundaries
            if(camera.position.x < -7) camera.position.x = -7;
            if(!state.d1 && camera.position.x > 7) camera.position.x = 7;
            if(!state.d2 && camera.position.x > 29) camera.position.x = 29;
            if(camera.position.x > 51) camera.position.x = 51;
        }
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        renderer.render(scene, camera);
        requestAnimationFrame(loop);
    }
    loop();

    function notify(t) { document.getElementById('text').innerText = t; }
    function updateUI() { for(let i=0; i<2; i++){ const s=document.getElementById('slot-'+i); s.innerHTML=state.inv[i]?items[state.inv[i]].icon:""; s.classList.toggle('selected', i===state.sel); } }
</script>
</body>
</html>
