<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>脱出ゲーム：THE THREE ROOMS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; }
        
        /* 開始画面 */
        #boot-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #34495e 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; color: #fff; text-align: center;
        }
        .start-trigger {
            margin-top: 30px; padding: 20px 60px; font-size: 24px; font-weight: bold;
            background: #27ae60; color: white; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 30px rgba(39,174,96,0.6);
            transition: 0.3s;
        }
        .start-trigger:hover { transform: scale(1.1); background: #2ecc71; }

        /* 右上：操作ガイド（日本語） */
        #gui-guide {
            position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8);
            color: #fff; padding: 15px; border-radius: 10px; border: 2px solid #27ae60;
            font-size: 14px; line-height: 1.8; z-index: 100; pointer-events: none;
        }
        .key-box { background: #555; padding: 2px 8px; border-radius: 4px; color: #2ecc71; font-weight: bold; margin-right: 5px; }

        /* 左側：持ち物（日本語） */
        #inv-container { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 25px; z-index: 100; }
        .inv-slot { 
            width: 90px; height: 90px; background: rgba(30,30,30,0.9); border: 3px solid #444; 
            border-radius: 15px; display: flex; align-items: center; justify-content: center; 
            font-size: 45px; transition: 0.3s; position: relative;
        }
        .inv-slot.active { border-color: #2ecc71; box-shadow: 0 0 20px rgba(46,204,113,0.5); transform: scale(1.05); }
        .inv-name { position: absolute; bottom: -25px; font-size: 12px; color: #eee; white-space: nowrap; text-shadow: 1px 1px 2px #000; }

        /* 下部：メッセージ表示 */
        #msg-box { position: absolute; bottom: 60px; width: 100%; text-align: center; pointer-events: none; }
        #msg-text { 
            display: inline-block; background: rgba(0,0,0,0.85); color: #fff; padding: 18px 50px; 
            border-top: 4px solid #27ae60; font-size: 20px; min-width: 450px; border-radius: 5px;
        }

        /* アイテム詳細（日本語） */
        #detail-view {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9000; flex-direction: column;
            align-items: center; justify-content: center; color: #fff; text-align: center;
        }
        .detail-card { background: #1a1a1a; padding: 50px; border-radius: 40px; border: 1px solid #333; max-width: 500px; }

        /* 金庫テンキー（日本語） */
        #safe-panel {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #2c3e50; padding: 40px; border-radius: 25px; border: 4px solid #27ae60;
            z-index: 8000; text-align: center; pointer-events: auto;
        }
        #safe-screen { font-size: 50px; width: 220px; background: #000; color: #2ecc71; border: 2px solid #1abc9c; margin-bottom: 25px; text-align: center; font-family: monospace; }
        .pad-grid { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; justify-content: center; }
        .pad-grid button { height: 70px; font-size: 26px; background: #34495e; color: #fff; border: 1px solid #7f8c8d; cursor: pointer; border-radius: 10px; }
        .pad-grid button:active { background: #27ae60; }

        /* クリア（日本語） */
        #clear-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 20000; flex-direction: column; align-items: center; justify-content: center; color: #f1c40f;
        }
    </style>
</head>
<body>

<div id="boot-layer">
    <h1 style="font-size: 60px; letter-spacing: 15px; margin: 0;">3 ROOMS</h1>
    <p style="font-size: 20px; color: #bdc3c7; margin-top: 10px;">日本語完全版 - 高輝度レンダリング</p>
    <button class="start-trigger" onclick="runGame()">ゲームを開始する</button>
    <p style="margin-top: 20px; color: #7f8c8d;">(クリック後、自動的に画面が固定されます)</p>
</div>

<div id="gui-guide">
    <div style="border-bottom: 1px solid #27ae60; margin-bottom: 10px; font-weight: bold; color: #2ecc71; font-size: 16px;">操作ガイド</div>
    <div><span class="key-box">W / A / S / D</span> 移動</div>
    <div><span class="key-box">Q / E</span> 視点回転</div>
    <div><span class="key-box">マウス</span> 視点移動</div>
    <div><span class="key-box">SPACE</span> 調べる / 使う</div>
    <div><span class="key-box">TAB</span> アイテム切り替え</div>
    <div><span class="key-box">SHIFT</span> アイテム詳細</div>
</div>

<div id="inv-container">
    <div id="slot0" class="inv-slot"><div class="inv-name">空きスロット</div></div>
    <div id="slot1" class="inv-slot"><div class="inv-name">空きスロット</div></div>
</div>

<div id="msg-box"><div id="msg-text">この部屋のどこかに鍵があるはずだ...</div></div>

<div id="detail-view">
    <div class="detail-card">
        <div id="det-icon" style="font-size: 130px; margin-bottom: 20px;"></div>
        <h2 id="det-title" style="color: #2ecc71; font-size: 36px; margin-bottom: 15px;"></h2>
        <p id="det-desc" style="color: #ccc; line-height: 1.8; font-size: 18px;"></p>
        <p style="margin-top: 40px; color: #7f8c8d; font-size: 14px;">[ SHIFT ] キーで戻る</p>
    </div>
</div>

<div id="safe-panel">
    <div style="color: #fff; margin-bottom: 15px; font-size: 18px;">暗証番号を入力</div>
    <input type="text" id="safe-screen" maxlength="3" readonly>
    <div class="pad-grid" id="pad-root"></div>
    <button onclick="tryUnlock()" style="width: 100%; margin-top: 25px; padding: 18px; background: #27ae60; border: none; color: #fff; font-weight: bold; font-size: 20px; cursor: pointer; border-radius: 10px;">解除実行</button>
    <button onclick="closeSafe()" style="width: 100%; margin-top: 10px; background: none; border: none; color: #bdc3c7; cursor: pointer;">キャンセル</button>
</div>

<div id="clear-screen">
    <h1 style="font-size: 90px; margin: 0;">脱出成功！</h1>
    <p style="font-size: 24px; color: #fff; margin-bottom: 50px;">あなたはすべての謎を解き明かしました。</p>
    <button onclick="location.reload()" style="padding: 20px 60px; background: transparent; border: 2px solid #f1c40f; color: #f1c40f; font-size: 20px; cursor: pointer;">タイトルへ戻る</button>
</div>

<script>
let scene, camera, renderer, yaw = 0, pitch = 0;
let keys = {};
const state = { 
    inv: [], sel: 0, d1: false, d2: false, 
    hints: { chair: false }, r3: [], uiOpen: false, inspecting: false 
};

const items = {
    key1: { icon: "🗝️", name: "真鍮の鍵", desc: "少し錆びているが、Room1の大きな扉を開けることができそうだ。" },
    card: { icon: "💳", name: "認証カード", desc: "金庫に入っていたICカード。Room2の電子ドアを解除できる。" },
    key2: { icon: "🔑", name: "黄金のマスターキー", desc: "まばゆい光を放つ伝説の鍵。脱出の扉を開く唯一の手段だ。" }
};

window.addEventListener('keydown', (e) => {
    if (state.uiOpen || state.inspecting) {
        if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') toggleDetail();
        return;
    }
    keys[e.code] = true;
    if (e.code === 'Space') interact();
    if (e.code === 'Tab') { e.preventDefault(); state.sel = (state.sel + 1) % 2; updateUI(); }
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') toggleDetail();
});
window.addEventListener('keyup', (e) => keys[e.code] = false);

document.addEventListener('mousemove', (e) => {
    if (document.pointerLockElement) {
        yaw -= e.movementX * 0.0025;
        pitch -= e.movementY * 0.0025;
        pitch = Math.max(-1.3, Math.min(1.3, pitch));
    }
});

function runGame() {
    document.getElementById('boot-layer').style.display = 'none';
    
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- 明るさ強化 ---
    const ambient = new THREE.AmbientLight(0xffffff, 1.2); // 環境光を大幅アップ
    scene.add(ambient);
    const sun = new THREE.DirectionalLight(0xffffff, 1.5); // 太陽光のような光
    sun.position.set(20, 40, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    scene.add(sun);

    // 部屋生成 (少し明るい色に変更)
    makeRoom(0, 0x6e4b3a);  // Room 1
    makeRoom(22, 0x2d5a3a); // Room 2
    makeRoom(44, 0x2c3e50); // Room 3

    // 家具(Room 1)
    const desk = buildDesk(-5, -5); scene.add(desk);
    const vase = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.45, 1, 16), new THREE.MeshStandardMaterial({color: 0x00bcd4, metalness: 0.3}));
    vase.position.set(-5, 1.6, -5); vase.name = "vase"; vase.castShadow = true; scene.add(vase);
    const d1 = buildDoor(8, 0x795548, "door1"); scene.add(d1);

    // 家具(Room 2)
    const chair = buildChair(26, 4); chair.name = "chair"; scene.add(chair);
    const safe = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.4, 1.4), new THREE.MeshStandardMaterial({color: 0x222, metalness: 0.8}));
    safe.position.set(29, 0.7, -5); safe.name = "safe"; safe.castShadow = true; scene.add(safe);
    const d2 = buildDoor(30, 0x111, "door2"); scene.add(d2);

    // パズル(Room 3)
    buildNode(40, -4, 0xff5555, "red");
    buildNode(48, 0, 0x55ccff, "blue");
    buildNode(42, 4, 0xffcc00, "yellow");
    const dExit = buildDoor(52, 0xf1c40f, "exitDoor"); scene.add(dExit);

    // テンキー
    const root = document.getElementById('pad-root');
    for(let i=1; i<=9; i++) {
        let b = document.createElement('button'); b.innerText = i;
        b.onclick = () => document.getElementById('safe-screen').value += i;
        root.appendChild(b);
    }

    camera.position.set(0, 3, 8);
    renderer.domElement.requestPointerLock();
    renderer.domElement.onclick = () => { if(!state.uiOpen && !state.inspecting) renderer.domElement.requestPointerLock(); };
    updateUI();
    animate();
}

function makeRoom(x, col) {
    const wall = new THREE.Mesh(new THREE.BoxGeometry(16, 9, 16), new THREE.MeshStandardMaterial({color: col, side: THREE.BackSide}));
    wall.position.set(x, 4.5, 0); wall.receiveShadow = true; scene.add(wall);
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(16, 16), new THREE.MeshStandardMaterial({color: 0x333333}));
    floor.rotation.x = -Math.PI/2; floor.position.x = x; floor.receiveShadow = true; scene.add(floor);
}

function buildDesk(x, z) {
    const g = new THREE.Group();
    const t = new THREE.Mesh(new THREE.BoxGeometry(4.2, 0.2, 2.6), new THREE.MeshStandardMaterial({color: 0x3e2723}));
    t.position.y = 1.4; t.castShadow = true; g.add(t);
    [[-1.9,-1.1],[1.9,-1.1],[-1.9,1.1],[1.9,1.1]].forEach(p => {
        let l = new THREE.Mesh(new THREE.BoxGeometry(0.15, 1.4, 0.15), new THREE.MeshStandardMaterial({color: 0x1a0a05}));
        l.position.set(p[0], 0.7, p[1]); l.castShadow = true; g.add(l);
    });
    g.position.set(x, 0, z); return g;
}

function buildChair(x, z) {
    const g = new THREE.Group();
    const s = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.2, 1.5), new THREE.MeshStandardMaterial({color: 0x880e4f}));
    s.position.y = 0.8; g.add(s);
    const b = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.6, 0.2), new THREE.MeshStandardMaterial({color: 0x880e4f}));
    b.position.set(0, 1.6, -0.65); g.add(b);
    g.position.set(x, 0, z); return g;
}

function buildNode(x, z, col, id) {
    const g = new THREE.Group();
    g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 3), new THREE.MeshStandardMaterial({color: 0x111})));
    const c = new THREE.Mesh(new THREE.OctahedronGeometry(0.7), new THREE.MeshStandardMaterial({color: col, emissive: col, emissiveIntensity: 0.4}));
    c.position.y = 3.6; c.name = "node_"+id; g.add(c);
    g.position.set(x, 1.5, z); scene.add(g);
}

function buildDoor(x, col, name) {
    const d = new THREE.Mesh(new THREE.BoxGeometry(0.5, 6, 3), new THREE.MeshStandardMaterial({color: col, metalness: 0.5}));
    d.position.set(x, 3, 0); d.name = name; d.castShadow = true; return d;
}

function interact() {
    const r = new THREE.Raycaster();
    r.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = r.intersectObjects(scene.children, true);
    if(hits.length > 0 && hits[0].distance < 6) {
        const o = hits[0].object;
        const activeItem = state.inv[state.sel];

        if(o.name === "vase") {
            if(!state.inv.includes("key1")) { state.inv.push("key1"); updateUI(); log("『真鍮の鍵』を手に入れた。[Shift]で詳しく調べられる。"); }
        }
        else if(o.name === "door1") {
            if(activeItem === "key1") { o.position.y += 8; state.d1 = true; log("扉が開いた！"); }
            else log("鍵がかかっている。何かが必要だ。");
        }
        else if(o.name === "chair" || o.parent?.name === "chair") {
            const t = (o.name === "chair") ? o : o.parent;
            if(!state.hints.chair) { t.position.z += 2.5; state.hints.chair = true; log("椅子を動かした。座面に数字がある：『384』"); }
        }
        else if(o.name === "safe") {
            if(state.hints.chair) { state.uiOpen = true; document.getElementById('safe-panel').style.display = 'block'; document.exitPointerLock(); }
            else log("暗証番号式の金庫だ。どこかにヒントがあるはずだ。");
        }
        else if(o.name === "door2") {
            if(activeItem === "card") { o.position.y += 8; state.d2 = true; log("カード認証成功。扉が開いた。"); }
            else log("電子ロックされている。認証カードが必要だ。");
        }
        else if(o.name.startsWith("node_")) {
            const c = o.name.split("_")[1]; state.r3.push(c); o.material.emissiveIntensity = 5;
            if(state.r3.length === 3) {
                if(state.r3.join(",") === "red,yellow,blue") { state.inv.push("key2"); updateUI(); log("パズル解明！黄金の鍵が出現した。"); }
                else { state.r3 = []; log("順序が違うようだ...(赤→黄→青)"); }
            }
        }
        else if(o.name === "exitDoor") {
            if(activeItem === "key2") { document.getElementById('clear-screen').style.display = 'flex'; document.exitPointerLock(); }
            else log("脱出口だ。黄金の鍵があれば脱出できそうだ。");
        }
    }
}

function toggleDetail() {
    const itemKey = state.inv[state.sel];
    if(!itemKey) return;
    state.inspecting = !state.inspecting;
    const ui = document.getElementById('detail-view');
    if(state.inspecting) {
        ui.style.display = 'flex';
        document.getElementById('det-icon').innerText = items[itemKey].icon;
        document.getElementById('det-title').innerText = items[itemKey].name;
        document.getElementById('det-desc').innerText = items[itemKey].desc;
    } else { ui.style.display = 'none'; }
}

function tryUnlock() {
    if(document.getElementById('safe-screen').value === "384") {
        state.inv.push("card"); updateUI(); log("金庫が開いた！『認証カード』を入手。"); closeSafe();
    } else { log("番号が間違っている。"); document.getElementById('safe-screen').value = ""; }
}
function closeSafe() { state.uiOpen = false; document.getElementById('safe-panel').style.display = 'none'; }
function log(t) { document.getElementById('msg-text').innerText = t; }

function updateUI() {
    for(let i=0; i<2; i++){
        const s = document.getElementById('slot'+i);
        const k = state.inv[i];
        s.innerText = k ? items[k].icon : "";
        s.className = (i === state.sel) ? "inv-slot active" : "inv-slot";
        s.querySelector('.inv-name').innerText = k ? items[k].name : "空きスロット";
    }
}

function animate() {
    if(!state.uiOpen && !state.inspecting) {
        if(keys['KeyQ']) yaw += 0.045;
        if(keys['KeyE']) yaw -= 0.045;
        
        const move = new THREE.Vector3();
        const fwd = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        const rgt = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        if(keys['ArrowUp'] || keys['KeyW']) move.add(fwd);
        if(keys['ArrowDown'] || keys['KeyS']) move.add(fwd.negate());
        if(keys['ArrowLeft'] || keys['KeyA']) move.add(rgt.negate());
        if(keys['ArrowRight'] || keys['KeyD']) move.add(rgt);

        if(move.length() > 0) camera.position.addScaledVector(move.normalize(), 0.18);

        // 壁の衝突
        camera.position.x = Math.max(-7, Math.min(51, camera.position.x));
        camera.position.z = Math.max(-7, Math.min(7, camera.position.z));
        if(!state.d1 && camera.position.x > 7.4) camera.position.x = 7.4;
        if(!state.d2 && camera.position.x > 29.4) camera.position.x = 29.4;

        camera.rotation.set(pitch, yaw, 0, 'YXZ');
    }
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
</script>
</body>
</html>
