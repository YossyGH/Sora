<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Pastel Escape - Study Room</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #fff; font-family: 'Hiragino Kaku Gothic Pro', sans-serif; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffeef2; display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 1000; }
        #start-btn { padding: 25px 80px; font-size: 28px; background: #ff85a2; border: none; color: white; cursor: pointer; border-radius: 60px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #inventory { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .slot { width: 80px; height: 80px; border: 5px solid #f8bbd0; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; font-size: 45px; border-radius: 20px; }
        .slot.selected { border-color: #ff85a2; box-shadow: 0 0 25px #ff85a2; background: #fff; transform: scale(1.1); }
        #controls-guide { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.95); padding: 20px; border-radius: 15px; border: 3px solid #ff85a2; color: #ff4081; font-size: 15px; line-height: 1.8; font-weight: bold; pointer-events: auto; }
        #msg-box { position: absolute; bottom: 40px; width: 100%; text-align: center; }
        #text { display: inline-block; background: white; color: #ff4081; padding: 20px 60px; border-radius: 50px; border: 4px solid #f8bbd0; font-size: 20px; font-weight: bold; min-width: 400px; }
        #safe-ui { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border-radius: 30px; border: 6px solid #ff85a2; pointer-events: auto; text-align: center; z-index: 2000; }
        #safe-ui input { font-size: 40px; width: 180px; text-align: center; border: 3px solid #f8bbd0; border-radius: 15px; margin-bottom: 20px; outline: none; }
        #safe-ui button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; margin: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color: #ff4081; font-size: 50px; margin-bottom: 10px;">🌸 秘密の書斎 🌸</h1>
    <p style="color: #ff85a2; margin-bottom: 40px;">〜パステルルームからの脱出〜</p>
    <button id="start-btn">冒険をはじめる！</button>
</div>

<div id="ui">
    <div id="inventory"><div id="slot-0" class="slot"></div><div id="slot-1" class="slot"></div></div>
    <div id="controls-guide">
        【操作パネル】<br>
        🏃 移動：矢印キー (↑ ↓ ← →)<br>
        🔄 選択：Spaceキー<br>
        📝 見る：Enterキー<br>
        🔑 使う：Shiftキー<br>
        🖱️ 調べる：左クリック
    </div>
    <div id="msg-box"><div id="text">まずは部屋の中を調べてみましょう。</div></div>
    <div id="safe-ui">
        <h2 style="color:#ff4081;">暗証番号を入力</h2>
        <input type="number" id="safe-input" placeholder="????"><br>
        <button onclick="tryUnlock()" style="background:#ff85a2; color:white;">解錠</button>
        <button onclick="closeSafe()" style="background:#ccc;">閉じる</button>
    </div>
</div>

<script>
    const state = { inv: [], sel: -1, door1Open: false, chairMoved: false, exitOpen: false };
    const items = { 
        key1: { icon: "🗝️", name: "真鍮の鍵", desc: "隣の『書斎』へ入るための鍵です。" },
        key2: { icon: "🔑", name: "黄金の鍵", desc: "おめでとう！これで外の世界へ脱出できます！" }
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xfff5f7);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.0));
    const pLight = new THREE.PointLight(0xffffff, 1.5, 50); pLight.position.set(5, 8, 5); scene.add(pLight);

    // 部屋生成
    const makeRoom = (x, color) => {
        const g = new THREE.Group(); g.position.x = x;
        const box = new THREE.Mesh(new THREE.BoxGeometry(16, 9, 16), new THREE.MeshStandardMaterial({color:color, side:THREE.BackSide}));
        box.position.y = 4.5; g.add(box);
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(16, 16), new THREE.MeshStandardMaterial({color:0xffffff, roughness: 0.1}));
        floor.rotation.x = -Math.PI/2; g.add(floor);
        scene.add(g); return g;
    };
    const r1 = makeRoom(0, 0xffcad4); // 部屋1
    const r2 = makeRoom(22, 0xbde0fe); // 書斎

    // --- オブジェ ---
    const wood = new THREE.MeshStandardMaterial({color: 0xba9470});
    // 部屋1の棚
    const shelf = new THREE.Mesh(new THREE.BoxGeometry(3, 5, 1), wood); shelf.position.set(-6, 2.5, -6); scene.add(shelf);
    const vase = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 0.8), new THREE.MeshStandardMaterial({color: 0x98ff98}));
    vase.position.set(-6, 5.4, -6); vase.name = "vase"; scene.add(vase);
    // 接続ドア
    const door1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 6, 3), new THREE.MeshStandardMaterial({color: 0xffffff}));
    door1.position.set(8, 3, 0); door1.name = "door1"; scene.add(door1);
    // 書斎の本棚
    const bs = new THREE.Mesh(new THREE.BoxGeometry(6, 7, 1), wood); bs.position.set(22, 3.5, -7.4); bs.name = "bookshelf"; scene.add(bs);
    // 書斎の椅子
    const chair = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshStandardMaterial({color: 0xff85a2}));
    chair.position.set(24, 0.75, 2); chair.name = "chair"; scene.add(chair);
    // 金庫
    const safe = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({color: 0x444, metalness: 0.9}));
    safe.position.set(28, 1, -5); safe.name = "safe"; scene.add(safe);
    // 出口
    const exit = new THREE.Mesh(new THREE.BoxGeometry(0.3, 6, 3), new THREE.MeshStandardMaterial({color: 0xffd700}));
    exit.position.set(30, 3, 0); exit.name = "exit"; scene.add(exit);
    // ウサギ
    const rabbit = new THREE.Group(); const rm = new THREE.MeshStandardMaterial({color:0xff85a2});
    const rb = new THREE.Mesh(new THREE.SphereGeometry(0.6,12,12), rm); rb.position.y=0.6;
    const rh = new THREE.Mesh(new THREE.SphereGeometry(0.5,12,12), rm); rh.position.y=1.4;
    rabbit.add(rb, rh); rabbit.position.set(16, 0, 6); rabbit.name = "rabbit"; scene.add(rabbit);

    // --- ロジック ---
    camera.position.set(0, 3, 8);
    const keys = {}; let yaw = 0, pitch = 0;

    document.getElementById('start-btn').onclick = () => { renderer.domElement.requestPointerLock(); document.getElementById('overlay').style.display = 'none'; };

    window.onkeydown = (e) => {
        keys[e.code] = true;
        if (e.code === 'Space' && state.inv.length > 0) { state.sel = (state.sel + 1) % state.inv.length; updateUI(); notify(items[state.inv[state.sel]].name + " を選択中"); }
        if (e.code === 'Enter' && state.sel !== -1) { notify("【詳細】" + items[state.inv[state.sel]].desc); }
        if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') handleAction(true);
    };
    window.onkeyup = (e) => keys[e.code] = false;

    document.onmousemove = (e) => { if (document.pointerLockElement) { yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; pitch = Math.max(-1.4, Math.min(1.4, pitch)); } };

    const handleAction = (isShift) => {
        if (!document.pointerLockElement) return;
        const ray = new THREE.Raycaster(); ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = ray.intersectObjects(scene.children, true);
        if (hits.length > 0 && hits[0].distance < 6) {
            let o = hits[0].object; while(o.parent && !o.name) o = o.parent;
            if (o.name === "vase") { if (!state.inv.includes("key1")) { state.inv.push("key1"); state.sel=0; updateUI(); notify("花瓶に『真鍮の鍵』が入っていた！"); } }
            else if (o.name === "door1") { if (isShift && state.inv[state.sel] === "key1") { state.door1Open = true; o.position.y += 8; notify("書斎の扉が開いた！"); } else if (!isShift) notify("鍵がかかっている。Shiftで鍵を使おう。"); }
            else if (o.name === "chair") { state.chairMoved = !state.chairMoved; o.position.z += state.chairMoved ? 3 : -3; notify(state.chairMoved ? "椅子を動かした。床に数字『9』がある！" : "戻した。"); }
            else if (o.name === "bookshelf") { notify("本棚の奥に数字『4』を見つけた！"); }
            else if (o.name === "rabbit") { notify("ウサギ：最後は僕の耳の数(2)だよ！"); }
            else if (o.name === "safe") { document.exitPointerLock(); document.getElementById('safe-ui').style.display = 'block'; }
            else if (o.name === "exit") { if (isShift && state.inv[state.sel] === "key2") { state.exitOpen = true; o.position.y += 8; notify("脱出成功！おめでとう！"); } else if (!isShift) notify("黄金の鍵が必要だ。"); }
        }
    };
    window.onmousedown = () => handleAction(false);

    window.tryUnlock = () => { if (document.getElementById('safe-input').value === "492") { state.inv.push("key2"); updateUI(); notify("金庫が開いた！『黄金の鍵』を入手！"); closeSafe(); } else { alert("番号が違う..."); } };
    window.closeSafe = () => { document.getElementById('safe-ui').style.display = 'none'; renderer.domElement.requestPointerLock(); };

    function loop() {
        if (document.pointerLockElement) {
            const dir = new THREE.Vector3();
            if (keys['ArrowUp']) dir.z -= 1; if (keys['ArrowDown']) dir.z += 1;
            if (keys['ArrowLeft']) dir.x -= 1; if (keys['ArrowRight']) dir.x += 1;
            if (dir.length() > 0) { dir.normalize().applyAxisAngle(new THREE.Vector3(0,1,0), yaw); camera.position.addScaledVector(dir, 0.15); }
            camera.position.y = 3;
            if (camera.position.x < -7) camera.position.x = -7;
            if (!state.door1Open && camera.position.x > 7.5) camera.position.x = 7.5;
            if (camera.position.x > 30) camera.position.x = 30;
        }
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        renderer.render(scene, camera);
        requestAnimationFrame(loop);
    }
    loop();

    function notify(t) { document.getElementById('text').innerText = t; }
    function updateUI() { for(let i=0; i<2; i++) { const s = document.getElementById('slot-'+i); s.innerHTML = state.inv[i] ? items[state.inv[i]].icon : ""; s.classList.toggle('selected', i === state.sel); } }
</script>
</body>
</html>
