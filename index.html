<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D ESCAPE - LUXURY EDITION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Meiryo', sans-serif; }
        
        /* 起動画面：これが表示されたらEnter */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2c3e50 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; color: #ecf0f1; text-align: center;
        }
        .start-btn {
            margin-top: 30px; padding: 20px 50px; font-size: 24px;
            background: #27ae60; color: white; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 20px rgba(39,174,96,0.5);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* UIレイヤー */
        #game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        #inventory { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .slot { width: 80px; height: 80px; background: rgba(0,0,0,0.8); border: 3px solid #7f8c8d; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 40px; transition: 0.3s; }
        .slot.active { border-color: #f1c40f; box-shadow: 0 0 15px #f1c40f; }
        
        #msg-panel { position: absolute; bottom: 50px; width: 100%; text-align: center; }
        #msg-text { display: inline-block; background: rgba(0,0,0,0.9); color: #fff; padding: 20px 60px; border-radius: 100px; border: 2px solid #27ae60; font-size: 20px; }

        /* パスワード入力パネル */
        #numpad { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #34495e; padding: 30px; border-radius: 20px; border: 4px solid #27ae60;
            pointer-events: auto; text-align: center; color: white;
        }
        #numpad input { font-size: 40px; width: 120px; text-align: center; background: #000; color: #2ecc71; border: 1px solid #2ecc71; margin-bottom: 20px; }

        /* 成功演出 */
        #congrats {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 20000; flex-direction: column;
            align-items: center; justify-content: center; color: #f1c40f;
        }
    </style>
</head>
<body>

<div id="boot-screen">
    <h1 style="font-size: 50px; letter-spacing: 10px;">ESCAPE ROOM</h1>
    <p style="color: #bdc3c7;">[矢印キー:移動 / Q,E:回転 / Space:調べる / Enter:決定]</p>
    <button class="start-btn" onclick="startGame()">START GAME (ENTER)</button>
</div>

<div id="congrats">
    <h1 style="font-size: 80px; text-shadow: 0 0 30px #f1c40f;">Congratulations!</h1>
    <p style="font-size: 24px; color: white;">あなたは全ての謎を解き、脱出に成功した！</p>
    <button class="start-btn" onclick="location.reload()">REPLAY</button>
</div>

<div id="game-ui">
    <div id="inventory">
        <div id="slot-0" class="slot"></div>
        <div id="slot-1" class="slot"></div>
    </div>
    <div id="msg-panel"><div id="msg-text">部屋を調べて脱出の手がかりを探せ...</div></div>
    
    <div id="numpad">
        <h3>ENTER CODE</h3>
        <input type="text" id="code-in" maxlength="3" readonly><br>
        <div id="keys" style="display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; justify-content: center;">
            </div>
        <button onclick="checkCode()" style="margin-top:20px; padding:10px 20px;">OK</button>
        <button onclick="closePad()" style="margin-top:20px; padding:10px 20px; background:#e74c3c; border:none; color:white;">CLOSE</button>
    </div>
</div>

<script>
let scene, camera, renderer, clock, yaw = 0, pitch = 0;
let keys = {};
const state = { inv: [], sel: 0, d1: false, d2: false, hints: { chair: false }, panel: false };
const items = { key1: "🗝️", card: "💳", key2: "🔑" };

// 起動トリガー
window.addEventListener('keydown', (e) => {
    if (e.code === 'Enter' && !scene) startGame();
    keys[e.code] = true;
    if (e.code === 'Space') interact();
    if (e.code === 'Tab') { e.preventDefault(); state.sel = (state.sel + 1) % 2; updateUI(); }
});
window.addEventListener('keyup', (e) => keys[e.code] = false);

function startGame() {
    document.getElementById('boot-screen').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
    initScene();
    animate();
}

function initScene() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // ライティング（明るく設定）
    const ambient = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambient);
    const light = new THREE.PointLight(0xffffff, 1.5, 50);
    light.position.set(5, 10, 5);
    light.castShadow = true;
    scene.add(light);

    // 部屋1 (茶色)
    createRoom(0, 0x5d4037);
    // 部屋2 (緑)
    createRoom(22, 0x2e7d32);
    // 部屋3 (紺)
    createRoom(44, 0x1a237e);

    // 家具：デスク
    const desk = new THREE.Group();
    const top = new THREE.Mesh(new THREE.BoxGeometry(4, 0.2, 2.5), new THREE.MeshStandardMaterial({color: 0x3e2723}));
    top.position.y = 1.4; desk.add(top);
    [[-1.8,-1], [1.8,-1], [-1.8,1], [1.8,1]].forEach(p => {
        let leg = new THREE.Mesh(new THREE.BoxGeometry(0.15, 1.4, 0.15), new THREE.MeshStandardMaterial({color: 0x21100b}));
        leg.position.set(p[0], 0.7, p[1]); desk.add(leg);
    });
    desk.position.set(-5, 0, -5); scene.add(desk);

    // 花瓶（真鍮の鍵）
    const vase = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 0.8, 16), new THREE.MeshStandardMaterial({color: 0x00bcd4, metalness: 0.5}));
    vase.position.set(-5, 1.8, -5); vase.name = "vase"; scene.add(vase);

    // 扉1
    const door1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), new THREE.MeshStandardMaterial({color: 0x795548}));
    door1.position.set(8, 3, 0); door1.name = "door1"; scene.add(door1);

    // 椅子
    const chair = new THREE.Group();
    const seat = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.2, 1.5), new THREE.MeshStandardMaterial({color: 0xd81b60}));
    seat.position.y = 0.8; chair.add(seat);
    const back = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 0.2), new THREE.MeshStandardMaterial({color: 0xd81b60}));
    back.position.set(0, 1.5, -0.6); chair.add(back);
    chair.position.set(26, 0, 4); chair.name = "chair"; scene.add(chair);

    // 金庫
    const safe = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshStandardMaterial({color: 0x2c3e50, metalness: 0.8}));
    safe.position.set(29, 0.6, -5); safe.name = "safe"; scene.add(safe);

    // 扉2
    const door2 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), new THREE.MeshStandardMaterial({color: 0x212121}));
    door2.position.set(30, 3, 0); door2.name = "door2"; scene.add(door2);

    // クリスタル柱
    const createPillar = (x, z, col, name) => {
        const g = new THREE.Group();
        const b = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 3), new THREE.MeshStandardMaterial({color: 0x111}));
        const c = new THREE.Mesh(new THREE.OctahedronGeometry(0.6), new THREE.MeshStandardMaterial({color: col, emissive: col, emissiveIntensity: 0.5}));
        c.position.y = 3.5; c.name = name; g.add(b, c); g.position.set(x, 1.5, z); scene.add(g);
    };
    createPillar(40, -4, 0xff0000, "node_red");
    createPillar(48, 0, 0x00e5ff, "node_blue");
    createPillar(40, 4, 0xffff00, "node_yellow");

    // 最終扉
    const exit = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), new THREE.MeshStandardMaterial({color: 0xffd700, metalness: 1}));
    exit.position.set(52, 3, 0); exit.name = "exitDoor"; scene.add(exit);

    camera.position.set(0, 3, 8);
    updateUI();

    // テンキー生成
    const pad = document.getElementById('keys');
    for(let i=1; i<=9; i++) {
        let b = document.createElement('button'); b.innerText = i;
        b.onclick = () => document.getElementById('code-in').value += i;
        pad.appendChild(b);
    }
}

function createRoom(x, col) {
    const walls = new THREE.Mesh(new THREE.BoxGeometry(16, 9, 16), new THREE.MeshStandardMaterial({color: col, side: THREE.BackSide}));
    walls.position.set(x, 4.5, 0); walls.receiveShadow = true; scene.add(walls);
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(16, 16), new THREE.MeshStandardMaterial({color: 0x222}));
    floor.rotation.x = -Math.PI/2; floor.position.x = x; floor.receiveShadow = true; scene.add(floor);
}

function interact() {
    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = ray.intersectObjects(scene.children, true);
    if(hits.length > 0 && hits[0].distance < 6) {
        let o = hits[0].object;
        let item = state.inv[state.sel];

        if(o.name === "vase") {
            if(!state.inv.includes("key1")) { state.inv.push("key1"); updateUI(); notify("『真鍮の鍵』を手に入れた。"); }
        }
        else if(o.name === "door1") {
            if(item === "key1") { o.position.y += 8; state.d1 = true; notify("扉が開いた。"); }
            else notify("鍵が必要だ。");
        }
        else if(o.name === "chair" || o.parent.name === "chair") {
            const c = (o.name === "chair") ? o : o.parent;
            if(!state.hints.chair) { c.position.z += 2; state.hints.chair = true; notify("椅子を動かした。番号：384"); }
        }
        else if(o.name === "safe") {
            if(state.hints.chair) { state.panel = true; document.getElementById('numpad').style.display = 'block'; document.exitPointerLock(); }
            else notify("暗証番号がわからない。");
        }
        else if(o.name === "door2") {
            if(item === "card") { o.position.y += 8; state.d2 = true; notify("認証カードを読み取った。"); }
            else notify("認証カードが必要だ。");
        }
        else if(o.name.startsWith("node_")) {
            const col = o.name.split('_')[1];
            state.r3_seq = state.r3_seq || [];
            state.r3_seq.push(col);
            o.material.emissiveIntensity = 5;
            if(state.r3_seq.length === 3) {
                if(state.r3_seq.join(',') === "red,yellow,blue") { state.inv.push("key2"); updateUI(); notify("『黄金の鍵』を入手！"); }
                else { state.r3_seq = []; notify("リセット... 赤→黄→青だ。"); }
            }
        }
        else if(o.name === "exitDoor") {
            if(item === "key2") { document.getElementById('congrats').style.display = 'flex'; }
            else notify("『黄金の鍵』が必要だ。");
        }
    }
}

function checkCode() {
    if(document.getElementById('code-in').value === "384") {
        state.inv.push("card"); updateUI(); notify("金庫が開いた！カードを入手。"); closePad();
    } else { notify("番号が違う。"); document.getElementById('code-in').value = ""; }
}
function closePad() { state.panel = false; document.getElementById('numpad').style.display = 'none'; }
function notify(t) { document.getElementById('msg-text').innerText = t; }
function updateUI() {
    for(let i=0; i<2; i++) {
        const s = document.getElementById('slot-'+i);
        s.innerText = state.inv[i] ? items[state.inv[i]] : "";
        s.className = (i === state.sel) ? "slot active" : "slot";
    }
}

function animate() {
    if(!state.panel) {
        // 回転
        if(keys['KeyQ']) yaw += 0.04;
        if(keys['KeyE']) yaw -= 0.04;
        // 移動
        const dir = new THREE.Vector3();
        const f = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        const r = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        if(keys['ArrowUp'] || keys['KeyW']) dir.add(f);
        if(keys['ArrowDown'] || keys['KeyS']) dir.add(f.negate());
        if(keys['ArrowLeft'] || keys['KeyA']) dir.add(r.negate());
        if(keys['ArrowRight'] || keys['KeyD']) dir.add(r);
        if(dir.length() > 0) camera.position.addScaledVector(dir.normalize(), 0.15);

        // 衝突制限（簡易）
        camera.position.x = Math.max(-7, Math.min(52, camera.position.x));
        camera.position.z = Math.max(-7, Math.min(7, camera.position.z));
        if(!state.d1 && camera.position.x > 7) camera.position.x = 7;
        if(!state.d2 && camera.position.x > 29) camera.position.x = 29;

        camera.rotation.set(pitch, yaw, 0, 'YXZ');
    }
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
</script>
</body>
</html>
