<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>THE THREE ROOMS - 論理の迷宮</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #boot { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; color: white; }
        #gui { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); color: #fff; padding: 15px; border-radius: 8px; border-left: 5px solid #e74c3c; font-size: 13px; z-index: 500; }
        #inv { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 500; }
        .slot { width: 85px; height: 85px; background: rgba(15,15,15,0.95); border: 2px solid #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; }
        .slot.active { border-color: #e74c3c; box-shadow: 0 0 15px rgba(231,76,60,0.5); }
        #msg { position: absolute; bottom: 30px; width: 100%; text-align: center; pointer-events: none; }
        #msg-i { display: inline-block; background: rgba(0,0,0,0.9); color: white; padding: 15px 40px; border-bottom: 3px solid #e74c3c; font-size: 18px; }
        #ins { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        #safe { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2c3e50; padding: 30px; border-radius: 15px; z-index: 1500; }
        #telop { position: fixed; top: 30%; width: 100%; text-align: center; color: #e74c3c; font-size: 3rem; font-weight: bold; opacity: 0; transition: 1.5s; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>

<div id="boot">
    <h1>THE THREE ROOMS</h1>
    <p style="color:#888">すべてのヒントが揃わなければ、答えは決して見えない。</p>
    <button style="padding:15px 50px; cursor:pointer;" onclick="init()">潜入開始</button>
</div>

<div id="gui">WASD:移動 / QE:回転 / SPACE:調べる / TAB:切替 / SHIFT:詳細ヒント</div>
<div id="inv"><div id="s0" class="slot"></div><div id="s1" class="slot"></div></div>
<div id="telop">ROOM 3: 断絶された論理</div>
<div id="msg"><div id="msg-i">探索を開始せよ。</div></div>

<div id="ins">
    <div style="background:#111; padding:50px; border:1px solid #444; border-radius:15px;">
        <div id="ins-icon" style="font-size:80px;"></div>
        <h2 id="ins-name"></h2>
        <p id="ins-desc" style="max-width:400px; line-height:1.6; color:#ccc;"></p>
        <p style="color:#555; margin-top:20px;">[ SHIFT ] 閉じる</p>
    </div>
</div>

<div id="safe">
    <input type="text" id="safe-d" style="font-size:40px; width:180px; text-align:center; margin-bottom:10px;" readonly><br>
    <div style="display:grid; grid-template-columns:repeat(3,60px); gap:10px;" id="btns"></div>
    <button onclick="checkP()" style="width:100%; margin-top:10px; padding:10px;">ENTER</button>
</div>

<script>
let scene, camera, renderer, yaw = 0, pitch = 0, keys = {};
const player = { inv: [], sel: 0, ui: false, ins: false, r3: false };
const world = { d1: false, d2: false, chair: false, puzzle: [] };

const DATA = {
    key1: { icon: "🗝️", name: "真鍮の鍵", desc: "古びた鍵。裏側に針書きの文字がある...『赤は青より前だが、青の直前ではない』" },
    card: { icon: "💳", name: "認証カード", desc: "Room2のカード。端に小さく印字されている...『青は2番目である』" },
    key2: { icon: "🔑", name: "黄金の鍵", desc: "最終脱出用の鍵。" }
};

function init() {
    document.getElementById('boot').style.display = 'none';
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.4));
    [0, 22, 44].forEach(x => {
        let l = new THREE.PointLight(0xffffff, 1.2, 25);
        l.position.set(x, 7, 0); scene.add(l);
    });

    createRoom(0, 0x2c1e14); createRoom(22, 0x0f260f); createRoom(44, 0x0f0f26);

    // Items
    const v = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 1), new THREE.MeshStandardMaterial({color: 0x00bcd4}));
    v.position.set(-6, 1.5, -6); v.name = "vase"; scene.add(v);
    
    const d1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), new THREE.MeshStandardMaterial({color: 0x3e2723}));
    d1.position.set(8, 3, 0); d1.name = "d1"; scene.add(d1);

    const c = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.5, 1.5), new THREE.MeshStandardMaterial({color: 0x880e4f}));
    c.position.set(24, 0.25, 5); c.name = "chair"; scene.add(c);

    const s = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshStandardMaterial({color: 0x111}));
    s.position.set(29, 0.6, -6); s.name = "safe"; scene.add(s);
    
    // Hidden Hint in Room 2 (Hard to find)
    scene.add(createText("緑 ≠ 1, 3", 14.1, 1, 6, Math.PI/2)); // 緑は1番目でも3番目でもない

    const d2 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), new THREE.MeshStandardMaterial({color: 0x000}));
    d2.position.set(30, 3, 0); d2.name = "d2"; scene.add(d2);

    // Room 3 Pillars
    createP(40, -5, 0xff3333, "red");
    createP(46, -5, 0x3333ff, "blue");
    createP(40, 5, 0xffff33, "yellow");
    createP(46, 5, 0x33ff33, "green");

    const ex = new THREE.Mesh(new THREE.BoxGeometry(0.4, 6, 3), new THREE.MeshStandardMaterial({color: 0xffd700}));
    ex.position.set(52, 3, 0); ex.name = "exit"; scene.add(ex);

    // UI
    const b = document.getElementById('btns');
    for(let i=1; i<=9; i++){
        let btn = document.createElement('button'); btn.innerText = i;
        btn.onclick = () => document.getElementById('safe-d').value += i;
        b.appendChild(btn);
    }

    camera.position.set(0, 3, 8);
    renderer.domElement.requestPointerLock();
    renderer.domElement.onclick = () => { if(!player.ui && !player.ins) renderer.domElement.requestPointerLock(); };
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
    updateUI();
    animate();
}

function createRoom(x, col) {
    const r = new THREE.Mesh(new THREE.BoxGeometry(16, 9, 16), new THREE.MeshStandardMaterial({color: col, side: 1}));
    r.position.set(x, 4.5, 0); scene.add(r);
}

function createText(t, x, y, z, ry) {
    const cv = document.createElement('canvas'); const cx = cv.getContext('2d');
    cv.width = 256; cv.height = 64; cx.fillStyle = "white"; cx.font = "bold 35px Arial"; cx.fillText(t, 10, 45);
    const m = new THREE.Mesh(new THREE.PlaneGeometry(3, 0.75), new THREE.MeshBasicMaterial({map: new THREE.CanvasTexture(cv), transparent: true}));
    m.position.set(x,y,z); m.rotation.y = ry; return m;
}

function createP(x, z, col, id) {
    const g = new THREE.Group();
    g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 3.5), new THREE.MeshStandardMaterial({color: 0})));
    const o = new THREE.Mesh(new THREE.OctahedronGeometry(0.7), new THREE.MeshStandardMaterial({color: col, emissive: col, emissiveIntensity: 0.5}));
    o.position.y = 4; o.name = "n_" + id; g.add(o);
    g.position.set(x, 1.75, z); scene.add(g);
}

function interact() {
    const r = new THREE.Raycaster(); r.setFromCamera(new THREE.Vector2(0,0), camera);
    const h = r.intersectObjects(scene.children, true);
    if(h.length > 0 && h[0].distance < 6) {
        const o = h[0].object; const it = player.inv[player.sel];
        if(o.name === "vase") { if(!player.inv.includes("key1")) { player.inv.push("key1"); updateUI(); log("真鍮の鍵を入手。SHIFTで詳細を見ろ。"); }}
        else if(o.name === "d1") { if(it === "key1") { o.position.y += 8; world.d1 = true; log("Room 1 開放。"); } else log("鍵が必要。"); }
        else if(o.name === "chair") { if(!world.chair) { o.position.x -= 3; world.chair = true; log("椅子の下に『X = 42, PASS = X * 21』の文字。"); }}
        else if(o.name === "safe") { if(world.chair) { player.ui = true; document.getElementById('safe').style.display='block'; document.exitPointerLock(); }}
        else if(o.name === "d2") { if(it === "card") { o.position.y += 8; world.d2 = true; log("Room 2 開放。"); } else log("認証カードが必要。"); }
        else if(o.name.startsWith("n_")) {
            const id = o.name.split("_")[1]; world.puzzle.push(id); o.material.emissiveIntensity = 8;
            if(world.puzzle.length === 4) {
                if(world.puzzle.join(",") === "red,blue,yellow,green") { player.inv.push("key2"); updateUI(); log("パズル解錠。黄金の鍵を入手。"); }
                else { world.puzzle = []; log("不正解。リセットされた。"); }
            }
        }
        else if(o.name === "exit") { if(it === "key2") alert("脱出成功！おめでとうございます！"); else log("黄金の鍵が必要。"); }
    }
}

function toggleIns() {
    const k = player.inv[player.sel]; if(!k) return;
    player.ins = !player.ins; const d = document.getElementById('ins');
    if(player.ins) {
        d.style.display = 'flex'; document.getElementById('ins-icon').innerText = DATA[k].icon;
        document.getElementById('ins-name').innerText = DATA[k].name; document.getElementById('ins-desc').innerText = DATA[k].desc;
    } else d.style.display = 'none';
}

function checkP() {
    if(document.getElementById('safe-d').value === "882") {
        player.inv.push("card"); updateUI(); log("金庫が開いた。");
        player.ui = false; document.getElementById('safe').style.display='none';
    } else { log("暗証番号エラー。"); document.getElementById('safe-d').value = ""; }
}

function updateUI() {
    for(let i=0; i<2; i++){
        const s = document.getElementById('s'+i); const k = player.inv[i];
        s.innerText = k ? DATA[k].icon : ""; s.className = (i === player.sel) ? "slot active" : "slot";
    }
}

function log(t) { document.getElementById('msg-i').innerText = t; }

function animate() {
    if(!player.ui && !player.ins) {
        if(keys['KeyQ']) yaw += 0.04; if(keys['KeyE']) yaw -= 0.04;
        const m = new THREE.Vector3();
        const f = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        const r = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
        if(keys['KeyW']) m.add(f); if(keys['KeyS']) m.add(f.negate());
        if(keys['KeyA']) m.add(r.negate()); if(keys['KeyD']) m.add(r);
        if(m.length() > 0) camera.position.addScaledVector(m.normalize(), 0.18);

        if(!player.r3 && camera.position.x > 36) {
            player.r3 = true;
            const t = document.getElementById('telop'); t.style.opacity = 1;
            setTimeout(()=>t.style.opacity=0, 4000);
            log("ヒント：黄色は赤の直後ではない。");
        }
        camera.position.x = Math.max(-7, Math.min(51, camera.position.x));
        camera.position.z = Math.max(-7, Math.min(7, camera.position.z));
        if(!world.d1 && camera.position.x > 7.4) camera.position.x = 7.4;
        if(!world.d2 && camera.position.x > 29.4) camera.position.x = 29.4;
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
    }
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

window.addEventListener('keydown', e => {
    if(e.code === 'Space' && !player.ui && !player.ins) interact();
    if(e.code === 'Tab') { e.preventDefault(); player.sel = 1 - player.sel; updateUI(); }
    if(e.code.includes('Shift')) toggleIns();
});
</script>
</body>
</html>
