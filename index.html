<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR-Style 3D Escape</title>
    <style>
        :root {
            --grid-color: rgba(52, 152, 219, 0.3);
            --wall-base: #111;
        }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        /* VR Viewport: 視界を広く(perspectiveを短く)設定 */
        #viewport {
            width: 100vw; height: 100vh;
            perspective: 400px; /* 数値を小さくすると広角レンズ（VR風）になります */
            overflow: hidden; perspective-origin: 50% 50%;
        }

        #camera {
            width: 100%; height: 100%; position: absolute;
            transform-style: preserve-3d; transition: transform 0.15s ease-out;
        }

        .scene {
            position: absolute; width: 2000px; height: 2000px;
            top: 50%; left: 50%; margin: -1000px;
            transform-style: preserve-3d;
        }

        /* 壁の質感：グリッド線を入れて奥行きを可視化 */
        .surface {
            position: absolute; width: 2000px; height: 2000px;
            background: var(--wall-base);
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px),
                              linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 100px 100px;
            border: 5px solid #3498db;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backface-visibility: hidden;
        }

        .front  { transform: translateZ(1000px); }
        .back   { transform: rotateY(180deg) translateZ(1000px); }
        .left   { transform: rotateY(-90deg) translateZ(1000px); }
        .right  { transform: rotateY(90deg) translateZ(1000px); }
        .floor  { transform: rotateX(-90deg) translateZ(1000px); background: #050505; --grid-color: rgba(255,255,255,0.1); }
        .ceil   { transform: rotateX(90deg) translateZ(1000px); background: #000; }

        /* オブジェクト：浮遊感を出してVRらしさを強調 */
        .node { font-size: 200px; filter: drop-shadow(0 0 20px #3498db); animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* UIレイアウト */
        #hud-left { position: fixed; top: 30px; left: 30px; background: rgba(0,0,0,0.7); padding: 15px; border-left: 5px solid #3498db; border-radius: 0 10px 10px 0; }
        #hud-right { position: fixed; top: 30px; right: 30px; background: rgba(255,200,0,0.2); padding: 15px; border-right: 5px solid #f1c40f; color: #f1c40f; display: none; text-align: right; }
        #hud-center { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; pointer-events: none; }
        
        #caption { position: fixed; bottom: 50px; width: 100%; text-align: center; font-size: 1.2rem; text-shadow: 0 0 10px #000; background: rgba(0,0,0,0.5); padding: 10px 0; }

        /* ダイアログ */
        #dialog { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; }
        .card { background: #111; border: 2px solid #3498db; padding: 40px; border-radius: 20px; text-align: center; max-width: 500px; }
        .btn-close { margin-top: 20px; background: #3498db; color: #fff; border: none; padding: 10px 30px; cursor: pointer; border-radius: 5px; }

    </style>
</head>
<body>

<div id="viewport">
    <div id="camera">
        <div class="scene">
            <div class="surface front"><div class="node">🚪</div></div>
            <div class="surface back"><div class="node">💾</div></div>
