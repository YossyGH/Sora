<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Realistic Escape - Fixed & Expanded</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: flex; align-items: center; 
            justify-content: center; flex-direction: column; color: white; z-index: 100;
        }
        #start-btn { 
            padding: 20px 60px; font-size: 24px; background: #fff; border: none; 
            color: #000; cursor: pointer; border-radius: 50px; font-weight: bold; transition: 0.3s;
        }
        #start-btn:hover { background: #00d4ff; transform: scale(1.1); }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #inventory { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .slot { width: 65px; height: 65px; border: 2px solid #555; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; font-size: 30px; border-radius: 8px; }
        .slot.selected { border-color: #00d4ff; box-shadow: 0 0 15px #00d4ff; }
        #msg-box { position: absolute; bottom: 40px; width: 100%; text-align: center; }
        #text { display: inline-block; background: rgba(0,0,0,0.85); color: #fff; padding: 15px 40px; border-radius: 5px; border-left: 5px solid #00d4ff; font-size: 18px; }
        #numpad { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #222; padding: 30px; border-radius: 15px; border: 2px solid #00d4ff; pointer-events: auto; color: white; text-align: center;
        }
        #numpad input { font-size: 30px; width: 120px; text-align: center; margin-bottom: 20px; background: #000; color: #00d4ff; border: 1px solid #444; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="letter-spacing: 0.5em;">THE ROOMS</h1>
    <p style="margin-bottom: 30px; color: #aaa;">[W][A][S][D] で移動 / マウスで視点 / クリックで調べる</p>
    <button id="start-btn">START GAME</button>
</div>

<div id="ui">
    <div id="inventory">
        <div id="slot-0" class="slot"></div>
        <div id="slot-1" class="slot"></div>
    </div>
    <div id="msg-box"><div id="text">部屋を調べて脱出してください。</div></div>
    
    <div id="numpad">
        <h3>ENTER CODE</h3>
        <input type="number" id="code-in" placeholder="0000"><br>
        <button onclick="checkSafe()" style="padding: 10px 20px; cursor:pointer;">UNLOCK</button>
        <button onclick="closeNumpad()" style="padding: 10px 20px; cursor:pointer; background:#555; color:white;">CLOSE</button>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const state = { 
        inv: [], sel: -1, 
        door1Open: false, 
        safeOpened: false,
        chairMoved: false,
        isLocked: false
    };

    const items = {
        key1: { name: "真鍮の鍵", icon: "🗝️" },
        key2: { name: "金庫の鍵", icon: "🔑" }
    };

    // --- シーン・カメラ設定 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- 照明 ---
    const amb = new THREE.AmbientLight(0xffffff, 0.2);
    scene.add(amb);
    const light1 = new THREE.PointLight(0xffffff, 40);
    light1.position.set(0, 5, 0);
    light1.castShadow = true;
    scene.add(light1);
    const light2 = new THREE.PointLight(0xffffff, 30);
    light2.position.set(15, 5, 0);
    scene.add(light2);

    // --- 部屋の構築 ---
    function createRoom(x, color) {
        const group = new THREE.Group();
        group.position.x = x;
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 }));
        floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
        group.add(floor);
        const walls = new THREE.Mesh(new THREE.BoxGeometry(12, 7, 12), new THREE.MeshStandardMaterial({ color: color, side: THREE.BackSide }));
        walls.position.y = 3.5; walls.receiveShadow = true;
        group.add(walls);
        scene.add(group);
        return group;
    }
    const room1 = createRoom(0, 0x222222);
    const room2 = createRoom(15, 0x1a2533);

    // --- 部屋1の家具 ---
    const shelf = new THREE.Group();
    const wood = new THREE.MeshStandardMaterial({ color: 0x2b1d0e });
    const sBack = new THREE.Mesh(new THREE.BoxGeometry(2.5, 5, 0.2), wood); sBack.position.y = 2.5; shelf.add(sBack);
    for(let i=0; i<4; i++){
        const p = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.1, 1), wood); p.position.y = i*1.5 + 0.1; shelf.add(p);
    }
    const vase = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 0.6), new THREE.MeshStandardMaterial({color: 0x004d40}));
    vase.position.set(0.5, 3.4, 0.2); vase.name = "vase"; shelf.add(vase);
    shelf.position.set(-4.5, 0, -5); room1.add(shelf);

    const clock = new THREE.Group();
    const face = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.1), new THREE.MeshStandardMaterial({color:0xeee}));
    face.rotation.x = Math.PI/2; clock.add(face);
    const hand = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.4, 0.05), new THREE.MeshStandardMaterial({color:0x000}));
    hand.position.y = 0.2; clock.add(hand); // 12時を指す
    clock.position.set(0, 4.5, -5.9); room1.add(clock);

    // 接続ドア
    const door1 = new THREE.Group();
    const dBody = new THREE.Mesh(new THREE.BoxGeometry(2.5, 5, 0.2), new THREE.MeshStandardMaterial({color:0x111, metalness:0.7}));
    dBody.position.y = 2.5; door1.add(dBody);
    door1.position.set(6, 0, 0); door1.rotation.y = Math.PI/2; door1.name = "door1";
    scene.add(door1);

    // --- 部屋2の家具 ---
    const desk = new THREE.Mesh(new THREE.BoxGeometry(4, 1.5, 2), wood);
    desk.position.set(15, 0.75, -4); scene.add(desk);

    const safe = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({color:0x444, metalness:0.8}));
    safe.position.set(15, 1.9, -4); safe.name = "safe"; scene.add(safe);

    const chair = new THREE.Group();
    const cSeat = new THREE.Mesh(new THREE.BoxGeometry(1, 0.2, 1), wood); cSeat.position.y = 1; chair.add(cSeat);
    const cLeg = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1, 0.1), wood); cLeg.position.y = 0.5; chair.add(cLeg);
    chair.position.set(15, 0, -2); chair.name = "chair"; scene.add(chair);

    // --- 移動制御 ---
    camera.position.set(0, 3, 5);
    const keys = {};
    let yaw = 0, pitch = 0;

    document.getElementById('start-btn').addEventListener('click', () => {
        renderer.domElement.requestPointerLock();
        document.getElementById('overlay').style.display = 'none';
        state.isLocked = true;
    });

    window.addEventListener('keydown', e => { keys[e.code] = true; });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    document.addEventListener('mousemove', e => {
        if (document.pointerLockElement) {
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-1.5, Math.min(1.5, pitch));
        }
    });

    function update() {
        if (document.pointerLockElement) {
            const speed = 0.12;
            const dir = new THREE.Vector3();
            if (keys['KeyW'] || keys['ArrowUp']) dir.z -= 1;
            if (keys['KeyS'] || keys['ArrowDown']) dir.z += 1;
            if (keys['KeyA'] || keys['ArrowLeft']) dir.x -= 1;
            if (keys['KeyD'] || keys['ArrowRight']) dir.x += 1;

            if (dir.length() > 0) {
                dir.normalize().applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                camera.position.addScaledVector(dir, speed);
            }
            // 境界制限
            camera.position.y = 3;
            if (camera.position.x < -5) camera.position.x = -5;
            if (camera.position.z < -5) camera.position.z = -5;
            if (camera.position.z > 5) camera.position.z = 5;
            if (!state.door1Open && camera.position.x > 5.5) camera.position.x = 5.5;
            if (camera.position.x > 20) camera.position.x = 20;
        }
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
        renderer.render(scene, camera);
        requestAnimationFrame(update);
    }
    update();

    // --- インタラクション ---
    window.addEventListener('mousedown', () => {
        if (!document.pointerLockElement) return;
        const ray = new THREE.Raycaster();
        ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = ray.intersectObjects(scene.children, true);

        if (hits.length > 0 && hits[0].distance < 4) {
            let obj = hits[0].object;
            while(obj.parent && !obj.name) obj = obj.parent;

            if (obj.name === "vase") {
                if (!state.inv.includes("key1")) {
                    state.inv.push("key1");
                    notify("花瓶の中から「真鍮の鍵」を見つけた。");
                    updateUI();
                }
            } else if (obj.name === "door1") {
                if (state.inv[state.sel] === "key1") {
                    state.door1Open = true;
                    notify("鍵が開いた。隣の部屋へ進める。");
                    obj.position.y += 5;
                } else { notify("鍵がかかっている。"); }
            } else if (obj.name === "chair") {
                state.chairMoved = !state.chairMoved;
                obj.position.z += state.chairMoved ? 1.5 : -1.5;
                notify("椅子を動かした。");
            } else if (obj.name === "safe") {
                if (!state.safeOpened) {
                    document.exitPointerLock();
                    document.getElementById('numpad').style.display = 'block';
                } else {
                    notify("金庫は既に空だ。");
                }
            }
        }
    });

    // 金庫のロジック
    window.checkSafe = () => {
        const val = document.getElementById('code-in').value;
        if (val === "1200") { // 時計が12時を指しているヒント
            state.safeOpened = true;
            state.inv.push("key2");
            notify("金庫が開いた！「出口の鍵」を手に入れた！");
            updateUI();
            closeNumpad();
        } else { alert("番号が違うようだ..."); }
    };

    window.closeNumpad = () => {
        document.getElementById('numpad').style.display = 'none';
        renderer.domElement.requestPointerLock();
    };

    function notify(t) { document.getElementById('text').innerText = t; }
    function updateUI() {
        for(let i=0; i<2; i++) {
            const s = document.getElementById(`slot-${i}`);
            s.innerHTML = state.inv[i] ? items[state.inv[i]].icon : "";
            s.onclick = () => { state.sel = i; updateUI(); };
            s.classList.toggle('selected', i === state.sel);
        }
    }
    // アイテム選択（数字キーでも可能）
    window.addEventListener('keydown', e => {
        if(e.key === "1") { state.sel = 0; updateUI(); }
        if(e.key === "2") { state.sel = 1; updateUI(); }
    });
</script>
</body>
</html>
